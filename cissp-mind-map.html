<style>
:root {
  --navy: #1C2B3A;
  --navy-light: #243547;
  --teal: #1A7F8E;
  --teal-light: #e8f6f8;
  --olive: #4A6741;
  --olive-light: #eef3ec;
  --red: #A32D2D;
  --red-light: #fdf0f0;
  --white: #ffffff;
  --off-white: #f8f7f4;
  --border: #e4e2da;
  --border-mid: #d3d1c7;
  --text: #1a1a18;
  --text-mid: #555550;
  --text-muted: #888880;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--off-white);color:var(--text);font-size:14px;line-height:1.5;}

/* TOOL WRAPPER */
.cissp-tool{background:var(--white);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;max-width:960px;margin:0 auto;}

/* HEADER */
.tool-header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-logo{width:36px;height:36px;background:var(--olive);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-logo svg{width:22px;height:22px;}
.header-title{font-size:15px;font-weight:600;color:var(--white);letter-spacing:-0.01em;}
.header-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.faq-btn{font-size:11px;font-weight:500;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:5px;padding:5px 12px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
.faq-btn:hover,.faq-btn.active{background:var(--teal);color:var(--white);border-color:var(--teal);}

/* DOMAIN NAV */
.domain-nav{display:flex;overflow-x:auto;background:#f0efeb;border-bottom:0.5px solid var(--border);gap:3px;padding:10px 10px 0;}
.domain-nav::-webkit-scrollbar{display:none;}
.dnav-item{flex-shrink:0;padding:8px 13px 10px;cursor:pointer;border-radius:7px 7px 0 0;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font);color:var(--text-muted);background:rgba(255,255,255,0.45);}
.dnav-item:hover{color:var(--text);background:rgba(255,255,255,0.8);}
.dnav-item.active{color:#fff;border-bottom-color:transparent;}
.dnav-num{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:0.8;}
.dnav-name{font-size:11px;font-weight:700;white-space:nowrap;}

/* DOMAIN VIEW */
.domain-view{display:none;}
.domain-view.active{display:block;}

/* DOMAIN HEADER */
.domain-hdr{padding:16px 20px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.domain-hdr-left{}
.domain-num{font-size:9px;font-weight:500;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:3px;text-transform:uppercase;}
.domain-name{font-size:17px;font-weight:600;color:var(--navy);letter-spacing:-0.02em;}
.domain-hook{font-size:12px;color:var(--text-mid);margin-top:4px;font-style:italic;}
.domain-pct-block{text-align:right;flex-shrink:0;}
.domain-pct{font-size:30px;font-weight:600;line-height:1;letter-spacing:-0.03em;}
.domain-pct-label{font-size:9px;color:var(--text-muted);margin-top:2px;}
.domain-pct-q{font-size:10px;font-weight:500;margin-top:1px;}

/* CLUSTERS GRID */
.clusters-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--border);}
.cluster{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);}
.cluster:nth-child(even){border-right:none;}
.cluster:nth-child(3),.cluster:nth-child(4){border-bottom:none;}
.cluster-hdr{padding:9px 14px;font-size:11px;font-weight:600;color:var(--white);letter-spacing:0.01em;}
.cluster-body{padding:10px 12px;background:#fafaf8;display:flex;gap:8px;min-height:120px;}

/* SUBGROUPS */
.sg{flex:1;min-width:0;}
.sg-label{font-size:7.5px;font-weight:600;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;}
.vchips{display:flex;flex-direction:column;gap:2px;}
.vchip{font-size:9.5px;padding:4px 7px;border:0.5px solid var(--border-mid);border-radius:4px;color:var(--text);background:var(--white);cursor:pointer;line-height:1.3;transition:all 0.12s;font-family:var(--font);}
.vchip:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light);}
.vchip.active{background:var(--navy);color:var(--white);border-color:var(--navy);}

/* EXPLANATION DRAWER */
.explanation-drawer{border-top:0.5px solid var(--border);background:var(--white);display:none;}
.explanation-drawer.open{display:block;}
.ed-inner{padding:16px 20px;}
.ed-breadcrumb{font-size:9px;font-weight:500;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;}
.ed-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:10px;letter-spacing:-0.01em;}
.ed-text{font-size:13px;color:var(--text-mid);line-height:1.7;margin-bottom:14px;}
.ed-insight{border-left:3px solid var(--olive);padding:10px 14px;background:var(--olive-light);border-radius:0 6px 6px 0;}
.ed-insight-label{font-size:8px;font-weight:600;letter-spacing:0.1em;color:var(--olive);margin-bottom:4px;text-transform:uppercase;}
.ed-insight-text{font-size:12px;color:#3a4a35;line-height:1.6;}
.ed-close{float:right;font-size:11px;color:var(--text-muted);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;margin-top:1px;}
.ed-close:hover{color:var(--red);}

/* EXAM TRAPS */
.traps-section{background:#fdf8f6;border-bottom:0.5px solid #f0d8d0;padding:10px 16px;}
.traps-label{font-size:8px;font-weight:600;letter-spacing:0.1em;color:var(--red);margin-bottom:7px;display:flex;align-items:center;gap:5px;text-transform:uppercase;}
.traps-dot{width:6px;height:6px;background:#D85A30;border-radius:50%;flex-shrink:0;}
.traps-chips{display:flex;flex-wrap:wrap;gap:4px;}
.trap-chip{font-size:10px;padding:3px 9px;border:0.5px solid #f0b8a8;border-radius:4px;color:#7a2020;background:var(--white);}

/* CONNECTS */
.connects-section{background:#f6f8f5;padding:10px 16px;}
.connects-label{font-size:8px;font-weight:600;letter-spacing:0.1em;color:var(--olive);margin-bottom:7px;text-transform:uppercase;}
.connects-flow{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
.flow-chip{font-size:10px;padding:3px 10px;border:0.5px solid #b8ccb4;border-radius:4px;color:#2a4025;background:var(--white);}
.flow-arr{font-size:12px;color:var(--border-mid);}

/* FAQ VIEW */
.faq-view{display:none;padding:20px;}
.faq-view.active{display:block;}
.faq-intro{font-size:13px;color:var(--text-mid);margin-bottom:20px;line-height:1.6;}
.faq-item{border:0.5px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.faq-q{padding:12px 16px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--white);transition:background 0.12s;}
.faq-q:hover{background:var(--off-white);}
.faq-q.open{background:var(--navy);color:var(--white);}
.faq-chevron{font-size:12px;transition:transform 0.2s;flex-shrink:0;}
.faq-q.open .faq-chevron{transform:rotate(180deg);}
.faq-a{display:none;padding:14px 16px;font-size:13px;color:var(--text-mid);line-height:1.7;border-top:0.5px solid var(--border);background:#fafaf8;}
.faq-a.open{display:block;}
.faq-seo-note{margin-top:6px;font-size:11px;color:var(--text-muted);font-style:italic;}

/* TOOL FOOTER */
.tool-footer{background:var(--navy);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;}
.tool-footer-left{font-size:9px;color:rgba(255,255,255,0.35);}
.tool-footer-right{font-size:9px;color:var(--teal);}

@media(max-width:600px){
  .clusters-grid{grid-template-columns:1fr;}
  .cluster{border-right:none;}
  .cluster:nth-child(3){border-bottom:0.5px solid var(--border);}
  .domain-hdr{flex-direction:column;}
  .domain-pct-block{text-align:left;}
}
</style>

<script>
const DOMAINS = [
  {
    id:1, color:"#1A7F8E", pct:"15%", qs:"~19",
    name:"Security and Risk Management", short:"Risk Mgmt",
    hook:"Think like a CISO, not a technician. This domain is about managing risk from a business perspective.",
    clusters:[
      {
        label:"Foundations and governance", color:"#1A7F8E",
        groups:[
          {label:"CIA Triad", chips:[
            {name:"Confidentiality",explain:"Confidentiality means making sure information is only accessible to those who are supposed to see it. Think access controls, encryption, classification. It is not about secrecy for its own sake — it is about appropriate access. The right people get in; everyone else does not.",insight:"The exam will test overlaps — for example, encryption serves confidentiality but also supports integrity. Know which property a control primarily supports."},
            {name:"Integrity",explain:"Integrity means the data is accurate and has not been altered without authorisation. Hashing, checksums, digital signatures — these are all integrity controls. If someone changes a file and you cannot detect it, you have an integrity failure, not just a confidentiality one.",insight:"Integrity failures are often confused with availability failures. A corrupted database is an integrity issue. A database that is offline is an availability issue. The exam loves this distinction."},
            {name:"Availability",explain:"Availability means systems and data are accessible when the business needs them. Redundancy, failover, backups, uptime monitoring — all availability controls. A ransomware attack that encrypts your files and locks you out is primarily an availability attack, even though it also hits confidentiality.",insight:"When the exam asks what a DDoS attack primarily targets, the answer is availability. Do not overthink it."},
            {name:"Overlaps — not definitions",explain:"The exam rarely asks you to define CIA. It tests how the three properties interact in real scenarios. A control can support multiple properties simultaneously. Encryption supports confidentiality and can support integrity. A well-designed system balances all three rather than maximising one at the expense of the others.",insight:"If a question asks which CIA property a control 'primarily' supports, look for the most direct relationship — not all the indirect ones."},
          ]},
          {label:"Governance hierarchy", chips:[
            {name:"Policy",explain:"A policy is the high-level statement of what the organisation will and will not do. It comes from senior leadership and reflects business objectives and risk appetite. It does not tell you how to do things — that is what standards and procedures are for. If a policy says 'all data must be encrypted at rest', it does not specify which algorithm.",insight:"Policy answers 'what' and 'why'. If you see a question about who sets security direction, the answer involves policy. Policies are mandatory — guidelines are not."},
            {name:"Standards",explain:"Standards take a policy statement and make it specific. If the policy says encrypt data, the standard says use AES-256. Standards are mandatory and give you the measurable requirements that controls must meet. They sit between policy and procedure in the hierarchy.",insight:"Standards are mandatory and specific. Guidelines are recommended but optional. The exam will test this distinction — know it cold."},
            {name:"Procedures",explain:"Procedures are the step-by-step instructions for carrying out a task in compliance with standards and policy. They are operational — written for the people doing the work. A procedure for encrypting a laptop tells you exactly which settings to configure and in what order.",insight:"Procedures are the most granular level of the hierarchy. If a question asks what document a technician would follow to perform a specific task, the answer is a procedure."},
            {name:"Guidelines",explain:"Guidelines are recommendations — best practice suggestions that are not mandatory. They give people flexibility to use their judgement. Useful when you want to encourage good behaviour without making every detail a hard requirement.",insight:"The key word is 'recommended'. Guidelines are not enforceable. If an exam question involves something optional or discretionary, think guideline."},
            {name:"Baselines",explain:"A baseline is the minimum acceptable security configuration for a given system type. All systems of that type must meet the baseline — it is the security floor, not the ceiling. Baselines are derived from standards and applied consistently to groups of similar systems.",insight:"Baselines apply to specific system types. A server baseline differs from a workstation baseline. Think of it as a consistent starting point that ensures no system falls below the minimum."},
          ]},
          {label:"Frameworks", chips:[
            {name:"NIST CSF",explain:"The NIST Cybersecurity Framework organises security activities into five functions: Identify, Protect, Detect, Respond, Recover. It is voluntary, flexible, and designed to work alongside any sector or organisation type. Many US government and commercial organisations use it as their primary security programme structure.",insight:"The exam may ask you to map activities to NIST CSF functions. Detection tools sit in Detect. Incident response sits in Respond. Recovery plans sit in Recover. Know the five functions in order."},
            {name:"ISO/IEC 27001",explain:"ISO 27001 is the international standard for information security management systems. It gives you a structured framework for implementing, maintaining and continually improving an ISMS. Unlike NIST CSF which is a framework, ISO 27001 is a certifiable standard — organisations can be audited and certified against it.",insight:"ISO 27001 is about the management system, not just the technical controls. ISO 27002 is the companion document with the actual control guidance. Know which is which."},
            {name:"COBIT",explain:"COBIT is an IT governance framework focused on aligning IT with business objectives. It is used by boards and executives to ensure IT delivers value and that risks are managed appropriately. COBIT sits at the governance level — it is about oversight and accountability, not technical implementation.",insight:"COBIT is the framework most associated with IT governance and audit. If a question involves board-level oversight of IT or ensuring IT supports business goals, think COBIT."},
            {name:"SABSA",explain:"SABSA is a risk-driven enterprise security architecture framework. It starts with business requirements and works down through layers of architecture to derive security requirements from real business needs rather than bolting them on afterwards. Used mostly in large enterprise and government environments.",insight:"SABSA is less commonly tested than NIST or ISO but may appear in architecture questions. The key concept is that it derives security from business requirements — security is not added on, it is built in from the start."},
          ]},
          {label:"Strategy", chips:[
            {name:"Security aligned to business",explain:"Security exists to support the business, not to obstruct it. Every security decision should be traceable back to a business objective or risk reduction goal. A control that costs more than the asset it protects is bad security, regardless of how technically sound it is.",insight:"The exam consistently rewards answers that balance security with business operations. If a control cripples a business process, the correct answer usually involves finding a control that achieves the same goal with less operational impact."},
            {name:"Due care",explain:"Due care means doing what a reasonable and prudent person would do in the same circumstances. It is about taking action — implementing controls, training staff, maintaining systems. If you knew about a risk and did nothing, that is a failure of due care.",insight:"Due care is about taking action. Due diligence is about investigation. The exam loves this pair. Remember: care equals doing, diligence equals checking."},
            {name:"Due diligence",explain:"Due diligence means investigating and understanding the risks before making decisions. Before a merger, you review the target company's security posture. Before selecting a vendor, you assess their controls. Diligence is the research phase; care is the action phase.",insight:"Due diligence comes before due care. You investigate first (diligence), then act on what you find (care). Both are legal and ethical obligations for security professionals."},
          ]},
        ]
      },
      {
        label:"Risk management", color:"#2d4a5a",
        groups:[
          {label:"Framework", chips:[
            {name:"Identify",explain:"Before you can manage risk, you have to know what you are dealing with. Identification means cataloguing your assets, understanding what threats they face, and identifying vulnerabilities that could be exploited. You cannot protect what you do not know exists.",insight:"Risk identification is the foundation. If the exam asks about the first step in risk management, it is identification. Everything else follows from knowing what you are working with."},
            {name:"Assess",explain:"Once you know the risks, you evaluate them. Assessment means determining the likelihood of a threat exploiting a vulnerability and the potential impact on the business if it does. This can be done qualitatively (high/medium/low) or quantitatively (financial figures).",insight:"Assessment involves both likelihood and impact. A risk with high likelihood but low impact may be less urgent than one with low likelihood but catastrophic impact. The exam will test your ability to prioritise based on both factors together."},
            {name:"Respond",explain:"Risk response is the decision about what to do about a risk. You have four options: accept it, avoid it, transfer it, or mitigate it. The choice depends on the cost of the control versus the cost of the potential impact, and on the organisation's risk appetite.",insight:"The four responses are Accept, Avoid, Transfer, Mitigate. Know each one and when to use it. Transferring risk (insurance, contracts) does not eliminate it — you still have residual risk and reputational exposure."},
            {name:"Monitor",explain:"Risk management is not a one-time exercise. Threats evolve, systems change, and business priorities shift. Monitoring means tracking your risk posture over time, reviewing whether controls are still effective, and watching for new risks that emerge.",insight:"The exam may frame monitoring as continuous risk management. Controls that worked last year may not be adequate today. Monitoring closes the loop and keeps the risk programme current."},
            {name:"Report",explain:"Risk information needs to reach the right people. Reporting means communicating risk status to stakeholders — executives, board members, risk committees. The format and detail level changes depending on the audience. An executive wants a risk summary; a technical team wants specifics.",insight:"Reporting to leadership is a recurring theme in CISSP. The correct answer often involves informing senior management and letting them make the risk decision, rather than making it yourself."},
          ]},
          {label:"Vocabulary", chips:[
            {name:"Threat",explain:"A threat is anything that has the potential to cause harm. It could be a person (an attacker), a natural event (a flood), or a technical failure (a power outage). Threats exist independently of your systems — the question is whether they can reach and exploit your vulnerabilities.",insight:"A threat is not the same as a risk. A threat is the potential; a risk is the combination of threat, vulnerability, and impact. Keep these distinct in your thinking."},
            {name:"Vulnerability",explain:"A vulnerability is a weakness that a threat can exploit. It could be an unpatched system, a misconfigured firewall, a poorly trained employee, or a physical gap in your perimeter. Vulnerabilities on their own are not a problem — they only matter when a threat can actually exploit them.",insight:"Removing a vulnerability reduces risk even if the threat still exists. Vulnerability management is therefore a core risk reduction strategy."},
            {name:"Likelihood",explain:"Likelihood is the probability that a threat will successfully exploit a vulnerability within a given period. It takes into account how capable and motivated the threat actor is, and how exposed your vulnerability is. A highly capable attacker facing a well-patched system has lower likelihood than the same attacker facing an unpatched one.",insight:"Likelihood is a factor in calculating risk. Risk = Likelihood × Impact. Reducing either reduces overall risk. Controls can reduce likelihood (harder to exploit) or impact (less damage if exploited)."},
            {name:"Impact",explain:"Impact is the consequence if the risk materialises — financial loss, reputational damage, regulatory fines, operational disruption. The Business Impact Analysis (BIA) is the formal process for quantifying impact across different threat scenarios.",insight:"Impact drives the value of a control. If the potential impact is low, spending heavily on controls is hard to justify. High-impact risks justify significant investment even with low likelihood."},
            {name:"Exposure",explain:"Exposure is the degree to which an asset is open to a threat. A server facing the internet has higher exposure than one on an isolated internal network. Exposure is about attack surface — how much opportunity does a threat actor have to reach your vulnerability.",insight:"Reducing exposure is a valid risk response. Network segmentation, air-gapping, and removing unnecessary services all reduce exposure and therefore reduce risk without touching the underlying vulnerability."},
            {name:"Risk appetite",explain:"Risk appetite is the level of risk an organisation is willing to accept in pursuit of its objectives. A startup in a competitive market may accept higher risk than a regulated financial institution. Risk appetite is set by leadership and shapes every risk decision the security team makes.",insight:"Risk appetite is a business decision, not a technical one. The CISSP exam expects you to understand that not all risk is eliminated — some is accepted deliberately, and that is appropriate when the cost of control exceeds the cost of potential impact."},
          ]},
          {label:"Responses", chips:[
            {name:"Accept",explain:"Risk acceptance means acknowledging a risk exists and deciding to live with it without additional controls. This is appropriate when the cost of a control exceeds the potential loss, or when the risk falls within the organisation's risk appetite. Acceptance should always be a conscious, documented decision — not an oversight.",insight:"Acceptance is not the same as ignoring a risk. It is a deliberate, informed decision. The exam expects you to know that accepted risks should be documented and reviewed periodically."},
            {name:"Transfer",explain:"Risk transfer means shifting the financial consequence of a risk to a third party — typically through insurance or contractual agreements. Cyber insurance is a common example. Transfer does not eliminate the risk itself; if a breach occurs, you still face reputational damage and operational disruption, even if the financial loss is covered.",insight:"Transferring risk does not transfer liability or responsibility. You can transfer the financial impact, but you remain accountable for the breach from a regulatory and reputational perspective."},
            {name:"Avoid",explain:"Risk avoidance means eliminating the activity that creates the risk. If your organisation avoids storing credit card data entirely, you avoid PCI-DSS scope. Avoidance is the most complete form of risk response but often means giving up a business activity or revenue stream.",insight:"The exam distinguishes between avoid and mitigate. Reduce means mitigate — making the risk smaller but not eliminating it. Avoid means stopping the activity entirely. Do not confuse them."},
            {name:"Mitigate",explain:"Mitigation means implementing controls to reduce the likelihood or impact of a risk to an acceptable level. It is the most common response — most organisations cannot avoid or fully transfer their risks, so they put controls in place to manage them. Mitigation does not eliminate risk; it reduces it to residual risk.",insight:"After mitigation, residual risk remains. That residual risk is then either accepted, transferred further, or subject to additional controls. The concept of residual risk is frequently tested."},
          ]},
          {label:"Quantitative analysis", chips:[
            {name:"SLE",explain:"Single Loss Expectancy is the monetary value expected to be lost in a single occurrence of a risk event. It is calculated as Asset Value multiplied by Exposure Factor. If an asset is worth £500,000 and a fire would destroy 40% of it, the SLE is £200,000. SLE gives you the cost of a single incident.",insight:"SLE = Asset Value × Exposure Factor. Know this formula. The exam may give you numbers and ask you to calculate it, or give you SLE and ask you to work backwards to find the exposure factor."},
            {name:"ARO",explain:"Annual Rate of Occurrence is how many times a risk event is expected to happen per year. If a flood happens roughly once every 10 years, the ARO is 0.1. If a phishing attack hits monthly, the ARO is 12. ARO is an estimate based on historical data and expert judgement.",insight:"ARO does not have to be a whole number. An event that happens once every five years has an ARO of 0.2. The exam may present ARO as a fraction or decimal — do not be thrown off."},
            {name:"ALE",explain:"Annual Loss Expectancy is the total expected loss per year from a specific risk. It is calculated as SLE multiplied by ARO. ALE is the key figure for making investment decisions — if a control costs less than the ALE it reduces, it is worth implementing from a purely financial standpoint.",insight:"ALE = SLE × ARO. This is the most important formula in quantitative risk analysis. If the annual cost of a control is less than the ALE, the control is cost-justified. The exam will test your ability to use this logic."},
            {name:"Qual vs Quant",explain:"Qualitative analysis uses descriptive ratings — high, medium, low — based on expert judgement. It is faster, requires less data, and works well when precise financial data is hard to obtain. Quantitative analysis uses numbers and formulas (like SLE and ALE) to produce financial figures. It is more precise but requires good data and takes more time.",insight:"Neither approach is universally better. Qualitative fits early-stage risk assessments or when data is limited. Quantitative is valuable for financial decision-making and cost-justifying controls. The exam may ask which is most appropriate in a given scenario."},
          ]},
        ]
      },
      {
        label:"Legal, ethics and compliance", color:"#4A6741",
        groups:[
          {label:"Regulations", chips:[
            {name:"GDPR",explain:"The General Data Protection Regulation governs how organisations collect, process and store personal data of EU and UK residents. It gives individuals rights over their data — access, correction, deletion. It requires lawful basis for processing, privacy by design, breach notification within 72 hours, and imposes significant fines for non-compliance.",insight:"GDPR is about personal data of EU/UK residents — it applies regardless of where your organisation is based. If you process data about EU residents, GDPR applies to you. Key exam concepts: data subject rights, lawful basis, 72-hour breach notification."},
            {name:"HIPAA",explain:"The Health Insurance Portability and Accountability Act governs the protection of protected health information (PHI) in the US. It applies to covered entities — healthcare providers, insurers, and their business associates. HIPAA requires safeguards across administrative, physical, and technical dimensions.",insight:"HIPAA = health data in the US. The three safeguard categories — administrative, physical, technical — are frequently tested. Business associates who handle PHI on behalf of covered entities are also bound by HIPAA."},
            {name:"PCI-DSS",explain:"The Payment Card Industry Data Security Standard is a contractual requirement for any organisation that stores, processes, or transmits cardholder data. It is not a law — it is a standard set by the card networks. Non-compliance can result in fines from the card brands and loss of the ability to accept card payments.",insight:"PCI-DSS applies to cardholder data, not just credit cards. The scope is broad — if a system touches card data even indirectly, it may be in scope. Reducing scope through segmentation and tokenisation is a key compliance strategy."},
            {name:"SOX",explain:"The Sarbanes-Oxley Act applies to US public companies and requires accurate financial reporting and internal controls over financial systems. From a security perspective, SOX means IT systems supporting financial reporting must have strong access controls, audit trails, and change management processes.",insight:"SOX is about financial reporting integrity, not general security. The IT controls it requires are specifically those that affect the accuracy and reliability of financial data. Access controls to financial systems and audit logs are the core technical requirements."},
            {name:"GLBA",explain:"The Gramm-Leach-Bliley Act requires US financial institutions to protect the non-public personal information of their customers. It mandates a written information security programme, risk assessments, and safeguards. It also requires notice to customers about information sharing practices.",insight:"GLBA applies to financial institutions — banks, insurance companies, investment firms. If a question involves a financial company's obligation to protect customer data in the US, think GLBA."},
            {name:"FERPA",explain:"The Family Educational Rights and Privacy Act protects the educational records of students in US educational institutions. It gives parents rights over their children's records (and students those rights when they turn 18). Schools must have consent before disclosing educational records to third parties.",insight:"FERPA is the education equivalent of HIPAA. If a question involves student records or educational institutions in the US, FERPA is the relevant regulation."},
          ]},
          {label:"Privacy", chips:[
            {name:"PII",explain:"Personally Identifiable Information is any data that can be used to identify a specific individual — name, address, national insurance number, email, IP address, biometric data. The definition varies slightly across jurisdictions but the principle is consistent: if it can identify a person, treat it carefully.",insight:"PII scope is broader than most people expect. An IP address, a cookie identifier, or a combination of non-obvious data points can constitute PII if it can identify an individual. The exam tests whether you recognise PII in context."},
            {name:"PHI",explain:"Protected Health Information is health data linked to an individual — diagnoses, treatment records, prescriptions, medical history. PHI is a subset of PII with additional legal protections under HIPAA in the US. The same information without any identifying link is not PHI — it becomes de-identified data.",insight:"PHI = health + identifier. Remove the identifier and it is no longer PHI. De-identification is a valid privacy technique for enabling data use in research without triggering PHI obligations."},
            {name:"OECD principles",explain:"The OECD Privacy Principles are a foundational framework for data privacy that influenced legislation worldwide including GDPR. Key principles include: collection limitation, data quality, purpose specification, use limitation, security safeguards, openness, individual participation, and accountability. These principles underpin most modern privacy frameworks.",insight:"The OECD principles are the philosophical foundation of privacy law. When the exam asks about the basis of modern privacy frameworks or what principles guide data handling, the OECD principles are the reference point."},
            {name:"Data subject rights",explain:"Under GDPR and similar frameworks, individuals have defined rights over their personal data: the right to access it, correct it, erase it, restrict its processing, port it to another provider, and object to its use. Organisations must have processes to respond to these requests within defined timeframes.",insight:"Data subject rights are enforceable and time-limited. Under GDPR, most requests must be responded to within one month. The right to erasure (right to be forgotten) is often tested — it is not absolute; legitimate grounds to retain data can override it."},
            {name:"Privacy by design",explain:"Privacy by design means building privacy into systems and processes from the outset rather than adding it on afterwards. It is proactive, not reactive. Under GDPR, data protection by design and by default is a legal requirement — you must consider privacy impact before building, not after launching.",insight:"Privacy by design is a GDPR requirement, not just a best practice. The exam may ask about it in the context of new system development. The correct answer to 'when should privacy be considered' is always at the design stage."},
          ]},
          {label:"ISC² ethics", chips:[
            {name:"Canon 1 — protect society",explain:"The first and highest priority canon requires CISSPs to act in a way that protects society, the common good, and public trust in information and security infrastructure. When other obligations conflict with this canon, protecting society takes precedence. This means that if your employer is engaged in harmful or illegal activity, you have an obligation that goes beyond employment.",insight:"Canon 1 beats everything else. If the exam gives you a scenario where protecting your employer conflicts with protecting the public, the ethical answer is always to prioritise public safety. This is the canon most candidates get wrong under pressure."},
            {name:"Canon 2 — act honourably",explain:"CISSPs must act honestly, justly, and responsibly. This means being truthful with clients and employers, avoiding conflicts of interest, not misrepresenting qualifications or findings, and maintaining integrity in all professional dealings. Honourable conduct includes admitting when you do not know something.",insight:"Canon 2 is about personal integrity. The exam may present scenarios where you discover a colleague has misrepresented findings or credentials. The ethical response is to address it, not ignore it."},
            {name:"Canon 3 — diligent service",explain:"CISSPs must provide competent service to those who rely on them — employers, clients, the profession. This means staying current with developments in the field, delivering quality work, and not taking on assignments beyond your competence. Diligence means doing the job properly, not just doing it.",insight:"Canon 3 is about professional competence. Taking on work you are not qualified to do violates this canon. Continuous professional development is part of meeting this obligation."},
            {name:"Canon 4 — advance the profession",explain:"CISSPs have a responsibility to contribute to the growth and standing of the information security profession. This includes mentoring others, sharing knowledge, supporting ethical research, and upholding the reputation of the field. The profession as a whole benefits when its members act with integrity.",insight:"Canon 4 is the lowest priority but still mandatory. It is about contribution to the field — sharing knowledge, supporting the community, maintaining the profession's reputation."},
          ]},
          {label:"Personnel", chips:[
            {name:"Hiring checks",explain:"Security starts before someone joins the organisation. Background checks, employment history verification, reference checks, and in some contexts criminal record checks are all part of ensuring you know who you are bringing in. The level of scrutiny should be proportional to the access and trust the role requires.",insight:"Pre-employment screening reduces insider threat risk. The exam may ask about what checks are appropriate for a given role. Higher access and trust requires more rigorous screening."},
            {name:"Sep. of duties",explain:"Separation of duties means no single person should be able to complete a high-risk or sensitive transaction on their own. The person who initiates a payment should not also approve and reconcile it. This control prevents fraud, errors, and abuse of access by ensuring critical actions require more than one person.",insight:"Separation of duties is a preventive control. It makes malicious or accidental misuse harder by requiring collusion between multiple people. The exam often presents it alongside least privilege as complementary controls."},
            {name:"Least privilege",explain:"Every user, process, and system should have only the access needed to perform its function — nothing more. Least privilege limits the blast radius of a compromise. If an account is taken over, the attacker can only do what that account was allowed to do.",insight:"Least privilege is a foundational access control principle. The exam will test it in various contexts — user accounts, service accounts, applications. The answer to 'what access should this account have' is always the minimum required."},
            {name:"Need to know",explain:"Need to know is a more granular version of least privilege applied to information. Even if someone has the clearance to access classified information, they should only access the specific information relevant to their current work. Clearance level is necessary but not sufficient — relevance to the task is also required.",insight:"Need to know operates alongside clearance. A person with Top Secret clearance cannot access all Top Secret information — only what they need for their current assignment. This limits exposure in the event of insider threat or compromise."},
            {name:"Termination",explain:"When an employee leaves — voluntarily or otherwise — their access must be removed promptly and completely. Accounts disabled, badges deactivated, equipment returned, passwords changed on shared systems. The risk from a disgruntled or departing employee with active credentials is significant and real.",insight:"The timing of access revocation matters. For involuntary terminations, access should be removed simultaneously with or before the employee is notified. Departing employees who retain access for even a short time represent a meaningful risk."},
          ]},
        ]
      },
      {
        label:"People and continuity", color:"#1C2B3A",
        groups:[
          {label:"Awareness training", chips:[
            {name:"Awareness",explain:"Security awareness is about making people conscious of security risks and their role in managing them. It is not technical training — it is behavioural. Staff should know how to recognise phishing, handle sensitive data, report incidents, and understand why security policies exist.",insight:"Awareness training is an administrative control. The exam consistently treats it as the first line of defence against social engineering. Even the best technical controls can be bypassed by a user who clicks a phishing link."},
            {name:"Frequency",explain:"A single annual training session is not enough. Effective awareness programmes are ongoing — regular reminders, current threat examples, and periodic assessments keep security front of mind. Frequency should increase when threat levels change or after a security incident.",insight:"The exam favours ongoing, regular training over one-time annual events. If a question asks about the most effective awareness approach, continuity and relevance beat volume."},
            {name:"Role-based training",explain:"Different roles face different risks and need different knowledge. A finance team needs to understand invoice fraud. A developer needs secure coding practices. An executive needs to understand social engineering targeted at senior staff. Role-based training is more effective than generic training because it is directly relevant.",insight:"Role-based training recognises that one size does not fit all. The exam may ask what type of training is most appropriate for a given group — match the training content to the specific risks that group faces."},
            {name:"Admin controls first",explain:"Administrative controls — policies, training, procedures — form the foundation of a security programme. Technical controls implement and enforce the administrative layer. Physical controls protect the environment. The hierarchy matters: if no policy exists, a technical control has no authoritative basis.",insight:"Administrative controls precede technical controls in the hierarchy. If a question asks what should be done first when establishing a security programme, the answer involves policies and governance before buying technology."},
          ]},
          {label:"BCP basics", chips:[
            {name:"BCP vs DRP",explain:"Business Continuity Planning is the broader discipline — it covers how the organisation continues to operate critical functions during and after a disruption, regardless of cause. Disaster Recovery Planning is a subset focused specifically on recovering IT systems and infrastructure. BCP is about the business; DRP is about the technology.",insight:"BCP is bigger than DRP. DRP is a component of BCP. If a question asks about continuing business operations, think BCP. If it asks specifically about recovering systems or data, think DRP."},
            {name:"4 phases of BCP",explain:"BCP follows four phases: Project Scope and Planning (defining what you are protecting and why), Business Impact Analysis (understanding which processes are critical and what disruption costs), Recovery Strategy Development (deciding how you will recover), and Plan Approval and Implementation (getting leadership buy-in and putting the plan into action).",insight:"The four phases are sequential. The BIA comes second — before you can develop recovery strategies, you need to know which processes matter most and how long they can be down before the business is seriously harmed."},
            {name:"Scope",explain:"Scoping the BCP means defining which business processes, systems, and locations are covered by the plan. A plan that tries to cover everything ends up covering nothing adequately. Scoping is guided by criticality — the BIA tells you which processes are essential to survival.",insight:"Scope creep in BCP is a real risk. A well-scoped plan focused on critical functions is more useful than an exhaustive plan that cannot be executed under pressure. The exam favours focused, prioritised approaches."},
            {name:"BIA",explain:"The Business Impact Analysis identifies which business processes are critical, quantifies the financial and operational impact of disruption, and defines recovery time objectives. It is the analytical foundation of the entire BCP. Without a BIA, recovery priorities are guesswork.",insight:"The BIA drives everything in BCP. Recovery Time Objectives (RTO) and Recovery Point Objectives (RPO) come from the BIA. The exam will ask about BIA outputs and how they connect to recovery planning."},
          ]},
          {label:"Recovery metrics", chips:[
            {name:"RTO",explain:"Recovery Time Objective is the maximum acceptable time for restoring a system or process after a disruption. If your RTO for the payment system is four hours, you must be able to restore it within four hours of an outage. RTO drives your investment in recovery capability — a two-hour RTO requires more infrastructure than a 48-hour one.",insight:"RTO is about time — how quickly must you recover? It is set by the business based on what downtime costs. The shorter the RTO, the more expensive the solution. Hot sites support very short RTOs; cold sites support longer ones."},
            {name:"RPO",explain:"Recovery Point Objective is the maximum acceptable data loss measured in time. An RPO of four hours means you can tolerate losing up to four hours of data. This drives your backup frequency — if your RPO is one hour, you need backups at least every hour.",insight:"RPO is about data, not time to recover. A financial system processing transactions may have an RPO of near-zero — it cannot afford to lose any transactions. The RPO tells you how often to back up, not how fast to restore."},
            {name:"MTD",explain:"Maximum Tolerable Downtime is the absolute maximum time a business process can be unavailable before the organisation suffers irreversible harm — loss of customers, regulatory penalties, or business failure. MTD sets the outer boundary for recovery planning. Your RTO must always be less than your MTD.",insight:"MTD is the hard ceiling on downtime. RTO must be shorter than MTD or your recovery plan cannot save the business. If the exam gives you an MTD and asks about acceptable RTOs, any RTO longer than the MTD is wrong."},
            {name:"MTTF",explain:"Mean Time to Failure is the average expected operational life of a non-repairable component before it fails. Used in reliability engineering to plan replacement schedules and build redundancy. High-availability systems use MTTF to determine when components are likely to need replacement before they fail in production.",insight:"MTTF applies to non-repairable items — when they fail, you replace them. MTTR (Mean Time to Repair) applies to repairable systems. MTTF is about planning for expected failure, not responding to it."},
          ]},
          {label:"BCP testing", chips:[
            {name:"Tabletop",explain:"A tabletop exercise is a discussion-based test where key stakeholders walk through a scenario verbally — what would we do, who would we call, what decisions would we make? No systems are actually activated. It is the least disruptive form of testing and the best starting point for organisations new to BCP testing.",insight:"Tabletop tests are low-cost and low-risk. They identify gaps in the plan and improve team familiarity without disrupting operations. The exam will distinguish them from more disruptive tests like parallel or full interruption."},
            {name:"Walkthrough",explain:"A walkthrough is a step-by-step review of the plan documentation with the team responsible for executing it. Each person reviews their role, identifies gaps or outdated information, and confirms they understand what they would need to do. More structured than a tabletop but still not operational.",insight:"Walkthroughs check the plan for accuracy and completeness. They are often used after the plan is updated to confirm everyone understands the changes before the next full test."},
            {name:"Simulation",explain:"A simulation test runs through a scenario as if it were real — without actually failing over systems. Team members respond as they would in a real event, making decisions and executing steps, but the production environment is untouched. More realistic than a tabletop but less disruptive than a parallel test.",insight:"Simulation tests people and processes without touching production systems. They reveal gaps in decision-making and communication that tabletops miss, while remaining safe."},
            {name:"Parallel test",explain:"A parallel test activates the recovery environment and runs it alongside the production environment simultaneously. Both systems operate at the same time. This validates that the recovery environment actually works without taking the risk of switching production over to it.",insight:"Parallel testing is the most thorough safe test — you prove recovery works while keeping production running. It is more expensive and disruptive than simulation but less risky than a full interruption test."},
            {name:"Full interruption",explain:"A full interruption test is the most realistic and most disruptive form of testing. Production systems are actually shut down and the organisation runs on the recovery environment. It is the only test that truly validates end-to-end recovery capability, but it carries real operational risk.",insight:"Full interruption tests are the gold standard for validating BCP. They are rarely performed because of the risk, but they are the only way to be truly confident the plan works. The exam may ask which test provides the most definitive validation — it is full interruption."},
          ]},
        ]
      },
    ],
    traps:["Compliance does not equal security — the exam always picks security","Reduce means mitigate, not avoid — avoid eliminates the activity","Ethics Canon 1 beats your employer — society comes first","Quantitative is not always best — qualitative fits early-stage risk","Preventive beats detective — stop it before it happens","Policy first, then controls — governance precedes technology","Administrative controls come before technical controls"],
    connects:["CISO mindset","Governance sets rules","Risk decides priority","Law defines limits","People carry it out","BCP keeps it running"]
  },
  {
    id:2, color:"#3B6D11", pct:"10%", qs:"~13",
    name:"Asset Security", short:"Asset Security",
    hook:"Know what you have, who owns it, and what it is worth. Then protect it accordingly.",
    clusters:[
      {label:"Data classification", color:"#3B6D11",
       groups:[
        {label:"Ownership", chips:[
          {name:"Data owner",explain:"The data owner is the business executive or senior manager responsible for a specific dataset or information type. They decide the classification level, who can access the data, and what the acceptable uses are. The owner is accountable for the data but does not necessarily handle it day-to-day.",insight:"The data owner makes decisions about the data. They set classification and access policy. They are not necessarily the person who created the data — ownership is a business responsibility, not a technical one."},
          {name:"Data custodian",explain:"The data custodian is responsible for the day-to-day management and protection of data on behalf of the owner. This is typically an IT function — implementing the access controls, performing backups, maintaining the systems that store the data. The custodian implements; the owner decides.",insight:"Owner decides, custodian implements. This distinction is heavily tested. If a question asks who grants access to data, the answer is the owner. If it asks who implements the access control, the answer is the custodian."},
          {name:"Data processor",explain:"Under GDPR terminology, a data processor is an organisation that processes personal data on behalf of another organisation (the controller). A cloud provider storing your customer data is a processor. The processor acts on the controller's instructions and cannot use the data for their own purposes.",insight:"Data controller determines the purpose; data processor acts on instructions. If a question involves a third party handling your customer data, think about the controller-processor relationship and the obligations that flow from it."},
          {name:"System owner",explain:"The system owner is responsible for a specific IT system — its operation, security, and compliance. They work with the data owner to ensure the system meets the requirements set for the data it handles. A system may hold data from multiple owners, and the system owner must serve all of them.",insight:"System owners are accountable for the systems, data owners for the data. In practice these roles sometimes overlap, but conceptually they are distinct and the exam tests the distinction."},
        ]},
        {label:"Classification levels", chips:[
          {name:"Top secret",explain:"The highest government classification level. Unauthorised disclosure of top secret information is expected to cause exceptionally grave damage to national security. Access requires full background clearance and specific need-to-know authorisation for each piece of information.",insight:"Government classifications go from highest to lowest: Top Secret, Secret, Confidential, Unclassified. Know the order and the approximate harm level each represents."},
          {name:"Secret",explain:"Secret information, if disclosed without authorisation, would cause serious damage to national security. It requires significant security clearance to access. Less restrictive than top secret but still highly controlled.",insight:"The key differentiator between classification levels is the severity of harm from unauthorised disclosure. Top Secret = exceptionally grave; Secret = serious; Confidential = damage; Unclassified = minimal or no damage."},
          {name:"Confidential",explain:"The lowest government classification for sensitive information. Unauthorised disclosure would cause damage but not at the level of the higher classifications. This is the category most government workers with standard clearance will encounter.",insight:"In a government context, Confidential is the lowest sensitive tier. In a commercial context, Confidential is often the highest tier — different organisations use the same words differently."},
          {name:"Commercial tiers",explain:"Commercial organisations use different classification schemes. Common tiers are: Confidential (most sensitive — business secrets, financial data), Private (sensitive but less critical), Sensitive (requires care in handling), Public (freely shareable). The labels vary by organisation — what matters is having a clear, documented scheme.",insight:"Commercial classification schemes vary. The exam does not test a single standard commercial scheme — instead it tests your understanding of why classification matters and how it drives handling requirements."},
        ]},
        {label:"Labelling & handling", chips:[
          {name:"Marking",explain:"Once data is classified, it must be labelled so that anyone who handles it knows what classification it carries and therefore how to treat it. Labels appear on documents, files, storage media, emails. Without marking, classification is meaningless — people cannot follow handling rules they cannot see.",insight:"Classification without marking is incomplete. The exam may present scenarios where data is classified but unlabelled — the correct response involves ensuring data is properly marked so handling requirements are visible."},
          {name:"Handling requirements",explain:"Each classification level has specific handling rules: who can access it, how it must be stored, how it must be transmitted, and how it must be destroyed. Higher classification means stricter requirements. Handling procedures must be documented and trained into staff.",insight:"Handling requirements flow directly from classification. If the exam asks what determines how data must be stored or transmitted, the answer is its classification level."},
          {name:"Classification drives controls",explain:"The classification of data is the primary driver for selecting security controls. Higher classification demands stronger controls — more restrictive access, stronger encryption, more rigorous disposal. Getting classification right is therefore more important than any individual control decision.",insight:"This is a meta-principle. If you are unsure which control is appropriate, ask yourself: what is the classification of the data? That should point you to the right answer."},
        ]},
      ]},
      {label:"Data handling and privacy", color:"#639922",
       groups:[
        {label:"Privacy principles", chips:[
          {name:"Data minimisation",explain:"Only collect the data you actually need for the stated purpose. Do not collect it just because you might find it useful someday. Excess data is excess risk — it increases your attack surface, compliance obligations, and potential liability if breached.",insight:"Data minimisation is a core GDPR principle and increasingly a baseline expectation across privacy frameworks. The exam may present scenarios where an organisation collects more data than necessary — the correct response involves reducing collection to what is strictly required."},
          {name:"Purpose limitation",explain:"Data collected for one purpose should not be used for another without fresh consent or lawful basis. If you collect an email address to send a receipt, you cannot then use it for marketing without separate consent. Purpose must be specified at the time of collection.",insight:"Purpose limitation is about use, not just collection. Even legitimately collected data can be misused if applied to purposes beyond the original stated intent."},
          {name:"Storage limitation",explain:"Data should not be kept longer than necessary for the purpose for which it was collected. Retention schedules define how long different data types are kept and what happens at the end of that period. Keeping data longer than necessary increases risk and violates most privacy frameworks.",insight:"Retention is a privacy obligation, not just an operational decision. The exam may ask about data that is being held beyond its purpose — the correct response involves deletion or anonymisation."},
          {name:"Accuracy",explain:"Personal data must be kept accurate and up to date. Inaccurate data can harm individuals — incorrect medical records, wrong financial information — and creates compliance risk. Organisations should have processes for individuals to correct their data and for proactively updating records.",insight:"Accuracy is one of the GDPR data quality principles. The right to rectification gives individuals the legal right to have incorrect data corrected. Organisations must have processes to support this."},
        ]},
        {label:"Handling", chips:[
          {name:"Encrypt in transit",explain:"Data moving across a network must be encrypted to prevent interception. TLS for web traffic, encrypted VPNs for remote access, SFTP instead of FTP for file transfers. Unencrypted data in transit is readable by anyone who can intercept the network traffic.",insight:"Encryption in transit is a baseline expectation. The exam will not ask whether you should encrypt in transit — it will ask what protocol or mechanism is appropriate. Know TLS, IPSec, SSH, and SFTP."},
          {name:"Encrypt at rest",explain:"Data stored on disk, in databases, or on backups should be encrypted so that physical theft or unauthorised access to storage does not expose the data. Full-disk encryption, database encryption, and encrypted backups are all at-rest controls.",insight:"Encryption at rest protects against physical theft and unauthorised storage access. A stolen encrypted laptop is a much smaller incident than a stolen unencrypted one."},
          {name:"DLP",explain:"Data Loss Prevention tools monitor and control data in use, in motion, and at rest to prevent sensitive data from leaving the organisation without authorisation. DLP can block emails containing credit card numbers, prevent copying sensitive files to USB drives, or alert on large data transfers.",insight:"DLP is a detective and preventive control for data exfiltration. It does not prevent all breaches but catches many inadvertent disclosures and some deliberate ones. The exam may ask what type of tool prevents accidental data leakage — DLP is the answer."},
        ]},
        {label:"Retention", chips:[
          {name:"Retention schedules",explain:"A retention schedule defines how long each category of data must be kept, based on business need, legal requirements, and regulatory obligations. Different data types have very different retention requirements — financial records may need seven years, personnel files five years, some operational logs only 90 days.",insight:"Retention is driven by legal and regulatory requirements, not just business preference. The exam may ask who defines retention requirements — the answer involves legal and compliance teams, not just IT."},
          {name:"Legal holds",explain:"When litigation or investigation is anticipated or underway, organisations must suspend their normal retention schedule and preserve all potentially relevant data. Deleting data subject to a legal hold — even under normal retention policy — can constitute obstruction and carry severe penalties.",insight:"Legal holds override retention schedules. When a hold is in place, normal deletion processes must stop for the relevant data. The exam may present a scenario where data would normally be deleted — if litigation is pending, deletion is wrong."},
          {name:"Archive vs backup",explain:"Archives store data for long-term retention — regulatory compliance, historical records, audit trails. Backups exist for operational recovery — restoring systems after failure. The distinction matters: archives need long-term integrity and searchability; backups need speed and recoverability.",insight:"Do not confuse archive with backup. An archive is a business and compliance record. A backup is an operational recovery tool. Using backups as archives (or vice versa) creates gaps in both functions."},
        ]},
      ]},
      {label:"Data lifecycle", color:"#27500A",
       groups:[
        {label:"Phases", chips:[
          {name:"Create",explain:"Data is created when it is first captured or generated — by an application, a user, a sensor, a transaction. Classification should ideally be assigned at creation, before the data spreads across systems. The earlier classification happens, the more effective the subsequent controls.",insight:"Classification at creation is the ideal. In practice many organisations classify after the fact, which creates gaps. The exam favours proactive, early classification."},
          {name:"Store",explain:"Once created, data must be stored somewhere. Storage controls — encryption, access controls, integrity checks — must be appropriate for the classification. Where data is stored (cloud, on-premise, third party) affects which controls are needed and which compliance obligations apply.",insight:"Storage location affects compliance obligations. Data stored in a third-party cloud environment involves shared responsibility and may trigger data sovereignty requirements depending on jurisdiction."},
          {name:"Use",explain:"Data in active use — being read, processed, analysed, reported on — must be protected from unauthorised access and modification. Access controls, session management, and audit logging all apply to data in use. The risk profile during use differs from data at rest.",insight:"Data in use is often the most vulnerable state because it must be accessible to be useful. Controls must enable legitimate use while preventing misuse."},
          {name:"Share",explain:"When data moves between systems, organisations, or individuals, it picks up additional risk. Data sharing should be governed by agreements (data sharing agreements, data processing agreements under GDPR), classification-appropriate transmission controls, and clear purpose.",insight:"Sharing data does not transfer responsibility for it. The original owner retains accountability and should have contractual assurances about how the recipient handles the data."},
          {name:"Archive",explain:"Long-term storage of data that is no longer actively used but must be retained for compliance, legal, or historical reasons. Archives must maintain data integrity over long periods and remain searchable and retrievable when needed.",insight:"Archived data still requires protection commensurate with its classification. Old data can still be sensitive and still attract regulatory obligations."},
          {name:"Destroy",explain:"When data reaches the end of its retention period, it must be destroyed in a way that makes recovery impossible. Simply deleting a file is not sufficient — the underlying storage must be overwritten, degaussed, or physically destroyed depending on the classification and media type.",insight:"Destruction must be verifiable. For highly sensitive data, certificates of destruction may be required. The method must match the classification — a deleted file on an SSD is recoverable without proper disposal."},
        ]},
        {label:"Destruction methods", chips:[
          {name:"Degaussing",explain:"Degaussing exposes magnetic storage media to a strong magnetic field that randomises the magnetic domains, destroying the data. It works on traditional hard drives and magnetic tapes but has no effect on SSDs or optical media.",insight:"Degaussing only works on magnetic media. It is ineffective on SSDs, flash drives, and optical discs. The exam may give you a scenario involving SSD disposal — degaussing is the wrong answer."},
          {name:"Shredding",explain:"Physical destruction of storage media — grinding, crushing, or shredding the hardware into fragments too small to recover data from. Effective across all media types including SSDs, optical discs, and paper. High-security environments use cross-cut or micro-cut shredding.",insight:"Physical shredding is the most reliable destruction method across all media types. It is the correct answer when you need certainty about destruction, especially for SSDs where software methods may leave recoverable data."},
          {name:"Overwriting",explain:"Writing random data over existing data multiple times to make the original unrecoverable. Effective for traditional hard drives but less reliable for SSDs due to wear levelling, which may preserve copies of data in areas not addressed by the overwriting process.",insight:"Overwriting (also called wiping or zeroing) is acceptable for traditional hard drives but not for SSDs. For SSDs, physical destruction or cryptographic erasure are more reliable."},
          {name:"Cryptographic erasure",explain:"Rather than destroying the data itself, cryptographic erasure destroys the encryption key used to protect it. Without the key, the encrypted data is computationally unrecoverable. Particularly useful for cloud environments where physical destruction of storage media is not possible.",insight:"Cryptographic erasure is ideal for cloud and SSD environments. It is fast and reliable — as long as the key management was sound and the key is truly destroyed. The exam may present cloud storage disposal scenarios where this is the correct approach."},
        ]},
        {label:"Remanence", chips:[
          {name:"Data remanence",explain:"Data remanence is the residual representation of data that remains on storage media after deletion or clearing. Simply emptying the recycle bin or formatting a drive does not make data unrecoverable — forensic tools can often retrieve data from apparently cleared media.",insight:"Data remanence is why proper disposal matters. Sold or donated equipment that has not been properly sanitised is a significant data breach risk. The exam tests awareness of this risk and the controls that address it."},
          {name:"Clearing",explain:"Clearing overwrites data to prevent recovery using standard software tools. Cleared media can still be analysed by forensic laboratory equipment. It is appropriate for media that will remain within the organisation or be reused in environments with equivalent classification.",insight:"Clearing is the lowest level of sanitisation. It stops casual recovery but not dedicated forensic analysis. Use it when the media stays in a trusted environment."},
          {name:"Purging",explain:"Purging is a more thorough sanitisation process that ensures data cannot be recovered even by forensic laboratory techniques. Methods include multiple overwrite passes, degaussing, and cryptographic erasure. Purging is appropriate before media is transferred outside the organisation's control.",insight:"Purging is required when media leaves your control and contains sensitive data. It is more thorough than clearing and appropriate for higher classification data."},
        ]},
      ]},
      {label:"Asset controls", color:"#3B6D11",
       groups:[
        {label:"Scoping and tailoring", chips:[
          {name:"Baseline selection",explain:"A security baseline is a starting point — a defined set of controls that applies to a given system type. Selecting the right baseline means choosing a framework or standard appropriate to your environment, then using it as the foundation for your control set.",insight:"Baselines are starting points, not endpoints. They define the minimum — you may need to add controls above the baseline based on your specific risk environment."},
          {name:"Tailoring",explain:"Tailoring means adjusting a selected baseline to fit your specific environment — removing controls that do not apply, adding controls for unique risks, adjusting implementation details to match your technology stack. Tailoring is the process of making a generic standard relevant to your organisation.",insight:"Tailoring is a documented, justified process. You do not just ignore controls — you document why each omission or modification is appropriate for your environment."},
          {name:"Compensating controls",explain:"When a required control cannot be implemented — for technical, business, or operational reasons — a compensating control provides an alternative that achieves equivalent risk reduction. Compensating controls must provide similar protection and be documented with justification.",insight:"Compensating controls are not workarounds or excuses. They must genuinely compensate for the control they replace. Auditors will assess whether the compensating control actually reduces risk to the same level."},
        ]},
        {label:"Cloud assets", chips:[
          {name:"Shared responsibility",explain:"In cloud computing, security responsibilities are divided between the cloud provider and the customer. The provider is responsible for the security of the cloud infrastructure; the customer is responsible for what they put in the cloud — their data, applications, access controls, and configurations.",insight:"The boundary of shared responsibility depends on the service model: IaaS gives the customer more responsibility, SaaS gives them less. Misunderstanding this boundary is a major source of cloud security failures. The exam tests whether you understand what the customer is always responsible for: their data and access management."},
          {name:"Data sovereignty",explain:"Data sovereignty refers to the principle that data is subject to the laws of the country in which it is stored or processed. Storing EU citizen data on US servers may trigger compliance obligations under both GDPR and US law. Cloud providers with global infrastructure require careful jurisdiction planning.",insight:"Data sovereignty is increasingly tested as cloud adoption grows. Know that where data physically resides determines which legal frameworks apply — cloud geography matters for compliance."},
          {name:"Vendor lock-in",explain:"Vendor lock-in occurs when an organisation becomes so dependent on a specific provider's proprietary services that switching becomes prohibitively expensive or difficult. From a security perspective, lock-in limits your ability to respond to provider failures, price changes, or security incidents.",insight:"Vendor lock-in is a business continuity and risk concern, not just a commercial one. The exam may frame it as a risk that should be considered when selecting cloud services."},
        ]},
      ]},
    ],
    traps:["Owner decides, custodian implements — do not confuse them","Destruction must be verifiable — deletion is not destruction","Classification drives all controls — get it right first","Data remanence means deleted is not gone","Custodian implements the owner's decisions — not the other way around","Compensating controls must genuinely compensate — not just tick a box"],
    connects:["Classify it","Label it","Handle it right","Lifecycle it","Destroy it properly"]
  },
  {
    id:3, color:"#185FA5", pct:"13%", qs:"~16",
    name:"Security Architecture and Engineering", short:"Architecture",
    hook:"Build security into the design. A system that is secure by accident is not secure at all.",
    clusters:[
      {label:"Security models", color:"#185FA5",
       groups:[
        {label:"Confidentiality models", chips:[
          {name:"Bell-LaPadula",explain:"Bell-LaPadula is a formal access control model designed to protect confidentiality in environments with multiple classification levels. Its two core rules: no read up (a subject cannot read data at a higher classification) and no write down (a subject cannot write data to a lower classification level). The goal is to prevent sensitive information from flowing to less secure levels.",insight:"Bell-LaPadula = confidentiality. No read up, no write down. The write-down restriction is often counterintuitive — even if you have high clearance, you cannot write to a lower level because that would leak sensitive information downward."},
          {name:"Simple security property",explain:"The simple security property (no read up) prevents a subject from reading objects at a higher classification than their own clearance. A Secret-cleared user cannot read Top Secret documents. This protects information from unauthorised disclosure upward in the classification hierarchy.",insight:"Simple security property is the read rule in Bell-LaPadula. Remember it as: you can only read at or below your level."},
          {name:"Star property",explain:"The star property (no write down) prevents a subject from writing information to a lower classification level. Even a Top Secret-cleared user cannot write to Unclassified documents — doing so would create a channel for sensitive information to flow down to users with lower clearance.",insight:"Star property is the write rule in Bell-LaPadula. Remember it as: you can only write at or above your level. This is the rule people find counterintuitive — high-clearance users cannot write to low-clearance documents."},
        ]},
        {label:"Integrity models", chips:[
          {name:"Biba",explain:"Biba is the integrity counterpart to Bell-LaPadula. Where Bell-LaPadula protects confidentiality, Biba protects data integrity. Its rules are the mirror image: no read down (do not read from less trusted sources, as contamination flows upward) and no write up (do not write to higher integrity levels, as you might corrupt them).",insight:"Biba = integrity. No read down, no write up. This is the reverse of Bell-LaPadula. If Bell-LaPadula is about secrecy, Biba is about trustworthiness. Biba ensures that high-integrity data is not contaminated by low-integrity sources."},
          {name:"Clark-Wilson",explain:"Clark-Wilson is an integrity model designed for commercial environments. Rather than simple read/write rules, it uses well-formed transactions — defined operations that can only be performed by authorised subjects — to maintain data integrity. It enforces separation of duties and ensures data can only be modified through controlled procedures.",insight:"Clark-Wilson is more practical than Biba for commercial use. It is the model behind the idea that financial transactions must follow defined procedures and that no single person can manipulate data directly without going through the approved process."},
          {name:"Brewer-Nash",explain:"The Brewer-Nash model (also called the Chinese Wall) prevents conflicts of interest by dynamically restricting access based on what information a subject has already seen. Once you access information about one company, you are blocked from accessing information about competing companies in the same sector.",insight:"Brewer-Nash is the model for conflict-of-interest prevention — used in consulting and financial services. If a question involves preventing a consultant from accessing competitor data after already seeing one client's information, Brewer-Nash is the relevant model."},
        ]},
        {label:"Design concepts", chips:[
          {name:"Tranquility",explain:"The tranquility principle states that the classification of objects should not change while the system is operating. If classification levels changed dynamically, the security properties guaranteed by models like Bell-LaPadula would be undermined. Tranquility ensures the model's rules remain valid throughout a session.",insight:"Tranquility preserves the integrity of the security model. It prevents reclassification attacks where an attacker manipulates classification labels to gain access to information they should not see."},
          {name:"Subjects and objects",explain:"In access control models, subjects are active entities that request access — users, processes, programs. Objects are passive entities being accessed — files, databases, devices. Security policy defines the rules about which subjects can access which objects and in what ways.",insight:"The subject-object distinction is foundational to access control. Every access control decision involves a subject requesting an action on an object. Know this framing — it appears throughout Domain 3 and Domain 5."},
          {name:"Lattice-based access",explain:"Lattice-based access control uses a mathematical lattice structure to define relationships between security levels. Each subject and object is assigned a level in the lattice, and access is permitted only when the subject's level is greater than or equal to the object's level. Bell-LaPadula and Biba are both lattice-based models.",insight:"Lattice-based access control is the theoretical foundation for multilevel security systems used in government and defence. The exam may reference it when describing formal security models."},
        ]},
      ]},
      {label:"Cryptography", color:"#378ADD",
       groups:[
        {label:"Symmetric", chips:[
          {name:"AES",explain:"The Advanced Encryption Standard is the current gold standard for symmetric encryption. It supports key sizes of 128, 192, and 256 bits. AES-256 is considered unbreakable with current technology and is used everywhere from disk encryption to TLS. It is fast, efficient, and hardware-accelerated on modern processors.",insight:"AES is the symmetric algorithm you should default to. When the exam asks which symmetric algorithm is most appropriate for a modern system, AES is the answer. Know the key sizes: 128, 192, 256 bits."},
          {name:"DES / 3DES",explain:"DES (Data Encryption Standard) uses a 56-bit key and is now considered broken — modern hardware can brute-force it quickly. 3DES applies DES three times with different keys, making it significantly more resistant to brute force, but it is slow and deprecated. Both are legacy algorithms that should not be used for new implementations.",insight:"DES is broken. 3DES is deprecated. If the exam asks about weak or legacy encryption, DES is the answer. If asked what not to use in a modern system, both DES and 3DES are wrong choices."},
