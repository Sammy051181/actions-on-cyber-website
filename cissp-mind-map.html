          {name:"Black box",explain:"Black box testing simulates an external attacker with no prior knowledge of the target environment. The tester starts from scratch — reconnaissance, scanning, exploitation — just as an attacker would. It tests the full attack path but may miss internal vulnerabilities that only appear after authentication.",insight:"Black box = no knowledge. It most closely simulates an external attacker. It is the most realistic test of external defences but may not test internal controls or find vulnerabilities that require authenticated access."},
          {name:"White box",explain:"White box testing provides the tester with full knowledge of the environment — architecture, source code, credentials, network diagrams. It allows deeper, more focused testing and is more efficient at finding specific vulnerabilities. It does not simulate a realistic attacker but finds more vulnerabilities per unit of time.",insight:"White box = full knowledge. It is the most thorough approach for finding vulnerabilities but does not reflect the real attacker experience. It is appropriate when the goal is maximum vulnerability discovery rather than realistic simulation."},
          {name:"Grey box",explain:"Grey box testing falls between black and white box — the tester has partial knowledge, such as credentials for one account or a network diagram. It simulates an attacker who has already gained some foothold — an insider threat or a post-phishing scenario.",insight:"Grey box is the most common real-world approach. It simulates a realistic post-compromise scenario — an attacker who has gained some initial access. It is efficient and tests the paths most relevant to likely attack scenarios."},
          {name:"Rules of engagement",explain:"Before any penetration test, the scope, objectives, boundaries, and rules must be documented and agreed. What systems can be tested? What is out of scope? What techniques are prohibited? What happens if a critical system is affected? Rules of engagement protect both the organisation and the testers and are legally essential.",insight:"Rules of engagement are non-negotiable. Testing without them exposes testers to legal liability and can cause unintended damage to production systems. The exam expects you to know that pen testing requires documented, signed authorisation."},
        ]},
        {label:"Red / blue / purple", chips:[
          {name:"Red team",explain:"A red team conducts adversarial simulation — attacking the organisation using the same techniques, tactics, and procedures that real threat actors would use. Red team engagements are longer-running, less constrained than pen tests, and focus on achieving specific objectives (accessing sensitive data, persisting in the network) rather than enumerating vulnerabilities.",insight:"Red team = sophisticated, realistic adversarial simulation. It tests the full kill chain — from initial access through lateral movement to objective achievement. It is more comprehensive and realistic than a standard penetration test."},
          {name:"Blue team",explain:"The blue team is the organisation's defensive security team — those who detect, respond to, and contain the red team's attacks. Blue team performance is as much a measure of the organisation's security maturity as the red team's findings. A successful blue team detection is as valuable as a finding.",insight:"Blue team effectiveness determines how useful a red team exercise is. If the blue team detects and contains the red team quickly, that is a success. If the red team operates undetected for months, that reveals defensive gaps just as clearly as a vulnerability finding."},
          {name:"Purple team",explain:"Purple team exercises involve red and blue teams collaborating — the red team shares techniques as they are used, allowing the blue team to immediately test and improve detection and response. It is a learning exercise more than a realistic simulation, optimised for rapid improvement rather than accurate threat modelling.",insight:"Purple team = collaboration for improvement. It sacrifices some realism (the blue team knows what is coming) in exchange for faster capability development. It is particularly useful when the blue team needs to build detection coverage quickly."},
        ]},
        {label:"Code review", chips:[
          {name:"SAST",explain:"Static Application Security Testing analyses source code, bytecode, or binaries without executing the application. It finds vulnerabilities in the code itself — SQL injection patterns, buffer overflow risks, hardcoded credentials — before the application is run. It can be integrated into the development pipeline to catch issues early.",insight:"SAST analyses code without running it. It finds vulnerabilities early — in the development phase — when they are cheapest to fix. It cannot find runtime vulnerabilities that depend on application state or external input."},
          {name:"DAST",explain:"Dynamic Application Security Testing tests a running application by sending inputs and analysing responses — simulating attacker interaction. It finds vulnerabilities that only appear at runtime — injection flaws, authentication weaknesses, session management issues — that SAST might miss because they depend on actual execution.",insight:"DAST tests the running application. It finds runtime vulnerabilities that SAST cannot see. It does not require access to source code, making it useful for testing third-party applications. SAST and DAST are complementary — use both for comprehensive coverage."},
          {name:"IAST",explain:"Interactive Application Security Testing instruments the running application with sensors that monitor execution in real-time as tests are run. It combines the depth of SAST (seeing inside the application) with the realism of DAST (testing during actual execution). It reduces false positives compared to both approaches used alone.",insight:"IAST is the most accurate approach because it sees both the code and the runtime behaviour simultaneously. It requires instrumentation of the application, which limits its use to applications you control. The exam may contrast IAST with SAST and DAST in terms of accuracy and applicability."},
        ]},
      ]},
      {label:"Audit and compliance", color:"#1D9E75",
       groups:[
        {label:"Audit types", chips:[
          {name:"Internal audit",explain:"Internal audits are conducted by the organisation's own audit function — independent of the security team but internal to the organisation. They assess whether controls are implemented and effective, identify gaps, and report to leadership and the audit committee. Internal audits provide ongoing assurance between external audits.",insight:"Internal audit is independent of security operations but internal to the organisation. They report findings to leadership, not to the security team they are assessing. Independence is essential — internal auditors should not audit functions they are part of."},
          {name:"External audit",explain:"External audits are conducted by independent third parties — accounting firms, specialist security auditors. They provide an objective assessment uninfluenced by internal politics or culture. External audit findings carry more weight with customers, regulators, and partners than internal assessments.",insight:"External audits provide independent assurance. Their objectivity is their primary value. Customers and regulators typically require external audits because they cannot be influenced by the organisation being assessed."},
          {name:"SOC 1",explain:"A SOC 1 report focuses on an organisation's internal controls over financial reporting. It is relevant for service providers whose services affect their customers' financial statements — payroll processors, transaction processors. Audited under SSAE 18 (US) or ISAE 3402 (international).",insight:"SOC 1 = financial reporting controls. If a question involves a service provider that handles transactions or financial data, SOC 1 is the relevant report. It is not a general security certification."},
          {name:"SOC 2",explain:"A SOC 2 report assesses controls relevant to the five Trust Service Criteria: security, availability, processing integrity, confidentiality, and privacy. Type I assesses whether controls are designed appropriately at a point in time. Type II assesses whether controls operated effectively over a period (typically 6-12 months).",insight:"SOC 2 Type II is the gold standard for cloud service providers. Type I is a design assessment; Type II proves operating effectiveness over time. The exam distinguishes Type I (point in time) from Type II (period of time) — Type II provides much stronger assurance."},
        ]},
        {label:"Audit process", chips:[
          {name:"Planning",explain:"Audit planning defines the scope, objectives, methodology, and resources for the audit. It identifies the systems, processes, and controls to be assessed and the criteria against which they will be measured. Planning determines the quality and relevance of everything that follows.",insight:"Audit planning sets the direction. Poor planning leads to audits that miss important areas or waste time on irrelevant ones. The exam expects you to understand that planning is the first and arguably most critical phase of any audit."},
          {name:"Fieldwork",explain:"Fieldwork is the evidence-gathering phase — interviews, document review, observation, and testing of controls. Auditors collect and evaluate evidence against the audit criteria established in planning. The quality of fieldwork evidence determines the reliability of audit conclusions.",insight:"Evidence quality matters in fieldwork. Auditors look for sufficient, reliable, and relevant evidence. Unverifiable claims or outdated documents are weak evidence. The strength of audit conclusions depends on the strength of the evidence gathered."},
          {name:"Reporting",explain:"Audit reports communicate findings to the appropriate stakeholders — management, the board, regulators. Reports typically include the scope and methodology, findings with evidence, risk ratings, and recommendations for remediation. Different audiences need different levels of detail.",insight:"Audit reports must be clear and actionable. Findings should be rated by risk, supported by evidence, and accompanied by practical recommendations. The exam may ask about what a report should contain or who it should be addressed to."},
          {name:"Follow-up",explain:"Audit follow-up verifies that findings have been remediated within agreed timelines. Without follow-up, audits become exercises in documentation rather than genuine improvement. Unresolved findings from previous audits that reappear in subsequent audits indicate a failure of governance.",insight:"Follow-up closes the audit loop. Findings without remediation tracking are just observations. The exam treats follow-up as an essential component of the audit process, not an optional afterthought."},
        ]},
      ]},
      {label:"Security metrics", color:"#04342C",
       groups:[
        {label:"KPIs", chips:[
          {name:"Patch compliance",explain:"Patch compliance rate measures the percentage of systems patched within the required timeframe. It is one of the most direct indicators of an organisation's vulnerability exposure. A high patch compliance rate means known vulnerabilities are addressed quickly; a low rate indicates unacceptable risk accumulation.",insight:"Patch compliance is a leading indicator of security posture. Unpatched systems are among the most commonly exploited attack vectors. The exam treats patch management as a foundational operational security control."},
          {name:"MTTD",explain:"Mean Time to Detect measures the average time between when a security incident begins and when it is detected. Low MTTD means threats are identified quickly, limiting the window for damage. High MTTD means attackers may operate in your environment for extended periods before being noticed.",insight:"MTTD is a detection effectiveness metric. The shorter the better. The exam contrasts MTTD with MTTR — detecting quickly is necessary but not sufficient; responding quickly matters equally."},
          {name:"MTTR",explain:"Mean Time to Respond (or Remediate) measures the average time between detection and containment or resolution. It reflects the effectiveness of the incident response process. High MTTR means threats persist longer after detection, giving attackers more opportunity to expand their access or complete their objectives.",insight:"MTTR measures response speed. Low MTTD combined with low MTTR gives a minimal overall window of exposure. The exam may ask about metrics that measure incident response effectiveness — MTTR is the primary one."},
        ]},
        {label:"Reporting", chips:[
          {name:"Executive dashboards",explain:"Security metrics presented to leadership must be translated from technical language into business terms — risk, financial exposure, compliance status, trend direction. Executives need enough information to make decisions without technical detail that obscures the key messages.",insight:"Executive reporting is about business risk, not technical detail. The exam expects you to understand that different audiences need different information. Reporting patch counts to executives is less useful than reporting risk exposure and trend direction."},
          {name:"Heat maps",explain:"Heat maps visually represent risk across a matrix — typically likelihood versus impact — allowing quick identification of the highest-priority risks. They make risk distribution intuitive and support communication with non-technical stakeholders who may not engage well with numerical risk tables.",insight:"Heat maps are visual risk communication tools. They are effective for board presentations and executive reviews because they convey relative risk intuitively. The exam may present heat maps in the context of risk reporting and prioritisation."},
          {name:"Trend analysis",explain:"Security metrics gain most value when tracked over time. Trend analysis shows whether the security posture is improving, static, or deteriorating. A single data point tells you where you are; a trend tells you where you are going. Rising MTTD over several months signals a detection capability problem.",insight:"Trends are more actionable than snapshots. A single good month may be noise; a consistent improvement over six months reflects genuine capability development. The exam favours ongoing measurement and trend tracking over point-in-time assessments."},
        ]},
      ]},
      {label:"Testing techniques", color:"#0F6E56",
       groups:[
        {label:"Log review", chips:[
          {name:"SIEM",explain:"Security Information and Event Management systems collect logs from across the environment, normalise them, correlate related events, and generate alerts on suspicious patterns. SIEM is the central platform for detection — it turns raw log data into actionable security intelligence by identifying patterns that no individual log source would reveal alone.",insight:"SIEM is detective, not preventive. It detects events that have occurred or are occurring. The value of SIEM depends entirely on the quality of the log sources feeding it, the correlation rules configured, and the analysts reviewing alerts."},
          {name:"Log integrity",explain:"Logs are only valuable for investigation if they can be trusted — if an attacker can modify logs after an incident, the record is unreliable. Log integrity controls include write-once storage, cryptographic signing of log entries, and forwarding logs to a separate, protected system immediately upon generation.",insight:"Log integrity is essential for forensics and legal proceedings. Logs stored only on the compromised system cannot be trusted — the attacker may have modified them. The exam expects you to understand that logs must be protected from the systems they monitor."},
          {name:"Retention requirements",explain:"Log retention periods must meet regulatory requirements, business needs, and forensic timelines. Many regulations specify minimum retention periods — PCI-DSS requires one year, HIPAA requires six years. Retention must also be long enough to support incident investigation — sophisticated attacks may not be discovered for months.",insight:"Retention must balance storage cost against forensic and compliance need. Too short and you cannot investigate incidents or meet regulatory requirements. The exam may ask what determines appropriate log retention — regulations, forensic requirements, and business need all factor in."},
        ]},
        {label:"Interface testing", chips:[
          {name:"API testing",explain:"API testing assesses the security of application programming interfaces — the mechanisms through which applications communicate. API vulnerabilities include broken authentication, excessive data exposure, missing rate limiting, and injection flaws. The OWASP API Security Top 10 provides a testing framework.",insight:"APIs are increasingly the primary attack surface. Many applications expose functionality through APIs that would be protected in the UI — missing input validation, excessive data in responses, unauthenticated endpoints. API testing must be part of every application security programme."},
          {name:"Input validation",explain:"Testing for input validation weaknesses involves sending unexpected, malformed, or malicious input to application inputs and observing how the application handles it. If the application processes the malicious input rather than rejecting it, vulnerabilities like SQL injection, XSS, and command injection may exist.",insight:"Input validation is the root cause of many application vulnerabilities. The exam treats it as a foundational secure coding requirement and a testing priority. All inputs from any external source — users, other systems, APIs — must be validated before use."},
        ]},
        {label:"Breach simulation", chips:[
          {name:"BAS tools",explain:"Breach and Attack Simulation tools continuously and safely simulate attacker techniques against production environments to test whether security controls detect and prevent them. Unlike periodic pen tests, BAS runs continuously, providing real-time feedback on control effectiveness as the environment changes.",insight:"BAS provides continuous rather than periodic validation. The exam may contrast BAS with traditional pen testing — BAS is ongoing and automated; pen tests are periodic and manual. BAS is particularly valuable for validating that controls remain effective after changes."},
          {name:"Assumed breach",explain:"The assumed breach approach to security testing starts from the premise that the attacker already has access — perhaps through phishing or supply chain compromise — and tests how quickly and completely the organisation can detect, contain, and eradicate the threat. It skips the initial access phase and focuses on post-compromise detection.",insight:"Assumed breach shifts the focus from prevention to detection and response. It tests the controls that matter after the perimeter has been breached. The exam recognises that no perimeter is impenetrable and that detection and response capability is essential."},
        ]},
      ]},
    ],
    traps:["Vulnerability scanning is not a penetration test — it identifies, not exploits","SOC 2 Type II covers a period of time — Type I is a point in time","Fix critical vulnerabilities on critical assets first — CVSS alone does not set priority","Black box = no knowledge, white box = full knowledge — know each","CVSS score reflects inherent severity not your actual risk","Logs must be stored separately to maintain integrity"],
    connects:["Assess","Test","Audit","Measure","Report","Remediate","Repeat"]
  },
  {
    id:7, color:"#993556", pct:"13%", qs:"~16",
    name:"Security Operations", short:"Operations",
    hook:"Detect, respond, recover, repeat. Every incident is a lesson if you close the loop.",
    clusters:[
      {label:"Incident response", color:"#993556",
       groups:[
        {label:"IR phases", chips:[
          {name:"Preparation",explain:"Preparation is everything you do before an incident occurs — building the IR team, defining roles and escalation paths, creating playbooks for common incident types, ensuring tools are in place, and training staff. Organisations that prepare well respond faster and more effectively when incidents occur.",insight:"Preparation determines response quality. The exam consistently treats preparation as the most important phase — it is easier and cheaper to prepare than to improvise under pressure. A well-prepared team containing an incident in hours is far better than an unprepared team taking days."},
          {name:"Detection",explain:"Detection is the identification that an incident has occurred or is occurring. It draws on SIEM alerts, endpoint detection tools, user reports, threat intelligence feeds, and anomaly detection. Fast, accurate detection minimises the dwell time — the period an attacker operates undetected.",insight:"Detection quality depends on visibility. You can only detect what you can see. Gaps in log coverage, missing endpoint agents, and un-monitored network segments create blind spots. The exam treats comprehensive monitoring as a prerequisite for effective detection."},
          {name:"Containment",explain:"Once an incident is detected, the immediate priority is stopping it from spreading. Containment means isolating affected systems, blocking attacker communication channels, disabling compromised accounts, and preventing lateral movement. Containment does not mean remediation — you do not fix the problem during containment, you stop it from getting worse.",insight:"Contain before you eradicate. If you immediately start cleaning up systems, you may destroy evidence and miss compromised systems that the attacker has already moved to. Containment first, evidence preservation alongside it, eradication after."},
          {name:"Eradication",explain:"Eradication removes the attacker's presence — malware, backdoors, compromised accounts, unauthorised changes. It is more thorough than containment and requires understanding how the attacker got in and what they did. Incomplete eradication leads to re-infection when systems are restored to service.",insight:"Eradication comes after containment and before recovery. The exam sequence is: contain first, then eradicate, then recover. Rushing to recovery without proper eradication risks bringing compromised systems back into service."},
          {name:"Recovery",explain:"Recovery restores systems to normal operation — restoring from clean backups, patching vulnerabilities that were exploited, implementing additional controls, and gradually returning systems to service with enhanced monitoring. Recovery is not just technical — it includes restoring business operations.",insight:"Recovery requires enhanced monitoring. Systems returning from an incident should be watched more closely than normal until confidence is established that eradication was complete. The exam expects you to understand that recovery is not instantaneous and requires ongoing vigilance."},
          {name:"Lessons learned",explain:"After every incident, the IR team should document what happened, what worked, what did not, and what should change. Lessons learned meetings should include all relevant stakeholders and result in concrete improvements to playbooks, detection, controls, or training. This phase is what transforms incidents into improvements.",insight:"Lessons learned closes the loop. The exam treats this phase as essential, not optional. Organisations that skip it repeat the same incidents. Document findings, agree improvements, assign owners, and track implementation — that is how security programmes improve."},
        ]},
        {label:"Detection", chips:[
          {name:"IOCs",explain:"Indicators of Compromise are artifacts that suggest a system has been compromised — specific file hashes, IP addresses, domain names, registry keys, or behavioural patterns associated with known malware or attacker techniques. IOCs are used to search for signs of compromise across the environment and to create detection rules.",insight:"IOCs are the signatures of attacks. They are retrospective — they identify known attack patterns. IOCs are shared through threat intelligence feeds and used in SIEM rules. The limitation: IOCs only detect known threats; novel attacks have no IOCs until discovered."},
          {name:"Threat intel",explain:"Threat intelligence provides actionable information about current threats — attacker tactics, techniques, and procedures (TTPs), indicators of compromise, targeted sectors, and active campaigns. Good threat intelligence is specific, timely, and actionable — telling you what to look for and why.",insight:"Threat intelligence enables proactive defence. By knowing what attackers are doing to organisations like yours, you can prioritise controls and detection rules before being targeted. The exam treats threat intelligence as a component of detection and preparation."},
          {name:"SOC triage",explain:"A Security Operations Centre receives a high volume of alerts, most of which are false positives. Triage is the process of quickly assessing each alert to determine whether it represents a real threat requiring investigation, a false positive that can be dismissed, or an alert that needs tuning to reduce noise. Effective triage prevents alert fatigue.",insight:"Alert fatigue is a real risk. Analysts overwhelmed by false positives begin ignoring alerts — the opposite of what the tools were intended to achieve. Good triage, tuned detection rules, and automation are the controls that maintain analyst effectiveness."},
        ]},
        {label:"Communication", chips:[
          {name:"Escalation paths",explain:"Incident response requires clear escalation paths — who gets notified at each severity level, who has authority to make which decisions, and how information flows between technical responders and leadership. Unclear escalation during an incident causes delays and poor decisions.",insight:"Escalation paths must be pre-defined and practised. During an incident is not the time to figure out who needs to know. The exam expects escalation planning as part of preparation — knowing in advance who to call at each severity level."},
          {name:"Legal notification",explain:"Many incidents trigger legal notification obligations — to regulators, affected customers, or law enforcement. GDPR requires notification within 72 hours of discovering a personal data breach. Other regulations have different timelines. Legal and compliance teams must be involved early in significant incidents.",insight:"Regulatory breach notification is time-limited. Under GDPR, 72 hours from discovery is the deadline — not from when the breach occurred, but from when it was discovered. Late notification can result in additional penalties on top of those for the breach itself."},
          {name:"Regulatory reporting",explain:"Different incidents trigger different reporting obligations depending on the industry, the type of data affected, and the jurisdiction. Financial incidents may need reporting to regulators. Healthcare breaches trigger HIPAA notification. Knowing your reporting obligations before an incident is essential — scrambling to understand legal requirements during a crisis is avoidable.",insight:"Know your reporting obligations before you need them. The exam tests whether you understand that different regulations impose different notification requirements to different bodies. Preparation includes mapping your regulatory landscape so you know who to notify and when."},
        ]},
      ]},
      {label:"Investigations and forensics", color:"#D4537E",
       groups:[
        {label:"Forensic process", chips:[
          {name:"Identification",explain:"The first step in digital forensics is identifying what evidence exists and where — which systems, storage devices, logs, or cloud accounts may contain relevant information. Scoping the evidence landscape correctly prevents both under-collection (missing important evidence) and over-collection (wasting resources and complicating analysis).",insight:"Identification determines what you look for. Poor identification leads to missed evidence or investigation of irrelevant systems. The exam expects you to understand that forensic investigation is structured and methodical, not random."},
          {name:"Preservation",explain:"Evidence must be preserved in a state that ensures its integrity and admissibility. For digital evidence, this means creating forensic images (bit-for-bit copies) of storage media rather than working on original devices. Write blockers prevent accidental modification of the original during imaging.",insight:"Preserve before examining. Working on original evidence risks modifying it — even booting a system changes timestamps and may overwrite data. Forensic images allow analysis while keeping the original untouched and admissible in legal proceedings."},
          {name:"Collection",explain:"Collection gathers the identified and preserved evidence according to documented procedures. The order of collection should follow volatility — collect the most volatile evidence first (RAM, running processes, network connections) before it disappears, then move to more persistent storage.",insight:"Collect in order of volatility. RAM contains running processes, network connections, and potentially encryption keys — it disappears when power is lost. Collect volatile evidence first, then disk images, then logs and other persistent sources."},
          {name:"Chain of custody",explain:"Chain of custody is the documented, unbroken record of who had access to evidence, when, and what they did with it. Every person who handles evidence must be recorded. Any gap in the chain undermines the admissibility of evidence in legal proceedings.",insight:"Chain of custody is non-negotiable for legal proceedings. A gap — undocumented handling, improperly sealed evidence, or a missing record — can render evidence inadmissible. The exam treats chain of custody as a fundamental forensic requirement."},
          {name:"Analysis",explain:"Analysis examines collected evidence to answer the investigative questions — who did what, when, how, and from where. Digital forensic analysis includes timeline analysis, file recovery, log analysis, malware analysis, and network traffic analysis. Analysis must be documented thoroughly to support reporting and legal proceedings.",insight:"Analysis is documented and reproducible. A forensic analyst must be able to explain their methodology and reproduce their results. Analysis that cannot be explained or reproduced is not reliable evidence in legal or disciplinary proceedings."},
          {name:"Presentation",explain:"Forensic findings must be presented in a form appropriate for the audience — technical details for investigators, business impact for executives, and admissible evidence for legal proceedings. Expert witnesses may present forensic findings in court, explaining complex technical matters in terms a jury can understand.",insight:"Presentation translates technical findings into understandable conclusions. The exam may ask about the role of an expert witness in presenting forensic evidence — their role is to explain technical findings clearly and objectively to non-technical decision-makers."},
        ]},
        {label:"Legal considerations", chips:[
          {name:"eDiscovery",explain:"Electronic discovery is the process of identifying, preserving, collecting, and producing electronically stored information in response to a legal matter. Organisations must be able to respond to eDiscovery requests efficiently and completely — failure can result in sanctions and adverse court rulings.",insight:"eDiscovery preparedness requires good information management. If you cannot find and produce relevant data when required by a court, the consequences can be severe. Data classification, retention, and search capability all contribute to eDiscovery readiness."},
          {name:"Legal hold",explain:"When litigation is anticipated or commenced, organisations must issue a legal hold — suspending normal retention and destruction schedules for relevant data. Continuing to delete data that is subject to a legal hold, even under normal policy, can constitute spoliation of evidence.",insight:"Legal holds override retention policy. The moment litigation is reasonably anticipated, preservation obligations begin. Deleting data after a hold should have been in place — even unintentionally — can result in sanctions and adverse inferences in court."},
          {name:"Admissibility",explain:"For digital evidence to be admissible in court, it must be relevant, authentic, and obtained legally. Authentication requires demonstrating that the evidence is what it purports to be and has not been tampered with — which is what chain of custody and forensic imaging support.",insight:"Admissibility depends on integrity. Improperly collected or handled evidence may be excluded. The entire forensic process — preservation, chain of custody, documented methodology — exists to ensure evidence meets admissibility requirements."},
        ]},
      ]},
      {label:"Operations security", color:"#4B1528",
       groups:[
        {label:"Change management", chips:[
          {name:"CAB",explain:"The Change Advisory Board reviews and approves significant changes to systems and infrastructure before implementation. It brings together representatives from IT operations, security, business, and often end-users to evaluate the risk, impact, and timing of proposed changes.",insight:"CAB is a governance control over change. It prevents unreviewed changes that could introduce vulnerabilities or disrupt services. The exam treats the CAB as the mechanism for ensuring changes are assessed for security and operational impact before going live."},
          {name:"RFC process",explain:"A Request for Change formally documents a proposed change — what is changing, why, the risk assessment, rollback plan, implementation steps, and testing requirements. The RFC process ensures changes are thought through and documented before approval, not improvised during implementation.",insight:"RFC documentation creates accountability and enables rollback. A well-documented RFC means that if something goes wrong, the team knows exactly what changed and how to reverse it. Undocumented changes are a common cause of security incidents."},
          {name:"Emergency change",explain:"Emergency changes bypass normal approval processes to address critical situations — a live exploit being actively used, a critical system down. Emergency changes should have expedited approval (not no approval), must be documented immediately after implementation, and reviewed in the next CAB meeting.",insight:"Emergency changes need expedited approval, not no approval. Someone with authority must still approve. The exam may present scenarios where a security team bypasses change control entirely under pressure — this is wrong even in emergencies."},
          {name:"Rollback planning",explain:"Every change should have a rollback plan — documented steps to return the system to its pre-change state if the change causes problems. Without a rollback plan, a failed change that cannot be reversed can cause extended outages.",insight:"Rollback planning is a change management requirement, not an optional extra. Changes without rollback plans are higher-risk changes. The exam pairs rollback planning with testing as essential components of safe change management."},
        ]},
        {label:"Patch management", chips:[
          {name:"Test before deploy",explain:"Patches should be tested in a representative non-production environment before being deployed to production systems. A patch that breaks an application or introduces instability is an availability incident waiting to happen. Testing catches compatibility issues without risking production.",insight:"Test in a non-production environment that reflects production — same OS, same application stack. A test that does not reflect the production environment provides false assurance. Patches that break things in production without prior testing represent a change management failure."},
          {name:"Emergency patching",explain:"When an actively exploited vulnerability requires immediate patching, the normal patch testing and approval timeline is compressed — but not eliminated. Emergency patching still requires approval, testing where time permits, and documentation. The risk of not patching is weighed against the risk of an untested patch.",insight:"Emergency patches require accelerated approval, not bypassed approval. Deploying an untested patch on a critical production system can cause an outage. The exam expects you to balance the risk of the vulnerability against the risk of the patch."},
          {name:"EOL systems",explain:"End-of-life systems no longer receive security patches from the vendor — they accumulate vulnerabilities with no fix available. EOL systems should be replaced or isolated. If replacement is not immediately possible, compensating controls — network segmentation, application-layer protection, enhanced monitoring — should reduce exposure.",insight:"EOL systems are a persistent risk. The exam may present scenarios with systems that cannot be patched — the correct response involves isolation and compensating controls, not simply accepting the risk without action."},
        ]},
        {label:"Monitoring", chips:[
          {name:"SIEM",explain:"A SIEM centralises log collection, normalisation, correlation, and alerting. It turns disparate log sources — firewalls, endpoints, applications, identity systems — into a unified picture of security activity. Correlation rules identify patterns across sources that no single log would reveal.",insight:"SIEM value depends on log coverage and rule quality. A SIEM that does not receive logs from critical systems is blind to events on those systems. Regular review and tuning of correlation rules ensures the SIEM detects relevant threats without drowning analysts in false positives."},
          {name:"SOAR",explain:"Security Orchestration, Automation, and Response platforms automate repetitive incident response tasks — blocking IPs, disabling accounts, isolating hosts, creating tickets — that would otherwise require manual analyst action. SOAR speeds response times and allows analysts to focus on higher-judgment tasks.",insight:"SOAR automates the routine; analysts handle the complex. SOAR is most valuable for high-volume, well-understood incident types where the response actions are known in advance. It does not replace analyst judgement — it frees it for where it is most needed."},
          {name:"Log sources",explain:"A security monitoring programme is only as good as its log sources. Critical sources include network traffic (firewall, proxy logs), identity events (authentication, privilege use), endpoint activity (process execution, file changes), and application logs. Gaps in log coverage are gaps in visibility.",insight:"Log coverage determines detection capability. The exam expects you to understand that SIEM is useless without comprehensive, high-quality log sources. Identifying and filling log coverage gaps is an ongoing operational security activity."},
        ]},
      ]},
      {label:"Recovery and resilience", color:"#993556",
       groups:[
        {label:"Site types", chips:[
          {name:"Hot site",explain:"A hot site is a fully equipped, continuously operational recovery facility with all hardware, software, and data replicated in near real-time. Failover can occur within minutes to hours. It is the most expensive option because you are paying for a fully operational duplicate of your primary environment.",insight:"Hot site = fastest recovery, highest cost. It supports very short RTOs — hours or less. The expense is justified for systems where even a few hours of downtime causes significant financial or operational harm. The exam pairs hot sites with short RTOs."},
          {name:"Warm site",explain:"A warm site has the hardware and infrastructure in place but systems are not fully configured or data is not fully current. It requires hours to days of preparation before it can handle production load. It is less expensive than a hot site but provides slower recovery.",insight:"Warm site = moderate recovery time, moderate cost. Data must be restored and systems configured before failover — typically hours to a day or two. It is appropriate for systems where some downtime is tolerable but complete cold restart is unacceptable."},
          {name:"Cold site",explain:"A cold site provides the physical space and basic infrastructure (power, cooling, connectivity) but no equipment. In a disaster, hardware must be procured and installed, systems built, and data restored — a process that can take days to weeks. It is the least expensive option but has the longest recovery time.",insight:"Cold site = slowest recovery, lowest cost. Only appropriate when extended downtime (days to weeks) is tolerable. For most business-critical systems, cold sites are insufficient. They may be used for less critical systems as part of a tiered recovery strategy."},
          {name:"Cloud DR",explain:"Cloud-based disaster recovery uses cloud infrastructure as the recovery environment — spinning up virtual machines and restoring data to cloud storage on demand. It offers significant cost advantages over physical hot and warm sites because you only pay for full capacity when actually needed during a failover.",insight:"Cloud DR is increasingly replacing traditional warm sites. The ability to scale resources on demand during a disaster and pay only for what you use makes it economically attractive. The exam recognises cloud DR as a modern, cost-effective alternative to traditional site strategies."},
        ]},
        {label:"Backup strategies", chips:[
          {name:"Full backup",explain:"A full backup copies all data, regardless of whether it has changed since the last backup. It is the most comprehensive but most time and storage-intensive option. Full backups are typically performed weekly and combined with incremental or differential backups for daily cycles.",insight:"Full backup = all data, every time. Longest backup time, fastest restore (only one backup set needed). Used as the baseline in combination strategies."},
          {name:"Incremental backup",explain:"An incremental backup copies only data that has changed since the last backup of any type — full or incremental. Daily incrementals combined with a weekly full are common. Restore requires the last full backup plus every incremental since — more restoration steps than differential.",insight:"Incremental = changed since any last backup. Fastest backup, slowest restore. To restore, you need the full backup plus every incremental — if you have 6 days of incrementals, that is 7 backup sets to process. The exam tests this restore complexity."},
          {name:"Differential backup",explain:"A differential backup copies all data that has changed since the last full backup. Each day's differential grows larger (as more changes accumulate from the full) but restore requires only the last full and the latest differential — two backup sets regardless of how many days since the full.",insight:"Differential = changed since last full. Medium backup time (growing), faster restore than incremental (only two sets needed). The exam frequently tests the comparison: incremental is faster to backup, differential is faster to restore."},
          {name:"3-2-1 rule",explain:"The 3-2-1 backup rule: maintain 3 copies of data (production plus 2 backups), on 2 different media types, with 1 copy offsite. This ensures that no single failure — hardware failure, fire, ransomware — can destroy all copies simultaneously.",insight:"3-2-1 is the baseline backup strategy. The exam references it as the minimum acceptable backup posture. Offsite copies protect against physical disasters at the primary location. Different media types protect against media-specific failure modes."},
        ]},
        {label:"BCP/DR testing", chips:[
          {name:"Tabletop",explain:"A tabletop exercise walks through a disaster scenario verbally — what would we do, who would call who, what decisions would we make — without activating any actual recovery capabilities. It is low-cost and low-risk, appropriate as a starting point and for testing decision-making and communication.",insight:"Tabletop is discussion-based. It tests plans and decisions without operational risk. It is the right starting point but reveals only plan-level gaps, not whether the technology and processes actually work under real conditions."},
          {name:"Parallel test",explain:"A parallel test activates the recovery environment and operates it alongside production simultaneously. This validates that the recovery environment actually works without the risk of switching production over to it. It is more realistic than a tabletop but less disruptive than a full interruption test.",insight:"Parallel testing is the most thorough safe test — you prove recovery works while keeping production running. It is expensive (running two environments) but provides high confidence without production risk."},
          {name:"Full interruption",explain:"A full interruption test actually fails over production to the recovery environment. It is the most realistic test because it validates the entire failover process under real conditions, including the time pressure and operational stress of an actual failover.",insight:"Full interruption is the definitive test. It proves everything works in a real scenario. It is rarely performed because of the risk — if the recovery environment fails, production is down. The exam treats it as the most valuable but highest-risk testing option."},
        ]},
      ]},
    ],
    traps:["Contain first, then eradicate, then recover — the order matters","Chain of custody is non-negotiable for legal proceedings","Lessons learned must produce concrete improvements — not just a report","Hot site is fastest recovery but most expensive — know the trade-off","Incremental is faster to back up, differential is faster to restore","Emergency changes still need approval — just faster approval"],
    connects:["Prepare","Detect","Contain","Investigate","Recover","Improve"]
  },
  {
    id:8, color:"#A32D2D", pct:"11%", qs:"~14",
    name:"Software Development Security", short:"Software Dev",
    hook:"Security that is not in the design is not in the product. Build it in from the start.",
    clusters:[
      {label:"Secure SDLC", color:"#A32D2D",
       groups:[
        {label:"SDLC phases", chips:[
          {name:"Requirements",explain:"Security requirements belong in the requirements phase alongside functional requirements. At this stage, you define what the application must do to be secure — authentication requirements, data protection standards, compliance obligations, access control model. Security requirements defined here drive architecture and design decisions.",insight:"Security requirements in the requirements phase are far cheaper to satisfy than retrofitting security into a completed application. The exam consistently rewards answers that introduce security at the earliest possible phase."},
          {name:"Design",explain:"The design phase translates requirements into architecture. Security design includes threat modelling, defining the trust model, selecting cryptographic algorithms, designing authentication and authorisation mechanisms, and establishing secure communication patterns. Security that is not in the design will not be in the product.",insight:"Design is where security decisions have the most leverage. Changing a fundamental architectural decision in production costs orders of magnitude more than making the right decision in design. The exam emphasises early security integration."},
          {name:"Development",explain:"During development, code is written according to secure coding standards — input validation, parameterised queries, output encoding, proper error handling, no hardcoded credentials. Code review processes and SAST tools provide feedback during this phase.",insight:"Developers need training and tools to write secure code. Secure coding standards provide guidance. SAST integrated into the development pipeline gives real-time feedback. Code review by peers catches what automated tools miss."},
          {name:"Testing",explain:"Security testing in the SDLC includes SAST, DAST, penetration testing of the application, and functional security testing of security controls. Testing should validate that security requirements are met, not just that features work. Security testing gates — requiring test passage before release — enforce this.",insight:"Security testing must be a release gate, not an afterthought. If security tests are optional or run after release, findings are more expensive to fix and may be deprioritised. Mandatory security testing gates make security a first-class requirement."},
          {name:"Deployment",explain:"Secure deployment means hardening the production environment, using infrastructure-as-code with security configurations, validating that production matches the tested configuration, and deploying only validated builds. Deployment is where misconfigurations often introduce vulnerabilities that testing did not find.",insight:"Configuration drift between test and production is a common vulnerability source. What was tested is not always what gets deployed. Infrastructure-as-code and configuration management tools reduce this risk by making deployment repeatable and auditable."},
          {name:"Maintenance",explain:"After deployment, applications require ongoing security maintenance — patching dependencies, responding to new vulnerability disclosures, updating cryptographic algorithms as they age, monitoring for anomalous behaviour. An unmaintained application accumulates vulnerabilities over its operational life.",insight:"Security does not end at release. Maintenance is where most application security effort is spent over the application's lifetime. Dependency management — tracking and updating third-party libraries — is particularly important as supply chain attacks have demonstrated."},
        ]},
        {label:"Development models", chips:[
          {name:"DevSecOps",explain:"DevSecOps integrates security into the DevOps pipeline — automated security testing, policy-as-code, security gates in CI/CD pipelines. Rather than security being a phase that happens before release, it is woven throughout the development and deployment process with automation providing continuous feedback.",insight:"DevSecOps is security at the speed of DevOps. Automated security checks in the pipeline — SAST, dependency scanning, container scanning — provide immediate feedback without slowing development. The exam treats DevSecOps as the modern approach to software security."},
          {name:"Waterfall",explain:"Waterfall is a sequential development model where each phase must be completed before the next begins — requirements, design, development, testing, deployment. Security in waterfall is typically added during testing, which is late and expensive for finding design-level issues.",insight:"Waterfall's sequential structure means security issues found in testing require going back to earlier phases — expensive and time-consuming. The exam contrasts waterfall's security integration challenges with more iterative models where security is addressed continuously."},
          {name:"Agile",explain:"Agile development delivers software in short iterations (sprints) with frequent releases. Security in agile must be integrated into each sprint rather than deferred to a final testing phase. Security user stories, threat modelling per feature, and automated security testing in the CI/CD pipeline are typical agile security practices.",insight:"Agile's speed creates security challenges if security is not embedded in each sprint. The exam expects you to understand that agile security means continuous security activities throughout each iteration, not a security sprint at the end."},
          {name:"BSIMM / SAMM",explain:"Building Security in Maturity Model (BSIMM) and Software Assurance Maturity Model (SAMM) are frameworks for measuring and improving software security practice maturity. They provide a structured way to assess what security activities an organisation performs and how to build a more comprehensive programme over time.",insight:"BSIMM and SAMM are assessment and improvement frameworks for software security. The exam may reference them in the context of measuring security programme maturity. They are descriptive (what organisations do) and prescriptive (what they should do to improve)."},
        ]},
      ]},
      {label:"Secure coding", color:"#E24B4A",
       groups:[
        {label:"Input handling", chips:[
          {name:"Input validation",explain:"Every input that an application accepts — from users, APIs, files, databases — must be validated before use. Validation means confirming that the input is of the expected type, format, length, and range. Inputs that fail validation should be rejected, not sanitised and accepted.",insight:"Input validation is the primary defence against injection attacks. Reject invalid input at the boundary — do not try to clean it up and use it. Allowlist validation (only accept known good) is stronger than denylist validation (reject known bad)."},
          {name:"Output encoding",explain:"Output encoding transforms data before it is sent to a browser, command, or other interpreter, preventing the data from being misinterpreted as code. Encoding HTML output prevents cross-site scripting; encoding SQL output prevents injection. Different outputs require different encoding.",insight:"Encoding is context-specific. HTML encoding for browser output, SQL parameterisation for database queries, shell escaping for command execution. Using the wrong encoding for the context does not prevent attacks. The exam expects you to understand context-appropriate encoding."},
          {name:"Parameterised queries",explain:"Parameterised queries (prepared statements) separate SQL code from data. The query structure is defined first with placeholders, then user input is provided as separate parameters — the database never interprets the input as SQL code. This completely prevents SQL injection when implemented correctly.",insight:"Parameterised queries are the definitive SQL injection prevention. String concatenation of user input into SQL queries is the vulnerability. Parameterised queries eliminate the problem at the root rather than trying to sanitise dangerous characters."},
          {name:"Allow lists",explain:"Allowlist validation defines what is acceptable — only inputs matching the allowlist are permitted, everything else is rejected. This is stronger than denylist validation because it does not depend on knowing all possible malicious inputs. Attackers constantly find new ways to bypass denylists; allowlists are not vulnerable to unknown attack patterns.",insight:"Allowlist (accept known good) is stronger than denylist (reject known bad). Denylists are incomplete by definition — there are always ways to express an attack that the denylist does not cover. Allowlists are closed — only exactly what is specified is accepted."},
        ]},
        {label:"Error handling", chips:[
          {name:"Fail securely",explain:"When an application encounters an error, it should fail in a secure state — denying access, using defaults that are restrictive, and not exposing sensitive information in error messages. An application that fails open — granting access or revealing details when something goes wrong — has a design flaw.",insight:"Fail securely applies to software just as it does to security controls. Authentication errors should result in denial, not access. Errors should be logged internally with full detail, but the user should receive only a generic error message with no technical information."},
          {name:"No sensitive data in errors",explain:"Error messages shown to users should never include stack traces, database queries, server paths, or other technical information. This information helps attackers understand the application's internals and identify vulnerabilities. Sensitive information should be logged internally for debugging, never exposed externally.",insight:"Error messages are a reconnaissance goldmine for attackers. A verbose error message revealing the database schema, server path, or software version tells an attacker exactly how to craft their attack. Always log internally, expose nothing externally."},
        ]},
        {label:"Secrets management", chips:[
          {name:"No hardcoded credentials",explain:"Credentials — passwords, API keys, tokens, certificates — must never be hardcoded in source code. Hardcoded credentials are easily discovered through code review, decompilation, or repository exposure. Once committed to a code repository, credentials are effectively public even if the commit is later removed.",insight:"Hardcoded credentials are a common and serious vulnerability. The exam treats them as an absolute prohibition. Once in a code repository, credentials must be considered compromised — they appear in version history even after removal. Use environment variables or secret management tools."},
          {name:"Vault solutions",explain:"Secret management tools (HashiCorp Vault, AWS Secrets Manager, Azure Key Vault) centralise credential storage, provide programmatic access with audit trails, and support automatic rotation. Applications retrieve credentials from the vault at runtime rather than having them embedded in code or configuration files.",insight:"Vault solutions are the modern approach to secrets management. They provide centralised control, access logging, and rotation — all things that hardcoded credentials and even environment variables cannot easily provide. The exam treats vault solutions as best practice for secrets management."},
          {name:"Key rotation",explain:"Cryptographic keys and credentials should be rotated regularly — replaced with new values — to limit the window of exposure if a key is compromised without the organisation knowing. Short rotation periods mean a compromised key is useful to an attacker for a shorter time.",insight:"Regular rotation limits the blast radius of key compromise. If you do not know whether a key has been compromised, rotating it ensures that any compromise is short-lived. Vault solutions typically support automatic rotation, making it operationally practical."},
        ]},
      ]},
      {label:"Testing and verification", color:"#501313",
       groups:[
        {label:"Testing approaches", chips:[
          {name:"SAST",explain:"Static Application Security Testing analyses code without executing it. It finds vulnerabilities in the source code or bytecode by scanning for patterns — hardcoded credentials, SQL concatenation, buffer allocation errors, insecure API use. It is fast, scalable, and can be integrated into the development pipeline for real-time feedback.",insight:"SAST = static source code analysis. It finds vulnerabilities before the application runs. The limitation is false positives — SAST may flag code patterns that are not actually exploitable in context. Analysts must review and triage findings."},
          {name:"DAST",explain:"Dynamic Application Security Testing tests the running application by interacting with it as a user or attacker would — sending inputs, following redirects, analysing responses. It finds vulnerabilities that only manifest at runtime — authentication issues, session management flaws, injection vulnerabilities in the context of the actual application.",insight:"DAST = dynamic, running application. It finds runtime vulnerabilities that SAST cannot detect because they depend on application behaviour, not just code patterns. DAST does not require source code access, making it applicable to third-party applications."},
          {name:"IAST",explain:"Interactive Application Security Testing instruments the application with sensors that monitor execution in real-time during testing. It combines the inside view of SAST (seeing the code path executed) with the realistic context of DAST (actual application behaviour during use). It significantly reduces false positives.",insight:"IAST is the most accurate approach but requires application instrumentation. It is particularly effective during functional testing — security testing happens automatically as testers exercise the application's features."},
          {name:"Fuzzing",explain:"Fuzzing sends large volumes of random, malformed, or unexpected input to an application to discover how it handles edge cases. If the application crashes, hangs, or behaves unexpectedly, the fuzzer has found a potential vulnerability. Fuzzing is particularly effective at finding memory corruption vulnerabilities and parser flaws.",insight:"Fuzzing finds vulnerabilities that structured testing misses by exploring edge cases through volume and randomness. It is particularly valuable for protocol parsers, file format handlers, and any code that processes external input."},
        ]},
        {label:"Threat modelling", chips:[
          {name:"STRIDE",explain:"STRIDE is a threat categorisation framework: Spoofing (impersonating something or someone), Tampering (modifying data or code), Repudiation (denying actions), Information Disclosure (exposing data), Denial of Service (making systems unavailable), Elevation of Privilege (gaining unauthorised access). It is used to systematically identify threats during design.",insight:"STRIDE provides a structured checklist for threat identification. By asking 'how could an attacker spoof, tamper, repudiate, disclose, deny, or elevate' against each component, threat modellers systematically identify threats they might otherwise miss."},
          {name:"DREAD",explain:"DREAD provides a risk scoring model for threats: Damage (impact if exploited), Reproducibility (how easily the attack can be repeated), Exploitability (how easy is it to exploit), Affected users (how many are impacted), Discoverability (how easy is the vulnerability to find). Scores guide prioritisation of mitigations.",insight:"DREAD is a scoring model to prioritise which threats to mitigate first. It is less commonly used than STRIDE today but may appear in exam questions. The key concept is that it produces a numerical priority score for each identified threat."},
          {name:"Attack trees",explain:"Attack trees model attacker goals and the ways to achieve them as a tree structure — the root is the attacker's objective, branches represent sub-goals and tactics, leaves represent specific attacks. They help teams think like attackers and identify all the paths that lead to a security failure.",insight:"Attack trees are a visual thinking tool for adversarial analysis. They make it easy to identify which controls at which nodes would block the most attack paths. The exam may reference attack trees in the context of systematic threat analysis."},
          {name:"Trust boundaries",explain:"Trust boundaries in threat modelling mark the points where data crosses between entities with different trust levels — from the internet to the application, from the user interface to the backend, from the application to the database. Every trust boundary crossing is a potential attack surface that requires validation and control.",insight:"Trust boundaries are where controls must be implemented. Data crossing a trust boundary must be treated as untrusted regardless of its source — validated, sanitised, and authorised. The exam treats trust boundary identification as a core threat modelling activity."},
        ]},
      ]},
      {label:"Application attacks", color:"#A32D2D",
       groups:[
        {label:"Injection", chips:[
          {name:"SQL injection",explain:"SQL injection occurs when user-supplied input is incorporated into a database query without proper separation. The attacker can close the intended query and append their own SQL — reading unauthorised data, modifying records, or executing system commands. It remains one of the most common and damaging web application vulnerabilities.",insight:"SQL injection is prevented by parameterised queries, not input sanitisation. Sanitisation is a denylist approach and can be bypassed. Parameterised queries are the correct solution. The exam expects you to know the prevention, not just the attack."},
          {name:"Command injection",explain:"Command injection occurs when user input is passed to a system command without proper sanitisation. The attacker can append additional commands that execute with the privileges of the application process. Web applications that call system commands (for file conversion, compression, etc.) are common targets.",insight:"Command injection is particularly dangerous because the attacker inherits the application's system privileges. If the application runs as root or SYSTEM, the attacker has full system access. Avoid calling system commands with user input; use library functions instead."},
          {name:"XSS",explain:"Cross-site scripting occurs when an application includes unvalidated user input in its HTML output, allowing attackers to inject client-side script that executes in other users' browsers. Stored XSS persists in the application (e.g. in comments); reflected XSS is returned in the immediate response; DOM-based XSS manipulates the page through client-side script.",insight:"XSS is prevented by output encoding — converting special characters to their HTML entity equivalents before rendering. The exam tests XSS prevention through output encoding and the Content Security Policy header, which limits what scripts can execute."},
          {name:"CSRF",explain:"Cross-site request forgery tricks an authenticated user's browser into making an unauthorised request to a web application — using the user's session to perform actions they did not intend. If a user is logged into their bank and visits a malicious site, CSRF could trigger a transfer using their credentials.",insight:"CSRF exploits the browser's automatic inclusion of session cookies with requests. CSRF tokens — unique, unpredictable values included in forms and validated server-side — prevent CSRF because the attacker cannot guess the token. The SameSite cookie attribute also mitigates CSRF."},
        ]},
        {label:"Logic flaws", chips:[
          {name:"Race conditions",explain:"A race condition occurs when a system's behaviour depends on the relative timing of events, and a security control can be bypassed by manipulating that timing. Time-of-check to time-of-use (TOCTOU) attacks exploit the gap between checking a condition and using the result of that check.",insight:"TOCTOU is the classic race condition attack. Check whether a file is safe, then use it — between check and use, an attacker replaces the file. Atomicity — ensuring check and use happen as one indivisible operation — is the defence."},
          {name:"IDOR",explain:"Insecure Direct Object Reference occurs when an application uses user-controllable input to access objects (files, database records, user accounts) without verifying that the user is authorised to access that specific object. Changing an account ID in a URL to access another user's data is a classic IDOR.",insight:"IDOR is an authorisation failure. The application authenticates the user correctly but then fails to verify that the specific resource requested belongs to that user. The fix is to always verify authorisation against the specific object being requested, not just that the user is authenticated."},
          {name:"Business logic bypass",explain:"Business logic attacks exploit flaws in the application's workflow — ways to skip steps, replay actions, or abuse legitimate features in unintended ways. An e-commerce application that applies a discount code then reduces the quantity might allow a negative quantity to generate a credit. These vulnerabilities cannot be detected by generic scanners.",insight:"Business logic vulnerabilities are application-specific and cannot be found by automated tools — they require manual testing and understanding of the intended workflow. The exam recognises them as a category distinct from technical vulnerabilities like SQL injection."},
        ]},
        {label:"API security", chips:[
          {name:"OWASP API Top 10",explain:"The OWASP API Security Top 10 identifies the most critical API security risks — broken object level authorisation (IDOR for APIs), broken authentication, excessive data exposure (APIs returning more data than the client needs), lack of resource limiting, broken function level authorisation, and others. It is the framework for API security testing.",insight:"OWASP API Top 10 is the reference for API security. Broken object level authorisation (BOLA) is consistently the top risk — APIs that fail to verify whether the requesting user is authorised to access the specific object they are requesting."},
          {name:"Rate limiting",explain:"APIs without rate limiting allow attackers to make unlimited requests — enabling brute force attacks on authentication, credential stuffing, scraping of data, or overwhelming the service with requests. Rate limiting restricts the number of requests from a single source within a time window.",insight:"Rate limiting is both a security control (preventing brute force) and an availability control (preventing API abuse). The exam treats lack of rate limiting as a significant API vulnerability — one of the OWASP API Top 10 risks."},
          {name:"Authentication",explain:"APIs must authenticate every request — not just the initial session establishment. Stateless APIs should require a token (JWT, API key) with each request. The token must be validated — checking signature, expiry, and claims — on every call, not just cached after the first check.",insight:"API authentication must be per-request, not per-session. JWTs must be validated (signature, expiry, audience) on every call. API keys must be treated as secrets — not included in URLs where they appear in logs, but in headers."},
        ]},
      ]},
    ],
    traps:["Fix security in design — patching after release costs ten times more","SAST analyses source code without running it — DAST tests the running application","Threat model in the design phase — not after development","Buffer overflow is still tested — know it exists even in modern contexts","Open source code is not inherently secure — it needs the same review as proprietary code","Input validation allowlists are stronger than denylists"],
    connects:["Security in requirements","Threat model in design","Code securely","Test thoroughly","Deploy safely","Monitor in production"]
  },
];

let currentDomain = 1;
let showFaq = false;
let activeChip = null;

function init(){
  renderNav();
  renderMain();
}

function renderNav(){
  const nav = document.getElementById('domainNav');
  nav.innerHTML = DOMAINS.map(d => {
    const active = !showFaq && d.id===currentDomain;
    return `
    <div class="dnav-item ${active?'active':''}"
         onclick="selectDomain(${d.id})"
         style="${active?'background:'+d.color+';border-bottom-color:'+d.color:'border-bottom-color:'+d.color+'40'}">
      <span class="dnav-num">Domain ${d.id}</span>
      <span class="dnav-name">${d.short}</span>
    </div>
  `}).join('');
}

function selectDomain(id){
  currentDomain = id;
  showFaq = false;
  activeChip = null;
  document.getElementById('faqBtn').classList.remove('active');
  renderNav();
  renderMain();
}

function toggleFaq(){
  showFaq = !showFaq;
  activeChip = null;
  document.getElementById('faqBtn').classList.toggle('active', showFaq);
  renderNav();
  renderMain();
}

function renderMain(){
  const mc = document.getElementById('mainContent');
  if(showFaq){
    mc.innerHTML = renderFaqView();
    return;
  }
  const d = DOMAINS.find(x=>x.id===currentDomain);
  mc.innerHTML = renderDomainView(d);
}

function renderDomainView(d){
  return `
    <div class="domain-hdr">
      <div class="domain-hdr-left">
        <div class="domain-num">Domain ${d.id} of 8</div>
        <div class="domain-name">${d.name}</div>
        <div class="domain-hook">${d.hook}</div>
      </div>
      <div class="domain-pct-block">
        <div class="domain-pct" style="color:${d.color}">${d.pct}</div>
        <div class="domain-pct-label">exam weight</div>
        <div class="domain-pct-q" style="color:${d.color}">${d.qs} questions</div>
      </div>
    </div>
    <div class="clusters-grid">
      ${d.clusters.map(cl => `
        <div class="cluster">
          <div class="cluster-hdr" style="background:${cl.color}">${cl.label}</div>
          <div class="cluster-body">
            ${cl.groups.map(g => `
              <div class="sg">
                <div class="sg-label">${g.label}</div>
                <div class="vchips">
                  ${g.chips.map(c => `
                    <div class="vchip ${activeChip && activeChip.name===c.name?'active':''}"
                         onclick="selectChip(${d.id},'${c.name.replace(/'/g,"\\'")}','${cl.label.replace(/'/g,"\\'")}','${g.label.replace(/'/g,"\\'")}')">
                      ${c.name}
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    ${activeChip ? renderDrawer(d) : ''}
    <div class="traps-section">
      <div class="traps-label"><span class="traps-dot"></span>Exam traps — what retakers get wrong</div>
      <div class="traps-chips">
        ${d.traps.map(t=>`<span class="trap-chip">${t}</span>`).join('')}
      </div>
    </div>
    <div class="connects-section">
      <div class="connects-label">How it all connects</div>
      <div class="connects-flow">
        ${d.connects.map((c,i)=>`
          <span class="flow-chip">${c}</span>
          ${i<d.connects.length-1?'<span class="flow-arr">→</span>':''}
        `).join('')}
      </div>
    </div>
  `;
}

function renderDrawer(d){
  const chip = activeChip;
  const allChips = d.clusters.flatMap(cl=>cl.groups.flatMap(g=>g.chips));
  const chipData = allChips.find(c=>c.name===chip.name);
  if(!chipData) return '';
  return `
    <div class="explanation-drawer open">
      <div class="ed-inner">
        <button class="ed-close" onclick="closeDrawer()">✕ close</button>
        <div class="ed-breadcrumb">${chip.cluster} · ${chip.group}</div>
        <div class="ed-title">${chipData.name}</div>
        <div class="ed-text">${chipData.explain}</div>
        <div class="ed-insight">
          <div class="ed-insight-label">Exam insight</div>
          <div class="ed-insight-text">${chipData.insight}</div>
        </div>
      </div>
    </div>
  `;
}

function selectChip(domainId, chipName, clusterLabel, groupLabel){
  if(activeChip && activeChip.name===chipName){
    activeChip = null;
  } else {
    activeChip = {name:chipName, cluster:clusterLabel, group:groupLabel};
  }
  renderMain();
  if(activeChip){
    setTimeout(()=>{
      const drawer = document.querySelector('.explanation-drawer');
      if(drawer) drawer.scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  }
}

function closeDrawer(){
  activeChip = null;
  renderMain();
}

function renderFaqView(){
  return `
    <div class="faq-view active">
      <p class="faq-intro">Common questions about the CISSP exam — written to be genuinely useful, not just reassuring. These answers are also structured to appear in Google search results as featured snippets.</p>
      ${FAQS.map((f,i)=>`
        <div class="faq-item">
          <div class="faq-q" id="fq${i}" onclick="toggleFaqItem(${i})">
            ${f.q}
            <span class="faq-chevron">▾</span>
          </div>
          <div class="faq-a" id="fa${i}">
            ${f.a}
            <div class="faq-seo-note">${f.note}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function toggleFaqItem(i){
  const q = document.getElementById('fq'+i);
  const a = document.getElementById('fa'+i);
  q.classList.toggle('open');
  a.classList.toggle('open');
}

init();
</script>
</body>
</html>
