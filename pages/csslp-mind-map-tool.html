<style>
:root {
  --navy: #1C2B3A;
  --navy-light: #243547;
  --teal: #1A7F8E;
  --teal-light: #e8f6f8;
  --olive: #4A6741;
  --olive-light: #eef3ec;
  --red: #A32D2D;
  --red-light: #fdf0f0;
  --white: #ffffff;
  --off-white: #f8f7f4;
  --border: #e4e2da;
  --border-mid: #d3d1c7;
  --text: #1a1a18;
  --text-mid: #555550;
  --text-muted: #888880;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--off-white);color:var(--text);font-size:14px;line-height:1.5;}
.csslp-tool{background:var(--white);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;width:100%;margin:0 auto;}
.tool-header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-logo{width:36px;height:36px;background:#1A6B4A;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-logo svg{width:22px;height:22px;}
.header-title{font-size:15px;font-weight:600;color:var(--white);letter-spacing:-0.01em;}
.header-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.faq-btn{font-size:11px;font-weight:500;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:5px;padding:5px 12px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
.faq-btn:hover,.faq-btn.active{background:#1A6B4A;color:var(--white);border-color:#1A6B4A;}
.domain-nav{display:flex;overflow-x:hidden;background:#f0efeb;border-bottom:0.5px solid var(--border);gap:2px;padding:10px 10px 0;}
.domain-nav::-webkit-scrollbar{display:none;}
.dnav-item{flex:1;min-width:0;padding:12px 6px 14px;cursor:pointer;border-radius:9px 9px 0 0;border-bottom:4px solid transparent;white-space:nowrap;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--font);color:var(--text-muted);background:rgba(255,255,255,0.45);}
.dnav-item:hover{color:var(--text);background:rgba(255,255,255,0.8);}
.dnav-item.active{color:#fff;border-bottom-color:transparent;}
.dnav-num{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:0.8;}
.dnav-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.domain-view{display:none;}
.domain-view.active{display:block;}
.domain-hdr{padding:20px 26px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.domain-hdr-left{}
.domain-num{font-size:9px;font-weight:500;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:3px;text-transform:uppercase;}
.domain-name{font-size:22px;font-weight:600;color:var(--navy);letter-spacing:-0.02em;}
.domain-hook{font-size:12px;color:var(--text-mid);margin-top:4px;font-style:italic;}
.domain-pct-block{text-align:right;flex-shrink:0;}
.domain-pct{font-size:38px;font-weight:600;line-height:1;letter-spacing:-0.03em;}
.domain-pct-label{font-size:9px;color:var(--text-muted);margin-top:2px;}
.domain-pct-q{font-size:10px;font-weight:500;margin-top:1px;}
.clusters-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--border);}
.clusters-grid.five .cluster:last-child{grid-column:1/-1;}
.cluster{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);}
.cluster:nth-child(even){border-right:none;}
.clusters-grid:not(.five) .cluster:nth-child(3),.clusters-grid:not(.five) .cluster:nth-child(4){border-bottom:none;}
.clusters-grid.five .cluster:nth-child(4){border-bottom:0.5px solid var(--border);}
.clusters-grid.five .cluster:nth-child(5){border-bottom:none;border-right:none;}
.cluster-hdr{padding:11px 18px;font-size:13px;font-weight:600;color:var(--white);letter-spacing:0.01em;}
.cluster-body{padding:14px 16px;background:#fafaf8;display:flex;gap:10px;min-height:160px;}
.sg{flex:1;min-width:0;}
.sg-label{font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;}
.vchips{display:flex;flex-direction:column;gap:2px;}

.vchip.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.explanation-drawer{border-top:0.5px solid var(--border);background:var(--white);display:none;}
.explanation-drawer.open{display:block;}
.ed-inner{padding:16px 20px;}
.ed-breadcrumb{font-size:9px;font-weight:500;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;}
.ed-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:10px;letter-spacing:-0.01em;}
.ed-text{font-size:13px;color:var(--text-mid);line-height:1.7;margin-bottom:14px;}
.ed-insight{border-left:3px solid var(--olive);padding:10px 14px;background:var(--olive-light);border-radius:0 6px 6px 0;}
.ed-insight-label{font-size:8px;font-weight:600;letter-spacing:0.1em;color:var(--olive);margin-bottom:4px;text-transform:uppercase;}
.ed-insight-text{font-size:12px;color:#3a4a35;line-height:1.6;}
.ed-close{float:right;font-size:11px;color:var(--text-muted);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;margin-top:1px;}
.ed-close:hover{color:var(--red);}
.traps-section{background:#fdf8f6;border-bottom:0.5px solid #f0d8d0;padding:10px 16px;}
.traps-label{font-size:8px;font-weight:600;letter-spacing:0.1em;color:var(--red);margin-bottom:7px;display:flex;align-items:center;gap:5px;text-transform:uppercase;}
.traps-dot{width:6px;height:6px;background:#D85A30;border-radius:50%;flex-shrink:0;}
.traps-chips{display:flex;flex-wrap:wrap;gap:4px;}
.trap-chip{font-size:10px;padding:3px 9px;border:0.5px solid #f0b8a8;border-radius:4px;color:#7a2020;background:var(--white);}
.connects-section{background:#f6f8f5;padding:10px 16px;}
.connects-label{font-size:8px;font-weight:600;letter-spacing:0.1em;color:var(--olive);margin-bottom:7px;text-transform:uppercase;}
.connects-flow{display:flex;flex-wrap:wrap;align-items:center;gap:5px;}
.flow-chip{font-size:10px;padding:3px 10px;border:0.5px solid #b8ccb4;border-radius:4px;color:#2a4025;background:var(--white);}
.flow-arr{font-size:12px;color:var(--border-mid);}
.faq-view{display:none;padding:20px;}
.faq-view.active{display:block;}
.faq-intro{font-size:13px;color:var(--text-mid);margin-bottom:20px;line-height:1.6;}
.faq-item{border:0.5px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.faq-q{padding:12px 16px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--white);transition:background 0.12s;}
.faq-q:hover{background:var(--off-white);}
.faq-q.open{background:var(--navy);color:var(--white);}
.faq-chevron{font-size:12px;transition:transform 0.2s;flex-shrink:0;}
.faq-q.open .faq-chevron{transform:rotate(180deg);}
.faq-a{display:none;padding:14px 16px;font-size:13px;color:var(--text-mid);line-height:1.7;border-top:0.5px solid var(--border);background:#fafaf8;}
.faq-a.open{display:block;}
.faq-seo-note{margin-top:6px;font-size:11px;color:var(--text-muted);font-style:italic;}
.tool-footer{background:var(--navy);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;}
.tool-footer-left{font-size:9px;color:rgba(255,255,255,0.35);}
.tool-footer-right{font-size:9px;color:#4AC99A;}
@media(max-width:600px){
  .clusters-grid{grid-template-columns:1fr;}
  .clusters-grid.five .cluster:last-child{grid-column:1;}
  .cluster{border-right:none;}
  .domain-hdr{flex-direction:column;}
  .domain-pct-block{text-align:left;}
}
</style>

<script>
const DOMAINS = [
  {
    id:1, color:"#1A6B4A", pct:"10%", qs:"~13",
    name:"Secure Software Concepts", short:"Concepts",
    hook:"Security belongs in the design — not the patch notes. Understand the foundations first.",
    clusters:[
      {
        label:"Core security principles", color:"#1A6B4A",
        groups:[
          {label:"CIA Triad", chips:[
            {name:"Confidentiality",explain:"Confidentiality ensures that software only exposes information to those authorised to see it. In secure software, this means proper access controls, encryption of sensitive data at rest and in transit, and ensuring data is not inadvertently exposed through logs, error messages, or APIs.",insight:"The CSSLP exam tests confidentiality in the context of software — not just networks. Think: does your API return more data than the caller is authorised to see? Does your error message reveal a stack trace with sensitive paths?"},
            {name:"Integrity",explain:"Integrity ensures that data and software have not been altered without authorisation. In software, this covers input validation, parameterised queries, digital signatures on code, and hash verification of downloads. Integrity failures in software include SQL injection, buffer overflows, and code tampering.",insight:"Integrity in software goes beyond data — it applies to the code itself. Code signing ensures the software you deploy is the software you built. Integrity checking in CI/CD pipelines catches tampering in the build process."},
            {name:"Availability",explain:"Availability means software is accessible and functional when needed. In secure software development, availability concerns include graceful degradation under load, resilient error handling, rate limiting to prevent resource exhaustion, and secure failover mechanisms.",insight:"The CSSLP tests availability through the software lens — not hardware redundancy. Think: does your software handle unexpected input without crashing? Does it fail gracefully or does it bring down the entire service?"},
            {name:"Non-repudiation",explain:"Non-repudiation ensures that actions taken within software cannot be denied by the party who took them. This requires audit logging, digital signatures, and authenticated sessions. Every sensitive action should be attributed to an authenticated identity and logged in tamper-evident storage.",insight:"Non-repudiation is an exam favourite for CSSLP. It appears in the context of audit trails, digital signatures, and access logging. The key is that logs must be protected — logs stored on the compromised system cannot support non-repudiation."},
            {name:"Authentication & authorisation",explain:"Authentication confirms identity; authorisation determines what that identity can do. In software, these are distinct functions and must both be implemented correctly. A common failure is to authenticate correctly but then authorise based on client-supplied data that can be manipulated.",insight:"Authentication and authorisation failures are consistently in the OWASP Top 10. The CSSLP exam tests the distinction: being authenticated does not mean being authorised for every function. Always authorise each action, not just the session."},
          ]},
          {label:"Design principles", chips:[
            {name:"Least privilege",explain:"Every process, user, and component should have only the minimum access necessary. In software, this means database users should only have SELECT on tables they need to read, service accounts should not be domain admins, and application components should not have write access to areas they only read.",insight:"Least privilege in software is frequently violated by developers who use admin accounts for convenience during development and leave them in production. The exam tests whether you apply least privilege to software components, not just users."},
            {name:"Separation of duties",explain:"No single function should have end-to-end control over a sensitive process. In software, this means separating code development from deployment approvals, separating financial transaction initiation from authorisation, and ensuring no single developer can push to production without review.",insight:"Separation of duties in software maps to code review requirements, deployment approval workflows, and the separation of development, test, and production environments. A developer who can write code and deploy it directly to production without review violates this principle."},
            {name:"Defence in depth",explain:"Layering multiple independent security controls means that no single failure results in compromise. In software, this means input validation at the UI layer AND the API layer AND the database layer — not trusting any single control to be the last line of defence.",insight:"The CSSLP exam tests defence in depth as applied to software layers. Trusting the UI to validate input and doing nothing at the API is a single layer — if the attacker bypasses the UI, there is no defence left. Multiple independent layers are required."},
            {name:"Fail secure",explain:"When software encounters an unexpected state, it should fail to a secure condition — denying access, not granting it. An authentication system that throws an unhandled exception should deny access, not default to authenticated. Error conditions should never inadvertently grant permissions.",insight:"Fail secure is the opposite of fail open. The exam will present scenarios where error conditions must be resolved — always choose the option that denies access on failure. Fail open is only acceptable where availability genuinely outweighs security."},
            {name:"Economy of mechanism",explain:"Security mechanisms should be as simple as possible. Complex security code is harder to review, harder to test, and more likely to contain errors. Simple, well-understood cryptographic libraries are preferable to custom implementations regardless of how clever the custom approach is.",insight:"Economy of mechanism is why you should never roll your own cryptography. Simple, proven mechanisms are testable and auditable. Custom implementations are not. The exam rewards choosing simplicity over cleverness in security design."},
          ]},
        ]
      },
      {
        label:"Security policies and governance", color:"#155a3c",
        groups:[
          {label:"Policy hierarchy", chips:[
            {name:"Security policies",explain:"Organisational security policies define the rules that software must comply with — data handling requirements, access control standards, encryption mandates, and retention rules. Software development must be guided by these policies from the requirements phase, not retrofitted after the policy is discovered during audit.",insight:"The CSSLP exam expects you to understand that policies drive software requirements. A GDPR data protection policy, for example, must translate into specific software requirements — encryption, data minimisation, right to erasure — not just procedural compliance."},
            {name:"Standards and procedures",explain:"Standards define specific, measurable requirements that software must meet — which encryption algorithms are acceptable, which authentication mechanisms are required, which coding standards apply. Procedures define how developers implement those standards in practice.",insight:"Standards make policies actionable. A policy saying 'data must be encrypted' is vague. A standard saying 'all data at rest must use AES-256 with keys managed through the corporate vault' is testable. The exam tests whether you can translate policy into implementable standards."},
            {name:"Compliance frameworks",explain:"GDPR, HIPAA, PCI-DSS, and SOX all impose software-specific requirements. GDPR requires privacy by design, data minimisation, and breach notification. PCI-DSS requires specific controls around cardholder data in software. HIPAA imposes audit logging and access control requirements on healthcare software.",insight:"Compliance frameworks translate into software requirements. The CSSLP exam tests whether you know what each framework requires from a software perspective — not just what the framework says in the abstract."},
            {name:"Risk tolerance",explain:"Risk tolerance defines how much security risk the organisation is willing to accept in its software. High-risk applications (those handling financial data, health data, or critical infrastructure) require more rigorous security controls than low-risk applications. Risk tolerance shapes the security investment in any given system.",insight:"Risk tolerance drives security investment decisions. The exam may present scenarios where controls are being cut — the correct answer always involves understanding the risk implications and getting formal acceptance of residual risk from appropriate management."},
          ]},
          {label:"Regulatory context", chips:[
            {name:"GDPR for software",explain:"GDPR requires software that processes EU/UK personal data to implement privacy by design and by default, data minimisation, the right to erasure, and breach notification within 72 hours. These are software requirements that must be built in — not legal obligations that exist only in documentation.",insight:"GDPR directly shapes software architecture. The right to erasure requires software to be able to find and delete all instances of a person's data. This is an architectural constraint that must be considered at design time, not retrofitted."},
            {name:"HIPAA for software",explain:"HIPAA requires software handling protected health information to implement access controls, audit logging, encryption, and integrity controls. These are technical safeguards that must be implemented in the software itself — not just in the network or physical environment around it.",insight:"HIPAA audit logging requirements are a software requirement. The software must log who accessed what PHI, when, and from where. The logs must be tamper-evident. This is a specific, testable software requirement, not a general policy statement."},
            {name:"PCI-DSS for software",explain:"PCI-DSS requires specific controls in any software that stores, processes, or transmits cardholder data. This includes requirements for secure coding practices (Requirement 6), access controls, audit logging, and vulnerability management. PA-DSS applies specifically to payment applications.",insight:"PCI-DSS Requirement 6 mandates secure development practices including code review, vulnerability scanning, and developer training. The exam may test specific PCI-DSS requirements as they apply to software development practices."},
          ]},
        ]
      },
      {
        label:"Threat landscape", color:"#0d4230",
        groups:[
          {label:"Attack taxonomy", chips:[
            {name:"OWASP Top 10",explain:"The OWASP Top 10 catalogues the most critical web application security risks — injection, broken authentication, sensitive data exposure, XML external entities, broken access control, security misconfiguration, cross-site scripting, insecure deserialisation, using components with known vulnerabilities, and insufficient logging. It is the baseline reference for application security.",insight:"The OWASP Top 10 is directly tested in the CSSLP exam. Know each category, what causes it, and what prevents it. Broken access control has been number one in recent editions — the exam tests whether you can identify access control failures in scenario questions."},
            {name:"CWE/SANS Top 25",explain:"The Common Weakness Enumeration Top 25 Most Dangerous Software Errors covers the most impactful software weaknesses including buffer overflows, SQL injection, OS command injection, cross-site scripting, and path traversal. CWE provides a standardised taxonomy for discussing software weaknesses.",insight:"CWE is the language of software vulnerability classification. The exam may reference specific CWEs in scenario questions. Understanding the major categories — memory management errors, injection weaknesses, access control failures — is more important than memorising individual CWE numbers."},
            {name:"STRIDE",explain:"STRIDE is a threat categorisation framework: Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, Elevation of Privilege. It is used in threat modelling to systematically identify potential threats to a software system by asking which STRIDE categories apply to each component and data flow.",insight:"STRIDE maps directly to security properties: Spoofing → Authentication, Tampering → Integrity, Repudiation → Non-repudiation, Information Disclosure → Confidentiality, DoS → Availability, EoP → Authorisation. Knowing this mapping helps answer exam questions about appropriate mitigations."},
            {name:"Threat actors",explain:"Software threats come from external attackers, malicious insiders, accidental insiders, third-party components, and nation-state actors. Different threat actors have different capabilities and motivations. Software security controls must account for the full threat actor spectrum, not just external hackers.",insight:"The exam may present scenarios involving specific threat actors. An insider threat requires different mitigations than an external attacker — separation of duties, access logging, and least privilege are particularly effective against insiders."},
          ]},
          {label:"Attack surface", chips:[
            {name:"Attack surface definition",explain:"The attack surface of a software system is the sum of all points where an attacker can try to enter, extract data, or cause harm. This includes all input fields, APIs, file uploads, authentication mechanisms, network ports, and third-party integrations. Reducing the attack surface is a fundamental security improvement.",insight:"Attack surface reduction is a design principle. Every feature added to a system potentially adds attack surface. The exam tests whether you understand that simplicity reduces attack surface — unnecessary features, open ports, and unused APIs should be removed."},
            {name:"Trust boundaries",explain:"Trust boundaries exist wherever software transitions between components with different trust levels — from the internet to the application, from the application to the database, from one microservice to another. Every trust boundary crossing is a potential attack point requiring validation and access control.",insight:"Trust boundaries must be identified during threat modelling and documented in data flow diagrams. Every crossing of a trust boundary is where an attacker can inject, intercept, or manipulate. Controls must be placed at trust boundaries, not just at the perimeter."},
            {name:"Security debt",explain:"Security debt accumulates when security shortcuts are taken during development — hardcoded credentials left in place, known vulnerabilities not patched, security controls deferred to future sprints. Like technical debt, security debt compounds over time and becomes increasingly expensive to address.",insight:"Security debt is a risk management concept for CSSLP. The exam may present scenarios where security issues are deferred — the correct response involves quantifying the risk, formally accepting it at the appropriate level, and creating a remediation roadmap, not simply deferring indefinitely."},
          ]},
        ]
      },
      {
        label:"Software security fundamentals", color:"#1A6B4A",
        groups:[
          {label:"Security concepts in software", chips:[
            {name:"Secure by design",explain:"Secure by design means security is a foundational requirement, not an afterthought. Architecture and design decisions explicitly account for security from the outset. Security controls are built into the design rather than bolted on after the fact.",insight:"Secure by design versus secure by default are distinct concepts. Secure by design is about the architecture; secure by default is about the initial configuration. Both are required — a securely designed system configured insecurely is still vulnerable."},
            {name:"Secure by default",explain:"A system is secure by default when its out-of-the-box configuration is the most secure reasonable option. Users should have to deliberately take action to reduce security, not to enable it. Default passwords, open ports, and permissive configurations are violations of secure by default.",insight:"Secure by default is directly tested in the CSSLP. The exam may present scenarios where a developer enables a feature that disables a default security control — this is a secure-by-default violation and represents a risk that should be formally assessed."},
            {name:"Privacy by design",explain:"Privacy by design means data protection is built into software architecture from the start rather than added later. This includes data minimisation (only collect what you need), purpose limitation (only use data for stated purposes), and building in the technical capability for data subject rights such as erasure and portability.",insight:"Privacy by design is a legal requirement under GDPR, not just a best practice. The exam tests whether you understand that privacy requirements — like the right to erasure — must be designed into the system, not retrofitted. An architecture that cannot support data deletion without breaking the system has violated privacy by design."},
            {name:"Open design principle",explain:"Security should not depend on the secrecy of the design or implementation (Kerckhoffs's principle). Security through obscurity — hiding how the system works to prevent attacks — is not genuine security. If the design were published, the system should still be secure because security depends on secret keys, not secret algorithms.",insight:"The CSSLP exam rejects security through obscurity as a valid control. A proprietary encryption algorithm is not more secure than AES just because fewer people know how it works. The exam will mark down any answer that relies on keeping the design secret."},
          ]},
          {label:"Software risk concepts", chips:[
            {name:"Residual risk",explain:"After implementing security controls, some risk remains — this is residual risk. No control eliminates risk entirely. Residual risk must be formally accepted by the appropriate level of management. The CSSLP professional must be able to quantify and communicate residual risk clearly.",insight:"Residual risk acceptance is a management decision, not a technical one. The exam expects you to understand that the security team's role is to identify, assess, and present risk — the decision to accept residual risk belongs to management."},
            {name:"Risk assessment",explain:"A software risk assessment systematically identifies threats, vulnerabilities, and the potential impact of exploitation. For software, this includes threat modelling, vulnerability scanning, code review findings, and dependency analysis. Risk assessments should be conducted at design time and repeated as the system evolves.",insight:"Risk assessment in software has specific phases. Threat modelling at design, SAST during development, DAST and pen testing before release, and continuous vulnerability monitoring in production. The exam tests whether you know which assessment technique applies at which phase."},
          ]},
        ]
      },
    ],
    traps:["Secure by design and secure by default are different — design is architecture, default is configuration","Security through obscurity is not a valid control — the exam always rejects it","Least privilege applies to software components, not just human users","Fail secure means deny on failure — never grant access on error","Non-repudiation requires logs stored separately from the system being logged","OWASP Top 10 is directly tested — know each category and its prevention"],
    connects:["Understand principles","Apply to design","Drive requirements","Assess risk","Govern the programme"]
  },
  {
    id:2, color:"#2E7D6B", pct:"14%", qs:"~18",
    name:"Secure Software Requirements", short:"Requirements",
    hook:"If you don't define what secure looks like, you can't build it — and you can't test it.",
    clusters:[
      {
        label:"Requirements types", color:"#2E7D6B",
        groups:[
          {label:"Functional security requirements", chips:[
            {name:"Authentication requirements",explain:"Authentication requirements specify how the system must verify user identity — which factors are required, what strength is needed, how failed attempts are handled, and how sessions are managed. These must be explicit requirements, not assumptions left to developers.",insight:"Authentication requirements must be specific and testable. 'The system must authenticate users' is not a requirement. 'The system must require MFA for all administrative functions using TOTP or hardware token' is a requirement. The exam tests specificity."},
            {name:"Authorisation requirements",explain:"Authorisation requirements define who can access what and perform which operations. They should be expressed as access control matrices or role definitions — mapping subjects to objects and permitted actions. Vague authorisation requirements lead to over-permissive implementations.",insight:"Authorisation requirements drive access control model selection. If the requirements specify role-based access, the design implements RBAC. If they specify attribute-based decisions, ABAC is appropriate. Requirements must drive design, not the other way around."},
            {name:"Audit and logging requirements",explain:"Logging requirements specify what events must be logged, at what level of detail, with what fields, and for how long. They must cover authentication events, authorisation failures, data access, and administrative actions. The format and tamper-evidence requirements must also be specified.",insight:"Logging requirements are often underspecified. The exam may present scenarios where an incident cannot be investigated because logs were insufficient — the correct lesson is that logging requirements must be defined at requirements time, not after an incident."},
            {name:"Data protection requirements",explain:"Data protection requirements specify how sensitive data must be handled — classification levels, encryption requirements for data at rest and in transit, masking requirements for display and logging, and retention and deletion requirements. These are software requirements that must be implemented in code.",insight:"Data protection requirements must be specific enough to drive implementation. 'Protect sensitive data' is not implementable. 'PII must be encrypted using AES-256 at rest with keys managed in the corporate vault and masked in all log output' is implementable."},
          ]},
          {label:"Non-functional security requirements", chips:[
            {name:"Performance under attack",explain:"The system must remain available and functional under attack conditions — including brute force attempts, DDoS, and resource exhaustion. Non-functional security requirements specify rate limiting, connection limits, timeout handling, and graceful degradation requirements.",insight:"Non-functional security requirements are often forgotten entirely. Performance under attack is a requirement that shapes architecture — rate limiting, caching, and autoscaling decisions are all driven by these requirements. The exam tests whether you include them."},
            {name:"Recoverability requirements",explain:"RTO and RPO requirements for security incidents must be specified — how quickly must the system recover from a security-related outage, and how much data can be lost? These requirements drive backup, replication, and incident response design decisions.",insight:"Recovery requirements shape security architecture. A system with a one-hour RTO requires active-standby infrastructure. A system with a 24-hour RTO can use warm standby. The exam expects you to connect recovery requirements to architecture decisions."},
            {name:"Scalability and security",explain:"Security controls must scale with the system. An authentication control that works for 100 users but fails under load at 10,000 users is not adequate. Non-functional requirements must specify the load conditions under which security controls must remain effective.",insight:"Security controls that break under load are a common architectural failure. Rate limiting implemented in application code on a single instance breaks when the application scales horizontally. The exam tests whether security requirements account for scale."},
          ]},
        ]
      },
      {
        label:"Misuse and abuse case modelling", color:"#236859",
        groups:[
          {label:"Misuse cases", chips:[
            {name:"Misuse case definition",explain:"A misuse case documents how an attacker or malicious user would intentionally abuse a system's functionality to cause harm. It is the adversarial mirror of a use case — instead of 'user logs in to access their account', the misuse case is 'attacker brute-forces login to access victim account'.",insight:"Misuse cases are distinct from abuse cases. Misuse cases involve intentional malicious behaviour. Abuse cases involve unintentional misuse that causes harm. The CSSLP exam tests this distinction — know both and know the difference."},
            {name:"Deriving security requirements",explain:"Each misuse case generates one or more security requirements. The misuse case 'attacker brute-forces login' generates requirements for account lockout, CAPTCHA, MFA, rate limiting, and alerting on unusual authentication patterns. Misuse case analysis is a structured way to derive comprehensive security requirements.",insight:"This is the practical value of misuse cases — they generate requirements. The exam tests whether you can read a misuse case and identify what security requirements it implies. Practice moving from attacker scenario to security control to requirement."},
            {name:"Attacker perspective",explain:"Developing misuse cases requires thinking like an attacker — what is the attacker's goal, what access do they have, and what legitimate functionality can they abuse? This perspective reveals requirements that use-case analysis alone will miss because use cases assume benign intent.",insight:"Thinking like an attacker is a core CSSLP competency. The exam will present scenarios from the attacker's perspective and ask what security requirements or controls are needed. Practise the shift: 'if I were trying to compromise this, what would I do?'"},
          ]},
          {label:"Abuse cases", chips:[
            {name:"Abuse case definition",explain:"An abuse case documents unintentional misuse of a system that results in harm — a user who accidentally deletes another user's data, a batch process that runs with excessive privileges and corrupts data, or an error in user input that triggers unintended behaviour. Abuse cases highlight safety and integrity risks.",insight:"Abuse cases identify risks from legitimate users behaving unexpectedly. They drive requirements for confirmation dialogs, rollback capability, input validation, and privilege scoping. The exam distinguishes abuse cases (unintentional) from misuse cases (intentional)."},
            {name:"Input abuse scenarios",explain:"Users will enter unexpected, malformed, or boundary-violating input — intentionally or accidentally. Abuse cases document these scenarios: what happens if a user enters a negative quantity, a date 200 years in the future, or a 10,000-character string in a name field? Requirements must address each scenario.",insight:"Input abuse scenarios drive input validation requirements. Each scenario generates a specific validation rule. The exam may present a scenario with unexpected input and ask what requirement should have been defined — the answer involves specific, testable validation rules."},
          ]},
        ]
      },
      {
        label:"Data classification and privacy requirements", color:"#1a5045",
        groups:[
          {label:"Data classification", chips:[
            {name:"Classification schemes",explain:"Software must classify the data it handles and apply appropriate controls for each classification level. Data classifications (public, internal, confidential, restricted) map to different encryption, access control, logging, and retention requirements. Software requirements must specify the classification of each data element.",insight:"Classification drives controls. The exam tests whether you can read a data classification and determine what controls are required. Confidential data requires encryption at rest and in transit; public data may not. Know the control implications of each classification level."},
            {name:"PII identification",explain:"Requirements must identify all personally identifiable information processed by the system. PII includes names, addresses, national insurance numbers, IP addresses, biometric data, and any combination of data that could identify an individual. Each PII element requires specific protection requirements.",insight:"PII identification is a prerequisite for privacy requirements. The exam may present a system description and ask which elements are PII. Remember that combinations of individually non-identifying data can constitute PII if they identify a person when combined."},
            {name:"PHI requirements",explain:"Protected health information requires specific software controls under HIPAA — access logging, encryption, breach notification capability, and minimum necessary access. Software requirements for systems handling PHI must explicitly address each HIPAA technical safeguard.",insight:"PHI requirements are more prescriptive than general PII requirements. HIPAA's technical safeguard requirements map directly to software requirements. The exam tests whether you can identify the HIPAA technical safeguards and translate them into software requirements."},
            {name:"Data minimisation",explain:"Requirements should specify that the system only collects and retains the minimum data necessary for its stated purpose. Data minimisation is a GDPR principle and a security principle — data you do not hold cannot be breached. Requirements must include explicit constraints on data collection scope.",insight:"Data minimisation is a design constraint, not just a compliance principle. The exam may present scenarios where a system collects more data than needed — the correct response is to revise the requirements to constrain collection, not just implement privacy controls on excess data."},
          ]},
          {label:"Privacy requirements", chips:[
            {name:"Right to erasure",explain:"Systems processing personal data under GDPR must support the right to erasure (right to be forgotten). This is a software requirement — the system must be able to find and delete all instances of a person's data, including in backups and archives. This has significant architectural implications.",insight:"Right to erasure is an architectural requirement. A system with immutable audit logs containing PII has a conflict between audit requirements and erasure requirements. This must be resolved at requirements time — the exam tests whether you identify this conflict."},
            {name:"Data portability",explain:"GDPR requires that individuals can request their data in a portable, machine-readable format. This is a software requirement — the system must be able to export a person's data in a structured format on request. This must be designed in, not added as an afterthought.",insight:"Data portability requires an export capability that may not exist in many systems. The exam tests whether you identify data portability as a software requirement that must be designed in from the start."},
            {name:"Consent management",explain:"For systems that process data based on consent, requirements must specify how consent is obtained, recorded, and managed. The system must be able to record when consent was given, for what purpose, and must be able to revoke processing when consent is withdrawn.",insight:"Consent management is a software capability, not just a legal process. The system must technically enforce consent withdrawal — if a user withdraws consent, the system must stop processing their data. This is a software requirement with architecture implications."},
          ]},
        ]
      },
      {
        label:"Compliance-driven requirements", color:"#2E7D6B",
        groups:[
          {label:"Standards mapping", chips:[
            {name:"Requirements traceability matrix",explain:"An RTM maps each security requirement to its source (regulation, policy, threat model, business need) and to the design, implementation, and test artefacts that satisfy it. It provides evidence that all requirements have been addressed and enables impact analysis when requirements change.",insight:"The RTM is a governance and audit tool. The exam tests whether you know why an RTM is maintained — not just what it contains. It provides evidence of compliance, supports change impact analysis, and ensures no requirement is overlooked in testing."},
            {name:"Acceptance criteria",explain:"Security requirements must have measurable acceptance criteria — specific, testable conditions that define when the requirement is satisfied. 'The system must be secure' has no acceptance criteria. 'Authentication must lock the account after 5 consecutive failures' has clear, testable acceptance criteria.",insight:"Acceptance criteria make requirements testable. The exam may present requirements without acceptance criteria and ask what is wrong — the answer is that without measurable criteria, you cannot objectively determine whether the requirement has been met."},
            {name:"Vendor requirements",explain:"When third-party components, libraries, or services are used, security requirements must flow down to vendors. Contracts should specify security requirements, audit rights, breach notification obligations, and security testing requirements for vendor-supplied components.",insight:"Vendor security requirements are a supply chain control. The exam tests whether you include vendor security requirements in the requirements phase — not just in procurement contracts. Requirements must specify what security evidence vendors must provide."},
          ]},
          {label:"Security SLAs", chips:[
            {name:"Response time requirements",explain:"Requirements must specify security-related response times — how quickly must the system lock an account after a brute force attempt, how quickly must a session timeout after inactivity, how quickly must a security alert be generated after an anomalous event. These are testable requirements.",insight:"Security response time requirements are often omitted. The exam may present a scenario where an account is locked too slowly to prevent credential stuffing — the correct lesson is that response time is a security requirement that must be specified."},
            {name:"Availability requirements",explain:"Security-critical components — authentication services, authorisation policy engines, security logging infrastructure — must have explicit availability requirements. If the authentication service is down and the application fails open, availability of the security control is a security requirement.",insight:"The availability of security controls is itself a security requirement. The exam may present a scenario where an authentication service outage causes the application to bypass authentication — the correct lesson is that security control availability must be a specified requirement."},
          ]},
        ]
      },
      {
        label:"Requirements validation", color:"#155a3c",
        groups:[
          {label:"Validation techniques", chips:[
            {name:"Requirements review",explain:"Security requirements should be reviewed by security specialists, developers, testers, and business stakeholders before development begins. Reviews catch ambiguity, missing requirements, conflicting requirements, and requirements that are not technically feasible.",insight:"Requirements reviews are cheaper than finding gaps in testing. The exam tests the principle that the cost of fixing a requirement error increases by an order of magnitude at each subsequent phase — fixing at requirements review costs 1x; fixing in production costs 100x."},
            {name:"Threat model validation",explain:"Security requirements should be validated against the threat model — for each identified threat, there should be at least one requirement that addresses it. If a threat has no corresponding requirement, either the threat should be accepted or a requirement should be added.",insight:"Threat model to requirements mapping is a validation technique. The exam may present a threat model and ask whether the requirements adequately address it. A threat with no corresponding requirement is a requirements gap."},
            {name:"Prototyping",explain:"Security-critical requirements — particularly those involving novel authentication mechanisms, complex access control models, or integration with external security services — may benefit from prototyping to validate feasibility before full development begins.",insight:"Prototyping validates technical feasibility of security requirements. The exam may present a security requirement that sounds reasonable but is technically challenging to implement — prototyping is the appropriate technique to validate feasibility before committing to full development."},
          ]},
          {label:"Requirements security review", chips:[
            {name:"Privacy impact assessment",explain:"A Privacy Impact Assessment (PIA) or Data Protection Impact Assessment (DPIA) evaluates the privacy implications of a new system or feature at the requirements stage. Under GDPR, a DPIA is mandatory for high-risk processing activities. It must be completed before development begins.",insight:"DPIAs are legally required for high-risk processing under GDPR and must be completed at the requirements stage — not after the system is built. The exam tests whether you know the DPIA is triggered by requirements, not by deployment."},
            {name:"Security requirements sign-off",explain:"Security requirements must be formally reviewed and approved by both the security team and business stakeholders. Sign-off creates accountability, confirms that security implications are understood, and establishes the baseline against which the delivered system will be assessed.",insight:"Security requirements sign-off is a governance control. The exam tests whether requirements are formally approved — not just informally agreed. Formal sign-off creates a documented baseline and shared accountability between security and the business."},
          ]},
        ]
      },
    ],
    traps:["Misuse cases are intentional attacks — abuse cases are unintentional misuse — they are different","Security requirements must be testable — 'be secure' is not a requirement","Data minimisation means don't collect it, not just protect what you have","Right to erasure is an architectural requirement — you can't retrofit it","RTM maps requirements to tests — gaps in the RTM are gaps in coverage","Vendor requirements must flow down in contracts — verbal assurances are not adequate"],
    connects:["Identify data","Classify it","Define protection needs","Model misuse","Validate requirements","Get sign-off"]
  },
  {
    id:3, color:"#1B5E8C", pct:"14%", qs:"~18",
    name:"Secure Software Architecture and Design", short:"Architecture",
    hook:"The decisions made in design are the most powerful — and the most expensive to reverse.",
    clusters:[
      {
        label:"Threat modelling", color:"#1B5E8C",
        groups:[
          {label:"Methodologies", chips:[
            {name:"STRIDE",explain:"STRIDE systematically identifies threats by category: Spoofing (fake identity), Tampering (modifying data), Repudiation (denying actions), Information Disclosure (data exposure), Denial of Service (availability attack), Elevation of Privilege (gaining unauthorised access). Applied to each component and data flow in the system.",insight:"STRIDE maps to mitigations: Spoofing → authentication; Tampering → integrity controls; Repudiation → logging/non-repudiation; Information Disclosure → encryption/access control; DoS → availability controls; EoP → authorisation. Know the mapping for the exam."},
            {name:"PASTA",explain:"Process for Attack Simulation and Threat Analysis is a risk-centric threat modelling methodology with seven stages: define objectives, define technical scope, application decomposition, threat analysis, vulnerability analysis, attack modelling, and risk/impact analysis. It aligns threat modelling with business risk.",insight:"PASTA is business-risk focused — it connects technical threats to business impact. The exam may ask which methodology is most appropriate when the goal is to prioritise mitigations based on business risk rather than technical severity. PASTA is designed for this purpose."},
            {name:"LINDDUN",explain:"LINDDUN focuses specifically on privacy threats: Linkability, Identifiability, Non-repudiation (as a privacy threat), Detectability, Disclosure of information, Unawareness, and Non-compliance. It is the privacy-focused complement to STRIDE and is particularly relevant for systems handling personal data.",insight:"LINDDUN is the privacy threat modelling counterpart to STRIDE. The exam may test LINDDUN in the context of GDPR requirements or privacy by design. If the scenario involves a system handling personal data and asks about threat modelling, LINDDUN is relevant."},
            {name:"TRIKE",explain:"TRIKE is a threat modelling methodology that uses requirements models to define acceptable system behaviour, then threat models to identify deviations. It focuses on the risk equation from the defender's perspective and prioritises threats based on their acceptability relative to requirements.",insight:"TRIKE uses a requirements-first approach — acceptable behaviour is defined first, then threats are identified as deviations from that behaviour. The exam may distinguish TRIKE from other methodologies by its requirements-centric approach."},
            {name:"Attack trees",explain:"Attack trees model how an attacker can achieve a goal — the root is the attacker's objective, branches represent sub-goals, and leaves represent specific attacks. They help identify all paths to an objective and evaluate which controls at which nodes block the most attack paths.",insight:"Attack trees are particularly useful for identifying alternative attack paths. The exam may present a scenario and ask how to identify all ways an attacker could achieve a goal — attack trees are the structured technique for this analysis."},
          ]},
          {label:"Threat model artefacts", chips:[
            {name:"Data flow diagrams",explain:"DFDs document how data moves through a system — what data enters, how it is processed, where it is stored, and how it exits. Trust boundaries are marked on DFDs. They are the foundation artefact for STRIDE-based threat modelling because STRIDE is applied to each element and flow on the DFD.",insight:"DFDs are the starting point for threat modelling. The exam may present a DFD and ask what threats apply to a specific component or data flow. Practice applying STRIDE to each element: processes, data stores, external entities, and data flows."},
            {name:"Trust boundary identification",explain:"Trust boundaries mark where data crosses between components with different trust levels. Every trust boundary crossing is a potential attack point. Trust boundaries must be explicitly identified on DFDs and each crossing must have appropriate controls — validation, authentication, authorisation.",insight:"Trust boundaries are where controls are most important. The exam will present scenarios where data crosses a trust boundary without appropriate controls — this is the threat model gap to identify. Every trust boundary must have a control."},
            {name:"Threat register",explain:"A threat register documents all identified threats, their likelihood, impact, the controls that mitigate them, and the residual risk. It is the output of threat modelling and the input to security requirements and design decisions. It should be maintained throughout the software lifecycle.",insight:"The threat register is a living document. The exam tests whether you understand that threat modelling is not a one-time exercise — threats change as the system evolves, and the threat register must be updated. Changes to the system should trigger threat model review."},
          ]},
        ]
      },
      {
        label:"Security design principles", color:"#16497a",
        groups:[
          {label:"Architectural principles", chips:[
            {name:"Secure architecture patterns",explain:"Proven secure architecture patterns — layered architecture with security at each layer, API gateways for centralised authentication and authorisation, service mesh for inter-service authentication — provide reusable security solutions. Using established patterns reduces the risk of custom security design errors.",insight:"The exam rewards established patterns over custom security designs. A custom authentication mechanism is higher risk than using OAuth 2.0 with OIDC. Know the standard patterns and why they are preferable to custom implementations."},
            {name:"Zero trust architecture",explain:"Zero trust rejects the concept of a trusted internal network. Every request, regardless of origin, must be authenticated, authorised, and continuously validated. In software, this means inter-service calls require authentication even on the internal network, and access is granted per-request, not per-session.",insight:"Zero trust is increasingly tested in CSSLP. The key principle is 'never trust, always verify'. Applied to software, this means microservices must authenticate to each other — a compromised internal service should not automatically have access to all other internal services."},
            {name:"Microservices security",explain:"Microservices architecture introduces specific security challenges — each service is a potential attack surface, inter-service communication must be secured, and the distributed nature makes consistent policy enforcement harder. Service mesh, mutual TLS, and centralised identity are common solutions.",insight:"Microservices change the attack surface compared to monolithic applications. The exam may present microservices scenarios and test whether you understand the security implications — more trust boundaries, more authentication requirements, more logging points."},
            {name:"API-first security",explain:"In API-first architectures, the API is the primary attack surface. API security design includes authentication (OAuth 2.0, API keys), authorisation (scopes, claims-based access), rate limiting, input validation, output filtering, and versioning. Security must be designed into the API specification.",insight:"API security is designed in the specification, not added to the implementation. The exam tests whether security requirements — authentication, authorisation, rate limiting — are part of the API design, not implementation details left to developers."},
          ]},
          {label:"Design patterns", chips:[
            {name:"Input validation pattern",explain:"The input validation pattern establishes a dedicated validation layer that all inputs pass through before entering business logic. This layer enforces type checking, range validation, format validation, and length limits. Input that fails validation is rejected before it can reach processing logic.",insight:"The input validation pattern is a defence in depth control. Validation at the UI alone is insufficient — attackers bypass the UI. Validation must occur at the API gateway or service boundary, regardless of whether the UI validated first."},
            {name:"Secure session management",explain:"Secure session management design specifies how sessions are created, maintained, and terminated. Sessions must use cryptographically random tokens, be invalidated on logout and privilege change, have appropriate timeouts, and be protected against fixation and hijacking attacks.",insight:"Session management design is a common exam topic. Know the requirements: random tokens, invalidate on logout, absolute and idle timeouts, secure and HttpOnly cookie flags, regenerate session on privilege elevation."},
            {name:"Centralised security controls",explain:"Security controls — authentication, authorisation, logging, error handling — should be centralised rather than implemented ad hoc in each component. Centralised controls are easier to audit, test, and update. Distributed security implementations lead to inconsistency and gaps.",insight:"Centralised security controls are more maintainable and auditable. The exam may present a scenario with security controls implemented differently across multiple components — the correct recommendation is to centralise them in a shared security library or service."},
          ]},
        ]
      },
      {
        label:"Cryptography in design", color:"#0d3a5e",
        groups:[
          {label:"Algorithm selection", chips:[
            {name:"Symmetric encryption",explain:"AES with 256-bit keys is the standard for symmetric encryption in modern software. It should be used with appropriate modes — GCM for authenticated encryption (provides both confidentiality and integrity), CTR or CBC with separate HMAC if GCM is not available. Never use ECB mode.",insight:"AES-GCM is the preferred symmetric encryption mode because it provides authenticated encryption — it guarantees both confidentiality and integrity in one operation. The exam tests algorithm selection: AES-256 with GCM, not DES, 3DES, or AES-ECB."},
            {name:"Asymmetric encryption",explain:"RSA with 2048-bit minimum keys (4096 preferred) and ECC with 256-bit keys (ECDSA, ECDH) are the current standards. ECC provides equivalent security to RSA with significantly smaller keys, making it preferable for resource-constrained environments and mobile applications.",insight:"ECC is more efficient than RSA for equivalent security. The exam may ask which is preferable for a mobile application — ECC provides the same security as RSA-3072 with a 256-bit key. RSA-1024 is broken; the minimum is RSA-2048."},
            {name:"Hashing algorithms",explain:"SHA-256 or SHA-3 for general hashing and integrity verification. bcrypt, Argon2, or PBKDF2 for password hashing — general-purpose hashes are too fast for password storage and enable brute force. MD5 and SHA-1 are cryptographically broken and must not be used for security purposes.",insight:"Password hashing is a specific use case requiring slow algorithms. SHA-256 is too fast — it enables billions of guesses per second with GPU acceleration. bcrypt or Argon2 are designed to be slow and resistant to GPU acceleration. The exam distinguishes general hashing from password hashing."},
            {name:"Key exchange",explain:"Diffie-Hellman (DH) and Elliptic Curve Diffie-Hellman (ECDH) are used for key exchange — establishing a shared secret over an insecure channel without transmitting the secret itself. ECDH provides the same security as DH with smaller parameters. Forward secrecy requires ephemeral key exchange.",insight:"Perfect forward secrecy (PFS) means that compromise of long-term keys does not expose past sessions. PFS requires ephemeral key exchange (DHE or ECDHE) where session keys are generated fresh for each connection and discarded afterwards. The exam tests PFS as a design requirement."},
          ]},
          {label:"Cryptographic implementation", chips:[
            {name:"Key management design",explain:"Cryptographic key management must be designed explicitly — how keys are generated (using cryptographically secure random number generators), stored (in dedicated key management systems, not hardcoded), rotated (with defined schedules and procedures), and destroyed (securely, completely). Key management is where most cryptographic implementations fail.",insight:"Key management is the most common point of cryptographic failure. The exam tests key management design: keys must never be hardcoded, must be stored in dedicated systems (HSM, KMS), must be rotated, and must be destroyed securely at end of life."},
            {name:"Certificate management",explain:"TLS certificate management must be designed into the system — how certificates are issued, renewed, revoked, and monitored for expiry. Certificate pinning may be appropriate for high-security applications. Certificate transparency logs should be monitored for unauthorised certificate issuance.",insight:"Certificate expiry causing production outages is a common, preventable failure. The exam tests whether certificate lifecycle management — automated renewal, expiry monitoring, revocation checking — is designed into the system."},
            {name:"Cryptographic agility",explain:"Cryptographic agility means designing software so that cryptographic algorithms can be replaced without major rearchitecting. As algorithms age and vulnerabilities are discovered, systems must be able to migrate to newer algorithms. Hard-coding algorithm choices makes migration expensive.",insight:"Cryptographic agility is a design principle for longevity. The exam may present a scenario where a deprecated algorithm needs to be replaced — systems designed for cryptographic agility can do this with configuration changes; systems that hardcoded the algorithm require significant rework."},
          ]},
        ]
      },
      {
        label:"Architecture frameworks", color:"#1B5E8C",
        groups:[
          {label:"Reference frameworks", chips:[
            {name:"SABSA",explain:"Sherwood Applied Business Security Architecture provides a risk-driven framework that derives security requirements from business objectives. It works through layers from business context down to technical implementation, ensuring security architecture is traceable to business need rather than built on assumptions.",insight:"SABSA starts with business attributes — what does the business need to be able to do securely? Security architecture flows from these attributes. The exam may ask which framework starts with business requirements and derives architecture — SABSA is the answer."},
            {name:"TOGAF with security",explain:"The Open Group Architecture Framework provides an enterprise architecture methodology. Security architecture integrated with TOGAF ensures security is addressed across all architecture domains — business, data, application, and technology. Security becomes part of enterprise architecture rather than a separate concern.",insight:"TOGAF with security integration ensures security architecture is aligned with overall enterprise architecture. The exam may present a scenario where security and enterprise architecture are misaligned — the correct recommendation is to integrate security into the enterprise architecture process."},
            {name:"NIST Secure Software Framework",explain:"NIST provides guidance for secure software development through the Secure Software Development Framework (SSDF) and related publications. The SSDF organises secure development practices into four groups: prepare the organisation, protect the software, produce well-secured software, and respond to vulnerabilities.",insight:"The NIST SSDF is increasingly referenced in the CSSLP exam. Know the four practice groups and be able to map secure development activities to the appropriate group. The SSDF is also referenced in US executive orders on software security."},
          ]},
          {label:"Cloud architecture security", chips:[
            {name:"Shared responsibility model",explain:"In cloud environments, security responsibilities are divided between the provider and the customer. The provider secures the underlying infrastructure; the customer secures their data, applications, access controls, and configurations. For software, the customer is always responsible for application security regardless of deployment model.",insight:"Shared responsibility is a cloud design principle. The exam tests whether you understand that moving to the cloud does not transfer application security responsibility. The customer remains responsible for authentication, authorisation, input validation, and data protection in their application."},
            {name:"Cloud-native security patterns",explain:"Cloud-native applications should use managed identity services (rather than stored credentials), managed key services (rather than implementing key management), security groups and network policies (rather than application-layer network controls), and cloud-native logging and monitoring.",insight:"Cloud-native security patterns use the platform's security capabilities rather than reimplementing them. The exam may present a choice between implementing custom authentication versus using a managed identity provider — managed services are preferable unless there is a specific reason not to use them."},
            {name:"Container security design",explain:"Container security design includes using minimal base images (reducing attack surface), running containers as non-root, implementing image signing and verification, designing for immutable infrastructure (no patching of running containers — rebuild and redeploy), and network policy enforcement.",insight:"Containers are immutable infrastructure. The exam tests the principle that you do not patch running containers — you rebuild the image with the fix and redeploy. A container that needs patching represents a design flaw (mutable containers) that should be corrected."},
          ]},
        ]
      },
      {
        label:"Secure design verification", color:"#0d3a5e",
        groups:[
          {label:"Design review", chips:[
            {name:"Architecture security review",explain:"A formal security review of the architecture before development begins identifies design-level security flaws that are cheapest to fix at this stage. Reviews should cover threat model completeness, control adequacy, cryptographic choices, trust boundary management, and compliance requirements.",insight:"Architecture security reviews are the highest-ROI security activity. A finding at design review costs a fraction of the same finding in production. The exam tests whether architecture reviews are a mandatory gate before development, not an optional activity."},
            {name:"Design patterns compliance",explain:"Architecture reviews should verify that established secure design patterns are used correctly — that session management follows the pattern, that cryptography is implemented using approved libraries, and that no custom security mechanisms have been invented where standard solutions exist.",insight:"Compliance with design patterns is verifiable. The exam may present a custom security mechanism and ask whether it is appropriate — the answer is that standard, proven patterns are preferable to custom implementations unless there is a specific, documented reason for deviation."},
          ]},
          {label:"Threat model review", chips:[
            {name:"Completeness assessment",explain:"Threat model reviews verify that all components, data flows, and trust boundaries have been modelled, all STRIDE categories have been considered for each element, all identified threats have mitigating controls, and the threat register is current.",insight:"Threat model completeness is measurable. The exam may present a threat model and ask what is missing — look for unmodelled components, uncovered threat categories, or threats without corresponding controls."},
            {name:"Control adequacy",explain:"For each identified threat, the proposed control must be adequate — sufficient to reduce the threat to an acceptable level. A weak control that does not actually mitigate the threat provides false assurance. Threat model review must verify control adequacy, not just control existence.",insight:"Control adequacy is distinct from control existence. Having a control that does not adequately address the threat is worse than acknowledging there is no control — it creates false confidence. The exam tests whether you can assess whether a control adequately addresses a threat."},
          ]},
        ]
      },
    ],
    traps:["STRIDE maps directly to security properties — know the mapping for each threat category","DFDs are the foundation of threat modelling — trust boundaries must be marked","AES-ECB is insecure — always use AES-GCM or AES-CBC with HMAC","bcrypt/Argon2 for passwords — SHA-256 alone is too fast","Cryptographic agility means you can swap algorithms without rearchitecting","Zero trust applies inside the network too — internal services must authenticate to each other"],
    connects:["Model threats","Identify boundaries","Select controls","Choose cryptography","Review design","Approve before building"]
