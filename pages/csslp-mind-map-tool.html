  {
    id:6, color:"#3A3A7C", pct:"11%", qs:"~14",
    name:"Secure Software Lifecycle Management", short:"Lifecycle Mgmt",
    hook:"Security isn't a phase — it's a discipline woven through every stage of the lifecycle.",
    clusters:[
      {
        label:"SDLC security integration", color:"#3A3A7C",
        groups:[
          {label:"SDLC models", chips:[
            {name:"Waterfall security integration",explain:"In waterfall development, security activities must be embedded in each phase: security requirements in requirements phase, threat modelling and security architecture review in design phase, secure coding and code review in development phase, security testing in test phase. Security cannot be a gate only at the end.",insight:"Waterfall's sequential nature means security gaps found late are expensive. The exam tests that security must be embedded in each waterfall phase — not deferred to a security testing sprint at the end. Late-phase security findings cost significantly more to remediate."},
            {name:"Agile security integration",explain:"In agile, security must be integrated into each sprint rather than deferred. Security user stories belong in the product backlog. Threat modelling should be performed for each significant feature. SAST runs on every commit. Security acceptance criteria are part of the definition of done.",insight:"Agile security requires 'security in every sprint' not 'a security sprint'. The exam tests that agile does not defer security — it integrates it continuously. Security acceptance criteria in the definition of done ensures security is not dropped under sprint pressure."},
            {name:"DevSecOps",explain:"DevSecOps extends DevOps by embedding security throughout the CI/CD pipeline — automated SAST on every commit, dependency scanning, container scanning, secrets detection, infrastructure security scanning, and automated security tests as part of the deployment gate. Security is automated and continuous.",insight:"DevSecOps is about automation and shifting left. The exam tests that DevSecOps is a culture and process change with automation support — not just a set of tools. The goal is to make security fast enough to not slow development, by automating repetitive security checks."},
            {name:"BSIMM",explain:"Building Security in Maturity Model is a data-driven assessment of software security practices. It documents what real organisations actually do and provides a benchmark for measuring programme maturity. BSIMM is descriptive — it describes what organisations do — rather than prescriptive.",insight:"BSIMM is descriptive, not prescriptive. It tells you what other organisations at your maturity level do. The exam may distinguish BSIMM (descriptive, data-driven) from SAMM (prescriptive, guidance-driven). Both help organisations improve their software security programme."},
            {name:"OpenSAMM",explain:"The Software Assurance Maturity Model provides prescriptive guidance for building a software security programme. It defines practices across five business functions: Governance, Design, Implementation, Verification, and Operations. Each practice has three maturity levels with defined activities.",insight:"SAMM is prescriptive — it tells you what to do to improve. The exam tests SAMM in the context of software security programme improvement. SAMM's five functions map to the SDLC phases, making it directly applicable to programme planning."},
          ]},
          {label:"Security gates", chips:[
            {name:"Security approval gates",explain:"Security approval gates are mandatory checkpoints in the development pipeline where security conditions must be met before progression. Common gates include: threat model review complete before design sign-off, SAST below threshold before merge, security test pass before production deployment.",insight:"Security gates make security mandatory. The exam tests that security gates must be enforced — not advisory. A gate that developers can bypass under schedule pressure is not a gate. Automated gates in CI/CD are more reliable than manual approval processes."},
            {name:"Definition of done",explain:"The definition of done for any software feature should include security acceptance criteria — SAST complete with findings below threshold, security tests passing, threat model updated if architecture changed, no high or critical unresolved security findings. Security done means security tested.",insight:"Definition of done with security criteria prevents security debt accumulation. The exam tests that security is part of done — not a separate track. Features that pass functional tests but fail security tests are not done."},
          ]},
        ]
      },
      {
        label:"Risk management in the SDLC", color:"#2d2d6b",
        groups:[
          {label:"Risk identification", chips:[
            {name:"Risk identification per phase",explain:"Risk identification must occur at each SDLC phase — new risks emerge as design decisions are made, as implementation choices are finalised, and as deployment architecture is determined. A risk identified in design that was not visible at requirements time must be captured and managed.",insight:"Risk is dynamic — new risks emerge as design decisions are made. The exam tests that risk management is continuous throughout the SDLC, not a one-time requirements-phase activity. Each phase should have a risk review that captures newly identified risks."},
            {name:"Third-party risk",explain:"Third-party components, libraries, and services introduce risks that must be assessed — vulnerability exposure from known CVEs, supply chain compromise risk, licence compliance risk, and the risk of the vendor discontinuing support. Third-party risk must be assessed before components are incorporated.",insight:"Third-party risk assessment is a procurement and requirements activity. The exam tests that third-party risk is assessed before adoption — not just when vulnerabilities are discovered. Ongoing monitoring of third-party components for new vulnerabilities is also required."},
            {name:"End-of-life risk",explain:"Software dependencies that reach end-of-life no longer receive security patches. EOL components accumulate vulnerabilities with no remediation path. EOL risk must be tracked and managed — components must be upgraded or replaced before EOL, with planned migration rather than emergency response.",insight:"EOL risk management is proactive planning. The exam tests that EOL dates for all significant dependencies must be tracked and migration planned before EOL occurs. Discovering a critical dependency is EOL during an incident is avoidable with proactive management."},
          ]},
          {label:"Security debt", chips:[
            {name:"Security debt tracking",explain:"Security debt — known vulnerabilities and security deficiencies not yet remediated — must be tracked in a risk register. Each item of security debt should have an owner, a remediation plan, and an expected completion date. Security debt that is not tracked is not managed.",insight:"Security debt must be visible. The exam tests that untracked security debt is unmanaged risk. A risk register or security backlog that captures known issues — with owners and dates — is the management tool. Security debt hidden in individual team backlogs is organisational risk."},
            {name:"Risk acceptance process",explain:"Security debt that cannot be immediately remediated must be formally risk-accepted. The process requires documenting the risk, identifying compensating controls, getting sign-off at the appropriate management level, and setting a review date. Informal acceptance is not acceptance.",insight:"Formal risk acceptance creates accountability. The exam tests that informal 'we'll fix it later' is not risk acceptance. A documented decision with management sign-off, compensating controls, and a review commitment is required for each item of accepted risk."},
          ]},
        ]
      },
      {
        label:"Security governance and programme management", color:"#1e1e50",
        groups:[
          {label:"Programme management", chips:[
            {name:"Security champions",explain:"Security champions are development team members with security interest and training who act as the security team's representatives within development. They help teams apply security practices, triage security findings, and escalate issues. Security champions scale security expertise across a large development organisation.",insight:"Security champions bridge the gap between security and development. The exam tests the security champion model as a scaling strategy — a small security team cannot review all code and attend all meetings; champions embedded in teams extend the security team's reach."},
            {name:"Secure coding policy",explain:"A secure coding policy defines the mandatory practices developers must follow — which standards apply, which tools are required, what constitutes a security violation that blocks deployment. The policy provides the framework within which all other security programme activities operate.",insight:"Secure coding policy provides the governance foundation. The exam tests that technical security controls must be backed by policy. Without policy, security practices are optional and inconsistent. Policy makes compliance mandatory and enforceable."},
            {name:"Developer training programme",explain:"A software security training programme must be ongoing — initial onboarding plus regular updates as new threats emerge. Training must be relevant to the developer's technology stack and role. Metrics must track training completion and measure effectiveness through testing or simulation.",insight:"Developer training is a preventive control. The exam tests that training must be ongoing and relevant — not a one-time annual video. Training effectiveness should be measured — completion rates alone do not demonstrate that developers can actually write more secure code."},
          ]},
          {label:"Metrics and measurement", chips:[
            {name:"Security programme KPIs",explain:"Software security programme KPIs include: mean time to remediate security findings by severity, percentage of applications with threat models, SAST finding density per release, percentage of developers trained, and security findings per code review. Metrics demonstrate programme effectiveness and identify gaps.",insight:"Security metrics must be leading and lagging indicators. Lagging: number of vulnerabilities in production (outcome). Leading: percentage of releases with security testing (activity). The exam tests that a security programme without metrics cannot demonstrate effectiveness or improvement."},
            {name:"Vulnerability density",explain:"Vulnerability density — security findings per thousand lines of code — is a measure of code security quality. Tracking density over time shows whether the development programme is improving. Higher density indicates more security problems per unit of code; lower density indicates improvement.",insight:"Vulnerability density is a code quality metric. The exam tests it as a way to measure and compare security quality across teams and over time. A team whose vulnerability density is increasing despite training indicates the training is not effective."},
            {name:"Mean time to remediate",explain:"Mean Time to Remediate (MTTR) for security findings measures how quickly the development team addresses identified vulnerabilities. MTTR broken down by severity shows whether critical findings receive appropriate urgency. Long MTTR for critical findings indicates prioritisation failure.",insight:"MTTR is an operational effectiveness metric. The exam tests that MTTR by severity is more informative than overall MTTR — if critical findings take 90 days to remediate while medium findings take 10, there is a prioritisation failure despite the medium finding results looking good."},
          ]},
        ]
      },
      {
        label:"Continuous improvement", color:"#3A3A7C",
        groups:[
          {label:"Programme evolution", chips:[
            {name:"Lessons learned",explain:"Post-incident and post-release lessons learned must be integrated back into the software security programme — updating threat models, adding new test cases, improving developer training with real examples, and revising standards to prevent recurrence. Lessons learned that do not change practice do not improve security.",insight:"Lessons learned that do not change practice are wasted effort. The exam tests that findings from incidents and vulnerabilities must produce specific, actionable changes to the programme — not just documented in a report. What changes to prevent this from happening again?"},
            {name:"Threat intelligence integration",explain:"Current threat intelligence should inform the software security programme — new attack techniques should trigger updates to threat models, new vulnerability patterns should be added to SAST rules and developer training, and emerging threats to technologies in use should prompt proactive security review.",insight:"Threat intelligence makes the security programme proactive. The exam tests that a security programme that does not consume threat intelligence is reactive — it only responds to known threats. Integrating threat intelligence enables preparation for emerging threats."},
            {name:"Technology refresh",explain:"As technology stacks evolve — new frameworks, new deployment patterns, new language versions — the security programme must adapt. Security standards, training content, and tool configurations must be updated to address the security implications of new technologies before they are adopted at scale.",insight:"Technology refresh is a programme management activity. The exam tests that new technology adoption should trigger security programme updates — not be treated as a standard change. A new framework may have different vulnerability patterns that existing SAST rules and training do not address."},
          ]},
          {label:"Audit and assurance", chips:[
            {name:"Internal security audit",explain:"Internal audits of the software security programme verify that defined practices are being followed, controls are operating effectively, and the programme is achieving its objectives. Audits should be independent of the development teams they assess and should produce findings with remediation commitments.",insight:"Internal security audits verify programme effectiveness. The exam tests that audits assess whether practices are actually being followed — not just defined. A well-documented security programme where practices are not followed provides false assurance."},
            {name:"External assessment",explain:"External security assessments by independent third parties provide objective assurance that the software security programme is effective. They are less susceptible to internal bias and carry more weight with customers, regulators, and boards. They should be conducted periodically and after significant changes.",insight:"External assessments provide independent assurance. The exam tests that external assessments are more credible than internal assessments because they are independent of the organisation's interests. Customers and regulators typically require external assessment as evidence of security effectiveness."},
          ]},
        ]
      },
    ],
    traps:["DevSecOps is a culture change with automation — not just a set of tools","BSIMM is descriptive — SAMM is prescriptive — they serve different purposes","Security debt that is not tracked is not managed — a backlog is not a risk register","Lessons learned that do not change practice are useless","Definition of done must include security acceptance criteria — security is not separate from done","Risk acceptance must be formal and documented — informal acceptance is not governance"],
    connects:["Integrate security","Gate each phase","Track risk","Manage debt","Measure effectiveness","Improve continuously"]
  },
  {
    id:7, color:"#7C4A1A", pct:"12%", qs:"~15",
    name:"Secure Software Deployment, Operations and Maintenance", short:"Deploy & Ops",
    hook:"Getting it out safely is as important as building it securely. Deployment is an attack surface.",
    clusters:[
      {
        label:"Secure deployment", color:"#7C4A1A",
        groups:[
          {label:"CI/CD pipeline security", chips:[
            {name:"Pipeline security controls",explain:"CI/CD pipeline security includes: restricting who can modify pipeline definitions, requiring code signing for pipeline scripts, segregating pipeline environments from production, preventing secret exposure in build logs, and enforcing security gates that cannot be bypassed.",insight:"CI/CD pipelines are increasingly targeted by attackers because they have privileged access to production environments. The exam tests that pipeline security is a security design concern — not just an operational configuration. A compromised pipeline can deploy malicious code to production."},
            {name:"Secrets in pipelines",explain:"Build pipelines must not expose secrets — API keys, deployment credentials, signing keys — in build logs, environment variables accessible to build scripts, or artefact metadata. Secrets should be accessed through dedicated vault integrations that inject them at runtime without logging.",insight:"Pipeline secrets exposure is a common vulnerability. The exam tests that secrets must be managed through vault integrations in CI/CD — not stored as environment variables or hardcoded in pipeline scripts. A leaked CI/CD credential gives an attacker production access."},
            {name:"Artefact signing",explain:"Build artefacts — container images, packages, compiled binaries — should be cryptographically signed using the organisation's signing key and the signature verified before deployment. Signing ensures that only artefacts built by the authorised pipeline are deployed, preventing tampering between build and deployment.",insight:"Artefact signing is a supply chain integrity control. The exam tests that the artefact deployed to production should be provably the same artefact that passed security testing. Unsigned artefacts can be tampered with between build and deployment."},
            {name:"Deployment approval",explain:"Production deployments must require approval from authorised individuals — not just automated pipeline success. High-risk deployments should require security team sign-off in addition to development and operations approval. Approval workflows create accountability and a controlled deployment process.",insight:"Deployment approval is a change management control. The exam tests that automated pipeline success alone is not sufficient for production deployment — human approval for significant changes provides a final check and creates accountability."},
          ]},
          {label:"Infrastructure security", chips:[
            {name:"Infrastructure as code security",explain:"IaC templates (Terraform, CloudFormation, Ansible) must be security-reviewed before use. IaC scanning tools check for misconfigurations — open security groups, unencrypted storage, overly permissive IAM policies. IaC changes should go through the same security review process as application code.",insight:"IaC is code and must be treated as code from a security perspective. The exam tests that IaC requires security review — not just functional review. A misconfigured IaC template that creates an open S3 bucket or overly permissive IAM role is a security vulnerability."},
            {name:"Immutable infrastructure",explain:"Immutable infrastructure means deployed components are never modified after deployment — when a change is needed, a new version is built and deployed, replacing the old version entirely. This prevents configuration drift, ensures consistency between deployed instances, and simplifies security auditing.",insight:"Immutable infrastructure eliminates configuration drift. The exam tests that immutable infrastructure is a security principle — patching a running container is not consistent with immutable infrastructure, which requires rebuilding and redeploying the image."},
          ]},
        ]
      },
      {
        label:"Environment and configuration security", color:"#9a5f22",
        groups:[
          {label:"Environment separation", chips:[
            {name:"Environment segregation",explain:"Development, test, staging, and production environments must be segregated — separate networks, separate credentials, separate access controls. Production data must not be accessible from development or test environments. Production credentials must not be shared with lower environments.",insight:"Environment segregation prevents cross-contamination. The exam tests that production credentials in development environments are a security violation — developers with production access through shared credentials can accidentally or deliberately affect production."},
            {name:"Production access controls",explain:"Production environment access must be strictly controlled — only operations and security teams with business need should have production access, all access must be logged and monitored, privileged access should use just-in-time provisioning, and developer production access should be restricted to break-glass emergency scenarios.",insight:"Developer production access is a risk. The exam tests that production access should be restricted and monitored. Developers who routinely access production to debug issues should have that need addressed through better observability tools, not standing production access."},
            {name:"Configuration management",explain:"Configuration must be managed as code — stored in version control, reviewed before deployment, applied consistently, and auditable. Configuration drift between instances creates security inconsistency. Automated configuration management tools ensure all instances match the defined secure baseline.",insight:"Configuration drift is a security risk. The exam tests that configuration management must be automated to prevent instances diverging from the secure baseline. Manual configuration management at scale is error-prone and creates inconsistency."},
          ]},
          {label:"Hardening", chips:[
            {name:"Application hardening",explain:"Application hardening removes unnecessary features and components, disables debug endpoints and development mode settings, removes default credentials, hardens error handling to prevent information disclosure, and configures security headers. Hardening reduces attack surface for deployed applications.",insight:"Hardening is a deployment activity, not a development activity. The exam tests that applications must be hardened for production — development convenience features (debug mode, verbose errors, default credentials) must be removed before deployment."},
            {name:"Container hardening",explain:"Container hardening includes: using minimal base images (distroless or alpine), removing unnecessary tools and packages, running as a non-root user, making the filesystem read-only where possible, dropping Linux capabilities not required by the application, and implementing seccomp profiles.",insight:"Container hardening reduces the blast radius of container compromise. The exam tests container-specific hardening: non-root user, read-only filesystem, minimal base image. A container running as root with a full OS image has a much larger attack surface than a hardened container."},
          ]},
        ]
      },
      {
        label:"Operations, monitoring and incident response", color:"#5a3010",
        groups:[
          {label:"Security monitoring", chips:[
            {name:"Application security monitoring",explain:"Production applications must generate security-relevant log events that are forwarded to a centralised SIEM. Application security monitoring covers authentication events, authorisation failures, input validation failures, and unusual usage patterns that may indicate attack or abuse.",insight:"Application security monitoring requires the application to generate appropriate security events. The exam tests that monitoring is a software requirement — applications must be designed to produce the log events needed for security monitoring. Monitoring cannot be added to an application that does not log security events."},
            {name:"Anomaly detection",explain:"Anomaly detection identifies unusual patterns in application behaviour — unexpected traffic volumes, unusual access patterns, logins from unexpected locations, or transactions that deviate from normal patterns. Machine learning and rule-based approaches identify anomalies that signature-based detection misses.",insight:"Anomaly detection catches novel attacks that signatures miss. The exam tests anomaly detection as a complement to signature-based detection — signatures catch known attack patterns; anomaly detection catches deviations from normal behaviour that may indicate unknown attacks."},
            {name:"Runtime application monitoring",explain:"Runtime monitoring of production applications tracks performance metrics, error rates, and security events in real-time. Unusual error rate increases, unexpected resource consumption, and abnormal traffic patterns may indicate active attacks. Monitoring must be designed into the application, not added retrospectively.",insight:"Runtime monitoring requires application instrumentation. The exam tests that monitoring must be designed in — not added after deployment. An application with no logging or monitoring is effectively blind. Monitoring is a software requirement, not an operations afterthought."},
          ]},
          {label:"Incident response for software", chips:[
            {name:"Software incident response",explain:"Incident response for software vulnerabilities includes: confirming the vulnerability and its exploitability, assessing impact and scope of exploitation, implementing immediate mitigations (WAF rules, feature flags, rate limiting), deploying a permanent fix, and conducting post-incident review.",insight:"Software incident response has software-specific steps. The exam tests that immediate mitigation of a software vulnerability may not involve patching — WAF rules and feature flags can provide temporary protection while a permanent fix is developed and tested."},
            {name:"Emergency patching",explain:"Emergency patching for critical vulnerabilities requires accelerated testing and deployment procedures that maintain security control without the normal development timeline. Emergency changes still require approval and testing — just with compressed timelines. Changes that cannot be adequately tested should use alternative mitigations.",insight:"Emergency patching has a lower testing bar but not a zero testing bar. The exam tests that deploying an untested emergency patch to production can cause an outage — alternative mitigations should be used if the fix cannot be adequately tested in the available time."},
          ]},
        ]
      },
      {
        label:"Maintenance, patching and EOL management", color:"#7C4A1A",
        groups:[
          {label:"Patch management", chips:[
            {name:"Dependency tracking",explain:"All third-party dependencies must be tracked with current versions and known vulnerability status. Software Composition Analysis (SCA) tools continuously monitor dependencies against CVE databases and alert on new vulnerabilities. Dependency tracking is the foundation of patch management.",insight:"Dependency tracking is a prerequisite for patch management. The exam tests that you cannot manage what you cannot see — a complete, current inventory of dependencies with vulnerability status is required. SCA tools automate this tracking."},
            {name:"Patch testing and deployment",explain:"Security patches must be tested in a representative non-production environment before production deployment. The test must verify that the patch addresses the vulnerability and does not break existing functionality. Patch deployment should be automated where possible to reduce time to remediation.",insight:"Patch testing prevents patch-induced outages. The exam tests that patches require testing even when urgency is high. A patch that breaks production functionality is an availability incident. The risk of the vulnerability is weighed against the risk of an untested patch."},
            {name:"SLA compliance",explain:"Vulnerability remediation SLAs must be tracked and reported. Critical vulnerabilities must be remediated within defined timeframes. SLA breaches must be escalated with formal risk acceptance for vulnerabilities that cannot be remediated within the SLA. Unmeasured SLAs are unmanaged.",insight:"SLA compliance is a governance metric. The exam tests that SLAs must be tracked and breaches escalated — not silently accepted. SLA breach with formal risk acceptance is appropriate; SLA breach without visibility is a governance failure."},
          ]},
          {label:"EOL management", chips:[
            {name:"EOL component strategy",explain:"Components approaching end of life must be replaced or upgraded before EOL occurs. Migration should be planned and resourced before the EOL date — not treated as an emergency when EOL arrives. The risk of continued use of EOL components must be documented and formally accepted if migration is delayed.",insight:"EOL management is proactive planning. The exam tests that EOL migration should begin before the EOL date — not after. Organisations that plan EOL migrations proactively avoid the emergency cost and risk of operating unsupported components."},
            {name:"Legacy software risk",explain:"Legacy software that cannot be updated may require compensating controls — network isolation, WAF protection, enhanced monitoring, or application wrapping. Legacy software risk must be formally managed and reviewed regularly — not accepted indefinitely without reassessment.",insight:"Legacy software compensating controls are not permanent solutions. The exam tests that compensating controls for legacy software reduce but do not eliminate risk, and must be reviewed regularly. The goal is migration — compensating controls buy time, they do not resolve the underlying issue."},
          ]},
        ]
      },
    ],
    traps:["Immutable containers are not patched — they are rebuilt and redeployed","Production secrets in development environments are a security violation","CI/CD pipeline compromise gives production access — pipelines are a critical attack surface","Emergency changes still require approval — just faster approval","Application monitoring must be designed in — it cannot be added to an application that does not log","EOL migration must begin before EOL — not after"],
    connects:["Secure the pipeline","Sign artefacts","Harden before deploy","Monitor in production","Respond to incidents","Manage patches","Plan EOL migration"]
  },
  {
    id:8, color:"#5C2A6B", pct:"11%", qs:"~14",
    name:"Secure Software Supply Chain", short:"Supply Chain",
    hook:"You inherit every vulnerability in every component you didn't write — and every line you did.",
    clusters:[
      {
        label:"Third-party and open source risk", color:"#5C2A6B",
        groups:[
          {label:"Open source risk management", chips:[
            {name:"Software Composition Analysis",explain:"SCA tools scan application dependencies and identify known vulnerabilities (CVEs), licence issues, and outdated components. SCA should be integrated into the CI/CD pipeline to catch vulnerable dependencies before deployment. SCA findings must be triaged and remediated like any other security finding.",insight:"SCA is the primary tool for managing open source risk. The exam tests SCA as a CI/CD pipeline integration — not just a periodic scan. Continuous SCA means new CVEs are detected as they are published, not weeks later during a scheduled scan."},
            {name:"Software Bill of Materials",explain:"An SBOM is a formal, structured inventory of all software components — first-party and third-party — in an application, including versions and licensing. SBOMs enable rapid response to new vulnerabilities by identifying all affected applications. US executive orders and regulatory requirements increasingly mandate SBOMs.",insight:"SBOMs are becoming a regulatory requirement. The exam tests that SBOMs enable rapid impact assessment when a new vulnerability is published — if you have an SBOM, you can immediately identify which of your applications use the affected component."},
            {name:"Licence compliance",explain:"Open source components carry licence obligations — some licences require that derivative works be open-sourced (copyleft), others require attribution, and some prohibit commercial use. Licence compliance must be assessed before adopting open source components and monitored as licences change.",insight:"Licence compliance is a legal risk as well as a security consideration. The exam tests that SCA tools should check licence compliance alongside vulnerability status. Using a GPL-licensed component in proprietary software without licence compliance creates legal exposure."},
            {name:"Dependency confusion attacks",explain:"Dependency confusion attacks publish malicious packages to public repositories with names that match internal package names, exploiting package managers that prioritise public repositories. Attackers can cause organisations to download and execute malicious code masquerading as an internal package.",insight:"Dependency confusion is a specific supply chain attack vector. Prevention requires configuring package managers to only download internal packages from internal repositories (private scope, namespace reservation). The exam tests this as a concrete supply chain attack with specific mitigations."},
          ]},
          {label:"Component risk assessment", chips:[
            {name:"Component vetting",explain:"Third-party components must be assessed before adoption: known vulnerabilities, maintenance status, contributor reputation, download volume (popular packages are better tested), security disclosures history, and whether the project has a published security policy.",insight:"Component vetting is a risk assessment activity. The exam tests that not all open source components are equal — a widely used, actively maintained component with a published security policy is lower risk than an obscure, unmaintained package with no security policy."},
            {name:"Maintenance status",explain:"Components that are no longer maintained accumulate vulnerabilities with no patches available. Before adopting a component, its maintenance status must be assessed — last commit date, issue response rate, and whether it has active maintainers. EOL risk must be considered at adoption, not discovered later.",insight:"Maintenance status is a forward-looking risk. The exam tests that an unmaintained component is a long-term liability — it will accumulate vulnerabilities that will never be patched. Selecting maintained alternatives at adoption time is far preferable to migrating under emergency conditions later."},
          ]},
        ]
      },
      {
        label:"Vendor and supplier management", color:"#4a2258",
        groups:[
          {label:"Vendor security requirements", chips:[
            {name:"Security in contracts",explain:"Contracts with software vendors and suppliers must include security requirements — minimum security standards, breach notification timelines, audit rights, security testing requirements, vulnerability disclosure obligations, and requirements for providing SBOMs. Security requirements in contracts are enforceable; verbal assurances are not.",insight:"Contract security requirements are the primary enforcement mechanism for vendor security. The exam tests that verbal assurances from vendors are not adequate — enforceable contractual obligations with defined timelines and audit rights are required."},
            {name:"Vendor security assessment",explain:"Vendors should be assessed for security maturity before contract award and periodically during the relationship. Assessments may include questionnaires (SOC 2, ISO 27001 certification), penetration test results, vulnerability management practices, and incident response capability.",insight:"Vendor security assessment is a procurement and ongoing management activity. The exam tests that vendor security is assessed before adoption — not just when an incident occurs. Periodic reassessment ensures ongoing assurance."},
            {name:"Breach notification requirements",explain:"Contracts must specify the vendor's obligations to notify the organisation of security incidents affecting the organisation's data or software. Notification timelines must be specified — typically 24-72 hours for critical incidents. Vague 'prompt notification' language is insufficient.",insight:"Breach notification timelines must be specific. The exam tests that 'prompt notification' is not a sufficient contractual requirement — specific timeframes must be defined. Under GDPR, you have 72 hours to notify regulators; your vendor notification obligation must be shorter than this."},
          ]},
          {label:"Vendor access management", chips:[
            {name:"Third-party access controls",explain:"Vendors and contractors accessing development systems, source code, or production environments require the same access controls as employees — least privilege, MFA, just-in-time access, session monitoring, and access reviews. Privileged vendor access must be managed through PAM solutions.",insight:"Vendor access is a significant insider threat risk. The exam tests that vendors with access to source code or production environments require the same access controls as privileged employees. Unmonitored vendor access to production systems is a high-risk configuration."},
            {name:"Offboarding vendors",explain:"When a vendor relationship ends, all access must be revoked — accounts disabled, API keys rotated, SSH keys removed, credentials changed for any shared systems. Vendor access that persists after relationship termination is a significant security risk.",insight:"Vendor offboarding is as important as employee offboarding. The exam tests that vendor access revocation must be complete — all access methods, not just the primary account. Forgotten API keys and SSH keys from former vendors are a persistent access risk."},
          ]},
        ]
      },
      {
        label:"Build integrity and signing", color:"#371650",
        groups:[
          {label:"Build pipeline security", chips:[
            {name:"Secure build environment",explain:"Build environments must be hardened and isolated — separate from development environments, with minimal tools installed, access restricted to build processes, and monitored for unexpected behaviour. A compromised build environment can insert malicious code into any software it builds.",insight:"Build environment compromise is the highest-impact supply chain attack vector. The exam tests that build environments require the same security attention as production environments — they have production-equivalent impact through the software they produce."},
            {name:"Reproducible builds",explain:"Reproducible builds produce bit-for-bit identical output from identical inputs, allowing verification that a binary was produced from the published source code. Reproducible builds enable independent verification and detect tampering in the build process.",insight:"Reproducible builds enable verification. The exam tests reproducible builds as a supply chain integrity control — if the binary does not match what a reproducible build from the same source produces, it has been tampered with. This detects attacks that insert malicious code after the build."},
            {name:"Code signing",explain:"Code signing uses the organisation's private key to cryptographically sign build artefacts. Recipients verify the signature using the corresponding public key to confirm the artefact was produced by the organisation and has not been modified. Unsigned or invalidly signed artefacts should be rejected.",insight:"Code signing provides integrity and authenticity assurance for build artefacts. The exam tests code signing as the mechanism that ensures the software deployed is the software that was built. The security of code signing depends on the security of the signing key."},
          ]},
          {label:"Artefact management", chips:[
            {name:"Artefact repository security",explain:"Artefact repositories (Nexus, JFrog, container registries) must be secured — access controls that prevent unauthorised upload, integrity verification of stored artefacts, scanning of stored artefacts for vulnerabilities, and audit logging of all access and changes.",insight:"Artefact repositories are a supply chain attack target. An attacker who can upload to your internal repository can inject malicious components that appear to be internal packages. Repository access controls and upload signing prevent this attack."},
            {name:"Container image security",explain:"Container images in registries must be scanned for vulnerabilities before deployment. Images should be signed using container signing tools (Cosign, Notary). Only signed images from approved registries should be deployable to production. Unsigned images should be rejected by admission controllers.",insight:"Container image security requires both scanning (vulnerability management) and signing (integrity verification). The exam tests both — an image without known vulnerabilities but without a valid signature may have been tampered with. Both controls are required."},
          ]},
        ]
      },
      {
        label:"Supply chain attacks and defences", color:"#5C2A6B",
        groups:[
          {label:"Attack patterns", chips:[
            {name:"SolarWinds-style attacks",explain:"Supply chain attacks through trusted software updates — exemplified by the SolarWinds Orion compromise — insert malicious code into legitimate software updates. The attack exploits the trust organisations place in vendor updates. Defence requires verification of update integrity, anomaly detection in software behaviour, and zero trust network segmentation.",insight:"SolarWinds demonstrated that vendor software updates are a high-trust attack vector. The exam tests that vendor update trust must be supplemented by technical controls — integrity verification, anomaly detection for unusual software behaviour, and network segmentation that limits blast radius."},
            {name:"Typosquatting",explain:"Typosquatting publishes malicious packages to public repositories with names that closely resemble legitimate packages — 'requets' instead of 'requests', 'nmap-python' instead of 'python-nmap'. Developers accidentally install the malicious package when they mistype the package name.",insight:"Typosquatting exploits developer error and inattention. Prevention requires exact package name verification, using private repositories with allowlisted packages, and SCA tools that detect unexpected new packages. The exam tests typosquatting as a concrete package repository attack."},
            {name:"Compromised developer accounts",explain:"Developer accounts with access to source code repositories or package publishing are high-value targets. A compromised developer account can push malicious code or publish a compromised package version. MFA, access reviews, and code review requirements reduce the impact of a compromised developer account.",insight:"Developer account compromise is a supply chain attack vector. The exam tests that developer accounts require the same security controls as privileged accounts — MFA, monitoring, and review requirements. A developer who can push directly to main without review is a single point of supply chain compromise."},
          ]},
          {label:"Supply chain defences", chips:[
            {name:"Trusted supplier programme",explain:"A trusted supplier programme defines criteria for approving software suppliers — security assessment requirements, SCA and SBOM requirements, security testing evidence, breach notification obligations, and regular reassessment. Only suppliers meeting the criteria are approved for use.",insight:"Trusted supplier programmes create a governance framework for supply chain risk. The exam tests that ad hoc vendor selection without security criteria is insufficient. A defined programme with measurable criteria creates consistent, auditable supply chain risk management."},
            {name:"Zero trust for supply chain",explain:"Zero trust principles applied to supply chain mean that supplier software is not automatically trusted because it comes from an approved vendor — it is verified on receipt (signature verification, vulnerability scanning) and at deployment (admission controls). Trust is earned through verification, not assumed through relationship.",insight:"Zero trust for supply chain is an evolving but important concept. The exam tests that verification supplements trust — even software from a trusted vendor should be verified on receipt. The SolarWinds attack exploited the assumption that trusted vendor software was safe without verification."},
            {name:"SLSA framework",explain:"Supply chain Levels for Software Artefacts (SLSA) is a framework for assessing and improving software supply chain security. It defines four levels of increasingly rigorous requirements for build integrity, source integrity, and provenance. SLSA provides a maturity model for supply chain security.",insight:"SLSA is an emerging standard that the CSSLP exam may reference. The key concept is provenance — knowing where software came from, how it was built, and by whom. Higher SLSA levels provide stronger guarantees about the integrity of the software supply chain."},
          ]},
        ]
      },
    ],
    traps:["SBOM enables rapid impact assessment — it is not optional under emerging regulations","SCA must be continuous in CI/CD — periodic scans miss new CVEs between scans","Licence compliance is a legal risk, not just a security risk — check before adoption","Vendor breach notification timelines must be specific in contracts — 'prompt' is not adequate","Dependency confusion exploits package manager precedence — configure private scope correctly","Reproducible builds detect post-build tampering — not all supply chain attacks occur at build time"],
    connects:["Inventory components","Assess vendors","Secure the build","Sign artefacts","Monitor dependencies","Respond to supply chain incidents"]
  },
];

let currentDomain = 1;
let showFaq = false;
let activeChip = null;

function init(){
  renderNav();
  renderMain();
}

function renderNav(){
  const nav = document.getElementById('domainNav');
  nav.innerHTML = DOMAINS.map(d => {
    const active = !showFaq && d.id===currentDomain;
    return `
    <div class="dnav-item ${active?'active':''}"
         onclick="selectDomain(${d.id})"
         style="${active?'background:'+d.color+';border-bottom-color:'+d.color:'border-bottom-color:'+d.color+'40'}">
      <span class="dnav-num">Domain ${d.id}</span>
      <span class="dnav-name">${d.short}</span>
    </div>
  `}).join('');
}

function selectDomain(id){
  currentDomain = id;
  showFaq = false;
  activeChip = null;
  document.getElementById('faqBtn').classList.remove('active');
  renderNav();
  renderMain();
}

function toggleFaq(){
  showFaq = !showFaq;
  activeChip = null;
  document.getElementById('faqBtn').classList.toggle('active', showFaq);
  renderNav();
  renderMain();
}

function renderMain(){
  const mc = document.getElementById('mainContent');
  if(showFaq){
    mc.innerHTML = renderFaqView();
    return;
  }
  const d = DOMAINS.find(x=>x.id===currentDomain);
  mc.innerHTML = renderDomainView(d);
}

function renderDomainView(d){
  const fiveCluster = d.clusters.length === 5;
  return `
    <div class="domain-hdr">
      <div class="domain-hdr-left">
        <div class="domain-num">Domain ${d.id} of 8</div>
        <div class="domain-name">${d.name}</div>
        <div class="domain-hook">${d.hook}</div>
      </div>
      <div class="domain-pct-block">
        <div class="domain-pct" style="color:${d.color}">${d.pct}</div>
        <div class="domain-pct-label">exam weight</div>
        <div class="domain-pct-q" style="color:${d.color}">${d.qs} questions</div>
      </div>
    </div>
    <div class="clusters-grid ${fiveCluster?'five':''}">
      ${d.clusters.map(cl => `
        <div class="cluster">
          <div class="cluster-hdr" style="background:${cl.color}">${cl.label}</div>
          <div class="cluster-body">
            ${cl.groups.map(g => `
              <div class="sg">
                <div class="sg-label">${g.label}</div>
                <div class="vchips">
                  ${g.chips.map(c => `
                    <div class="vchip ${activeChip && activeChip.name===c.name?'active':''}"
                         onclick="selectChip(${d.id},'${c.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}','${cl.label.replace(/'/g,"\\'").replace(/"/g,'&quot;')}','${g.label.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
                      ${c.name}
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    ${activeChip ? renderDrawer(d) : ''}
    <div class="traps-section">
      <div class="traps-label"><span class="traps-dot"></span>Exam traps — what retakers get wrong</div>
      <div class="traps-chips">
        ${d.traps.map(t=>`<span class="trap-chip">${t}</span>`).join('')}
      </div>
    </div>
    <div class="connects-section">
      <div class="connects-label">How it all connects</div>
      <div class="connects-flow">
        ${d.connects.map((c,i)=>`
          <span class="flow-chip">${c}</span>
          ${i<d.connects.length-1?'<span class="flow-arr">→</span>':''}
        `).join('')}
      </div>
    </div>
  `;
}

function renderDrawer(d){
  const chip = activeChip;
  const allChips = d.clusters.flatMap(cl=>cl.groups.flatMap(g=>g.chips));
  const chipData = allChips.find(c=>c.name===chip.name);
  if(!chipData) return '';
  return `
    <div class="explanation-drawer open">
      <div class="ed-inner">
        <button class="ed-close" onclick="closeDrawer()">✕ close</button>
        <div class="ed-breadcrumb">${chip.cluster} · ${chip.group}</div>
        <div class="ed-title">${chipData.name}</div>
        <div class="ed-text">${chipData.explain}</div>
        <div class="ed-insight">
          <div class="ed-insight-label">Exam insight</div>
          <div class="ed-insight-text">${chipData.insight}</div>
        </div>
      </div>
    </div>
  `;
}

function selectChip(domainId, chipName, clusterLabel, groupLabel){
  const decodedName = chipName.replace(/&quot;/g,'"');
  const decodedCluster = clusterLabel.replace(/&quot;/g,'"');
  const decodedGroup = groupLabel.replace(/&quot;/g,'"');
  if(activeChip && activeChip.name===decodedName){
    activeChip = null;
  } else {
    activeChip = {name:decodedName, cluster:decodedCluster, group:decodedGroup};
  }
  renderMain();
  if(activeChip){
    setTimeout(()=>{
      const drawer = document.querySelector('.explanation-drawer');
      if(drawer) drawer.scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  }
}

function closeDrawer(){
  activeChip = null;
  renderMain();
}

function renderFaqView(){
  return `
    <div class="faq-view active">
      <p class="faq-intro">Common questions about the CSSLP exam — answered practically, not generically. These answers target the search terms CSSLP candidates are actually using.</p>
      ${FAQS.map((f,i)=>`
        <div class="faq-item">
          <div class="faq-q" id="fq${i}" onclick="toggleFaqItem(${i})">
            ${f.q}
            <span class="faq-chevron">▾</span>
          </div>
          <div class="faq-a" id="fa${i}">
            ${f.a}
            <div class="faq-seo-note">${f.note}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function toggleFaqItem(i){
  const q = document.getElementById('fq'+i);
  const a = document.getElementById('fa'+i);
  q.classList.toggle('open');
  a.classList.toggle('open');
}

init();
</script>
