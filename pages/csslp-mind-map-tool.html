  {
    id:4, color:"#6B3A2A", pct:"14%", qs:"~18",
    name:"Secure Software Implementation", short:"Implementation",
    hook:"Code is where intent meets reality — and where most vulnerabilities are actually introduced.",
    clusters:[
      {
        label:"Secure coding standards", color:"#6B3A2A",
        groups:[
          {label:"Standards and guidelines", chips:[
            {name:"CERT Secure Coding",explain:"The CERT Secure Coding Standards provide language-specific rules for C, C++, Java, and other languages. Rules address memory management, input validation, integer arithmetic, file I/O, and error handling. Each rule has a severity rating and examples of compliant and non-compliant code.",insight:"CERT rules are language-specific. The exam may test whether you know which CERT rules apply to a given scenario. The key categories — memory management in C/C++, integer overflow, input validation — appear most frequently."},
            {name:"OWASP Secure Coding Practices",explain:"OWASP provides a quick-reference guide to secure coding practices covering input validation, output encoding, authentication, session management, access control, cryptographic practices, error handling, logging, data protection, and communication security.",insight:"OWASP Secure Coding Practices is directly referenced in the CSSLP curriculum. Know the categories — the exam may present a coding scenario and ask which practice category applies or which practice was violated."},
            {name:"Code review process",explain:"Secure code review systematically examines source code for security vulnerabilities. It should be a mandatory gate before merging to main branches and before deployment. Reviews should cover the OWASP Top 10, common CWEs, and business logic issues that automated tools cannot find.",insight:"Code review is a human control that finds what automated tools miss — particularly business logic vulnerabilities. The exam tests code review as a mandatory gate, not an optional best practice. Code that has not been reviewed should not be deployable."},
            {name:"Secure coding training",explain:"Developers must receive secure coding training specific to the languages and frameworks they use. Training should cover the most common vulnerability patterns for those technologies, secure coding standards, and how to use security testing tools. Training must be ongoing, not a one-time induction.",insight:"Developer training is an administrative control that prevents vulnerabilities from being introduced. The exam treats training as a prerequisite for a secure development programme — without trained developers, technical controls alone are insufficient."},
          ]},
          {label:"Memory safety", chips:[
            {name:"Buffer overflow",explain:"Buffer overflow occurs when a program writes data beyond the allocated buffer boundary, overwriting adjacent memory. It can corrupt data, crash the application, or allow arbitrary code execution. Prevention requires bounds checking on all array and buffer operations and use of safe string handling functions.",insight:"Buffer overflow is a foundational vulnerability that remains relevant despite being decades old. The exam tests prevention: bounds checking, safe string functions (strncpy not strcpy), stack canaries, ASLR, and DEP/NX. Memory-safe languages (Rust, Go) eliminate this class of vulnerability."},
            {name:"Integer overflow",explain:"Integer overflow occurs when arithmetic produces a value outside the range of the data type, wrapping around to an unexpected value. In security contexts, this can cause allocations to be smaller than expected (leading to buffer overflows) or bypass security checks that compare integers.",insight:"Integer overflow is particularly dangerous in C and C++ when the result is used to calculate allocation sizes. The exam tests whether you know to validate arithmetic results before use, particularly before using the result in memory allocation."},
            {name:"Use after free",explain:"Use-after-free vulnerabilities occur when a program continues to use a pointer after the memory it references has been freed. This can allow an attacker to control the freed memory and influence program behaviour. It is a common vulnerability in C and C++ programs.",insight:"Use-after-free is a memory management vulnerability that leads to code execution. Prevention involves setting pointers to NULL after freeing, using smart pointers in C++, or using memory-safe languages. The exam tests whether you know this vulnerability class and its mitigations."},
          ]},
        ]
      },
      {
        label:"Injection and input vulnerabilities", color:"#8a4a35",
        groups:[
          {label:"Injection attacks", chips:[
            {name:"SQL injection",explain:"SQL injection occurs when user input is incorporated into database queries without parameterisation. The attacker manipulates the query structure to read unauthorised data, modify records, or execute database commands. Prevention is parameterised queries (prepared statements) — not input sanitisation.",insight:"Parameterised queries are the definitive SQL injection prevention. The exam distinguishes parameterised queries (which completely prevent SQL injection) from input sanitisation (which can be bypassed). The correct answer is always parameterised queries, not sanitisation."},
            {name:"Command injection",explain:"Command injection occurs when user input is passed to a system shell command. The attacker can terminate the intended command and append their own shell commands, executed with the application's privileges. Prevention requires avoiding shell commands entirely — use library functions instead.",insight:"The safest prevention for command injection is to avoid executing shell commands with user input entirely. If shell execution is unavoidable, use parameterised APIs that do not invoke a shell interpreter. The exam tests whether you choose the safest approach (avoid) over mitigation (sanitise)."},
            {name:"LDAP injection",explain:"LDAP injection occurs when user input is included in LDAP queries without escaping. Attackers can modify query logic to bypass authentication or extract directory information. Prevention requires proper escaping of all user-supplied values before inclusion in LDAP queries.",insight:"LDAP injection is less commonly tested than SQL injection but appears in CSSLP exam questions on injection vulnerabilities. The prevention principle is the same — parameterise or escape all user input before including it in queries."},
            {name:"XML/XPath injection",explain:"XML injection occurs when user input is embedded in XML documents, allowing an attacker to modify the XML structure. XPath injection is analogous to SQL injection but for XPath queries. Prevention requires input validation and encoding before embedding in XML, and parameterised XPath queries.",insight:"XML and XPath injection are injection variants specific to XML-based systems and web services. The exam tests whether you understand that injection is a class of vulnerability that applies to any system where input is incorporated into a query or command."},
          ]},
          {label:"Cross-site vulnerabilities", chips:[
            {name:"Reflected XSS",explain:"Reflected cross-site scripting occurs when user input is immediately returned in the HTTP response without encoding, causing the browser to execute attacker-controlled script. Prevention requires output encoding — converting special characters to their HTML entity equivalents before rendering.",insight:"Reflected XSS prevention is output encoding, not input validation. Input validation reduces the attack surface but encoding is the control that prevents execution. The exam distinguishes: validate to reduce surface area, encode to prevent execution."},
            {name:"Stored XSS",explain:"Stored XSS occurs when malicious script is persisted in the application (in a database, comment field, or profile) and then rendered to other users without encoding. It is more dangerous than reflected XSS because one attacker can target all subsequent visitors.",insight:"Stored XSS is more impactful than reflected XSS because it persists and affects multiple users. Prevention requires encoding output at render time, not just at input time. Content Security Policy (CSP) provides defence in depth by restricting script execution origins."},
            {name:"CSRF",explain:"Cross-site request forgery tricks an authenticated user's browser into making an unauthorised request using their active session. Prevention requires CSRF tokens — unpredictable, session-tied values included in forms and validated server-side. The SameSite cookie attribute provides additional protection.",insight:"CSRF exploits the trust the application has in the user's browser. CSRF tokens are the primary mitigation — the attacker cannot read the token from another origin. The SameSite=Strict cookie attribute prevents cookies from being sent in cross-site requests entirely."},
          ]},
        ]
      },
      {
        label:"Authentication and session implementation", color:"#4a2518",
        groups:[
          {label:"Authentication implementation", chips:[
            {name:"Password storage",explain:"Passwords must never be stored in plaintext or with reversible encryption. They must be hashed using adaptive, salted algorithms — bcrypt, Argon2, or PBKDF2 with high iteration counts. The salt must be unique per password. The hash must be long enough to resist brute force.",insight:"Password storage is a fundamental requirement. The exam tests that you know adaptive hashing algorithms (bcrypt, Argon2) are required — not SHA-256, MD5, or any general-purpose hash. Adaptive means the work factor can be increased as hardware improves."},
            {name:"MFA implementation",explain:"Multi-factor authentication implementation must use time-based one-time passwords (TOTP) or hardware tokens rather than SMS OTP, which is vulnerable to SIM swapping. FIDO2/WebAuthn provides the strongest form of MFA — phishing-resistant because authentication is bound to the relying party origin.",insight:"MFA implementation choices have security implications. FIDO2/WebAuthn is phishing-resistant; TOTP is not (can be phished in real-time); SMS OTP is the weakest (vulnerable to SIM swap). The exam tests which implementation is most secure."},
            {name:"Account lockout",explain:"Account lockout or progressive delay must be implemented to prevent brute force attacks. Lockout must occur after a defined number of failures (typically 5-10), must apply to the account not the IP (to prevent enumeration bypass), and must have a lockout notification mechanism.",insight:"Account lockout must be on the account, not just the IP address. An attacker using multiple IPs can bypass IP-based lockout. Account-based lockout is effective but introduces a denial-of-service risk — lockout with notification is preferable to indefinite lockout."},
            {name:"Credential management",explain:"Credentials must never be hardcoded in source code, stored in version control, logged in cleartext, or transmitted without encryption. They must be stored in dedicated secrets management systems and retrieved at runtime. Rotation procedures must be defined and testable.",insight:"Hardcoded credentials in source code are a common and severe vulnerability. The exam tests that credentials must be externalised to secrets management systems. Once committed to a repository — even if removed — credentials must be considered compromised and rotated."},
          ]},
          {label:"Session management", chips:[
            {name:"Session token generation",explain:"Session tokens must be cryptographically random, generated with a cryptographically secure pseudorandom number generator (CSPRNG), and of sufficient length (minimum 128 bits of entropy). Predictable session tokens enable session prediction attacks.",insight:"Session token strength is about entropy. A token generated with Math.random() in JavaScript is not cryptographically secure. The exam tests that session tokens require CSPRNG generation and sufficient entropy — 128 bits minimum."},
            {name:"Session fixation prevention",explain:"Session fixation occurs when an attacker sets a known session ID before authentication, then the application elevates that session after login. Prevention requires regenerating the session ID after successful authentication — the post-login session ID must differ from the pre-login session ID.",insight:"Session regeneration on login is a mandatory control. The exam tests whether you know that the session ID must change at authentication — not just that a new session is created, but that the old session ID is invalidated and a new one issued."},
            {name:"Cookie security attributes",explain:"Session cookies must have the Secure attribute (HTTPS only), HttpOnly (not accessible to JavaScript), SameSite (controls cross-site sending), and appropriate domain and path scoping. Each attribute prevents a specific attack class.",insight:"Cookie attributes are a set of independent controls, each preventing a different attack. Secure prevents transmission over HTTP. HttpOnly prevents XSS-based theft. SameSite prevents CSRF. The exam tests which attribute prevents which attack."},
          ]},
        ]
      },
      {
        label:"Error handling and logging", color:"#6B3A2A",
        groups:[
          {label:"Secure error handling", chips:[
            {name:"Generic error messages",explain:"Error messages shown to users must never reveal technical details — stack traces, database queries, server paths, software versions, or internal identifiers. Generic error messages (e.g. 'An error occurred. Reference: ERR-2024-001') provide enough for support without assisting attackers.",insight:"Error messages are an information disclosure vulnerability. The exam tests that external error messages must be generic while detailed errors are logged internally. The reference code approach allows internal tracking without external exposure."},
            {name:"Exception handling",explain:"All exceptions must be caught and handled explicitly. Unhandled exceptions can leak information through default error pages, may cause undefined behaviour, and in some cases allow security bypasses. Security-sensitive code must have explicit exception handling that fails securely.",insight:"Catch-all exception handlers that swallow errors silently are as dangerous as unhandled exceptions — they prevent detection of security-relevant events. Exceptions must be logged internally even if the user sees a generic message."},
            {name:"Error logging",explain:"Security-relevant errors — authentication failures, authorisation denials, input validation failures, and system errors — must be logged with sufficient context for investigation: timestamp, user identity (if available), IP address, action attempted, and outcome. Logs must be stored securely.",insight:"Error logging must be designed explicitly. The exam tests whether logging captures sufficient context for investigation. Authentication failure logs without IP addresses cannot support brute force detection. The right fields must be designed into the logging system."},
          ]},
          {label:"Security logging", chips:[
            {name:"What to log",explain:"Security events requiring logging include: authentication events (success and failure), authorisation failures, session management events, data access and modification of sensitive data, administrative actions, and input validation failures. The goal is sufficient information to reconstruct any security-relevant event.",insight:"Completeness of logging is a design decision. The exam may present a scenario where an incident cannot be investigated due to insufficient logging — the correct lesson is that logging requirements must define the minimum events and fields required."},
            {name:"Log protection",explain:"Logs must be protected from modification and deletion, particularly by the application itself. Logs should be written to a separate, access-controlled system. Write-only log forwarding to a SIEM ensures that even if the application is compromised, the attacker cannot modify or delete logs.",insight:"Log integrity is essential for non-repudiation and forensic investigation. The exam tests that logs stored on the compromised system cannot be trusted. Log forwarding to a separate system (SIEM) at write time is the control."},
            {name:"Sensitive data in logs",explain:"Logs must never contain sensitive data — passwords, credit card numbers, social security numbers, session tokens, or API keys. If such data appears in a parameter that is logged, the logging must be designed to mask or exclude it. Log injection (attacker-controlled data in logs) must also be prevented.",insight:"Sensitive data in logs is a compliance and security violation. The exam tests that logging design must explicitly exclude sensitive fields. A log that records the full request body for debugging purposes is likely logging sensitive data inadvertently."},
          ]},
        ]
      },
      {
        label:"API and integration security", color:"#8a4a35",
        groups:[
          {label:"API security implementation", chips:[
            {name:"Input validation for APIs",explain:"APIs must validate all input independently of any validation performed by the calling client. API input validation covers type, format, length, range, and permitted values for all parameters. APIs that trust client-side validation are vulnerable to attacks that bypass the client entirely.",insight:"API input validation is independent of client-side validation. An API that relies on the UI to validate input is vulnerable to direct API calls. Every API endpoint must validate its own inputs as if the caller is untrusted — because it may be."},
            {name:"Output filtering",explain:"APIs must return only the minimum data necessary for the caller's authorised use. Returning complete database records when the caller only needs two fields is excessive data exposure (OWASP API Top 10 #3). Output filtering removes fields the caller is not authorised to see.",insight:"Excessive data exposure in APIs is a common vulnerability. The exam tests whether API responses are filtered to return only what the caller is authorised to receive. A single 'get user' API that returns all user data including sensitive fields to any authenticated caller is vulnerable."},
            {name:"Rate limiting",explain:"APIs without rate limiting are vulnerable to brute force attacks on authentication, credential stuffing, data scraping, and resource exhaustion. Rate limiting must be implemented per user, per IP, and per API key, at the API gateway level rather than individual service level.",insight:"Rate limiting at the application code level fails when the service scales horizontally. Rate limiting must be implemented at a centralised point — API gateway or load balancer — to be effective across all instances. The exam tests implementation location, not just the concept."},
            {name:"API versioning security",explain:"API versions must maintain security controls across versions. Deprecated API versions often have weaker security controls than current versions. Access to deprecated API versions should be controlled and eventually removed. Security requirements must apply consistently across all active versions.",insight:"Legacy API versions are a common attack vector. Attackers deliberately target older API versions that may lack newer security controls. The exam tests whether version management includes security review — deprecated versions should be removed or hardened before attackers exploit them."},
          ]},
          {label:"Third-party integration", chips:[
            {name:"Library security",explain:"Third-party libraries must be validated before use — known vulnerabilities checked in CVE databases and NVD, licence compliance verified, and maintenance status assessed. Libraries that are no longer maintained accumulate security vulnerabilities with no patches available.",insight:"Third-party library validation is a supply chain control. The exam tests whether you validate libraries before use — not just check for known vulnerabilities but also assess maintenance status. An unmaintained library will not receive security patches for future discoveries."},
            {name:"Dependency pinning",explain:"Dependency versions should be pinned in package management files to prevent unexpected updates that could introduce vulnerabilities or breaking changes. Floating dependencies (e.g. 'latest') can introduce compromised versions silently. Pinned versions provide a known, auditable baseline.",insight:"Dependency pinning is a supply chain integrity control. The exam tests whether you understand the risk of floating dependencies — an attacker who compromises a package repository can push a malicious 'latest' version to all consumers. Pinned, hashed dependencies prevent this."},
          ]},
        ]
      },
    ],
    traps:["Parameterised queries prevent SQL injection — sanitisation does not","Output encoding prevents XSS — input validation alone is not sufficient","CSRF tokens must be unpredictable and server-validated — client-side checks are useless","bcrypt/Argon2 for passwords — SHA-256 is too fast","Session ID must regenerate after login — session fixation exploits failure to do this","Hardcoded credentials in source code are compromised even after removal — rotate immediately"],
    connects:["Validate input","Encode output","Parameterise queries","Hash passwords correctly","Secure sessions","Log security events"]
  },
  {
    id:5, color:"#4A5E2A", pct:"14%", qs:"~18",
    name:"Secure Software Testing", short:"Testing",
    hook:"You can't ship what you haven't broken. Security testing finds what developers missed.",
    clusters:[
      {
        label:"Static and dynamic analysis", color:"#4A5E2A",
        groups:[
          {label:"Static analysis", chips:[
            {name:"SAST overview",explain:"Static Application Security Testing analyses source code, bytecode, or compiled binaries without executing the application. It finds vulnerabilities by scanning code patterns — hardcoded credentials, SQL concatenation, buffer allocation without bounds checking, insecure API usage. SAST integrates into development pipelines for immediate feedback.",insight:"SAST finds code-level vulnerabilities without running the application. It is best integrated into the development IDE and CI/CD pipeline for early detection. The exam tests that SAST cannot find runtime vulnerabilities — it only sees what is in the code, not how the application behaves."},
            {name:"SAST limitations",explain:"SAST has a high false positive rate — it flags code patterns that may not be exploitable in context. It cannot find vulnerabilities that depend on runtime state, environment configuration, or external system interaction. Business logic vulnerabilities that are syntactically correct are invisible to SAST.",insight:"SAST false positives require analyst triage. The exam tests that SAST findings must be reviewed — not all SAST findings are real vulnerabilities. Automated SAST integrated into CI/CD should fail the build on high-severity findings and flag others for review."},
            {name:"Manual code review",explain:"Manual code review by security-trained reviewers finds vulnerabilities that automated tools miss — particularly business logic flaws, complex authorisation issues, and subtle cryptographic misuse. Manual review is more expensive but provides higher-confidence findings for complex security-critical code.",insight:"Manual code review complements SAST. The exam tests that some vulnerability classes — business logic, complex authorisation flows, subtle crypto misuse — require human review. SAST and manual review together provide more comprehensive coverage than either alone."},
          ]},
          {label:"Dynamic analysis", chips:[
            {name:"DAST overview",explain:"Dynamic Application Security Testing tests a running application by sending crafted inputs and analysing responses. It finds vulnerabilities that only manifest at runtime — injection flaws in context, authentication issues, session management weaknesses, and server-side processing errors.",insight:"DAST requires a running application. It finds what SAST misses — runtime vulnerabilities that depend on application state and behaviour. DAST does not require source code access, making it applicable to third-party applications and black-box testing scenarios."},
            {name:"IAST",explain:"Interactive Application Security Testing instruments the application with runtime sensors that monitor execution during testing. It combines the accuracy of SAST (seeing code execution paths) with the realism of DAST (actual runtime behaviour). It significantly reduces SAST false positives by only flagging code that is actually executed in a potentially vulnerable way.",insight:"IAST provides the most accurate results by seeing both code and runtime simultaneously. The exam tests that IAST requires instrumentation — it cannot be used on applications you cannot instrument. It is most effective during functional testing when the application is being exercised normally."},
            {name:"RASP",explain:"Runtime Application Self-Protection embeds security controls within the application itself, allowing it to detect and block attacks in real-time during production execution. RASP monitors application behaviour from the inside and can terminate sessions or block requests that exhibit attack patterns.",insight:"RASP is a production control, not a testing tool — it protects running applications, not pre-release code. The exam distinguishes RASP from IAST: IAST is used during testing to find vulnerabilities; RASP is deployed in production to block exploitation."},
          ]},
        ]
      },
      {
        label:"Test planning and methodology", color:"#3a4a20",
        groups:[
          {label:"Security test planning", chips:[
            {name:"Security test plan",explain:"A security test plan defines the scope, objectives, methodology, tools, and acceptance criteria for security testing. It maps test cases to security requirements and threat model findings, ensuring complete coverage. It is a prerequisite for meaningful security testing, not an optional formality.",insight:"Security test plans ensure requirements traceability — every security requirement should have at least one test case. The exam tests whether security testing is requirements-driven rather than ad hoc. A test plan without requirements traceability leaves coverage gaps."},
            {name:"Threat model-driven testing",explain:"Security test cases should be derived from the threat model — for each identified threat, there should be at least one test case that attempts to exploit it. Threat model-driven testing ensures that testing covers the specific risks identified for the system rather than generic vulnerability categories.",insight:"Threat model-driven testing is more targeted than generic security testing. The exam tests whether test cases trace back to threat model findings. If a threat is identified in the threat model but has no corresponding test case, the test coverage is incomplete."},
            {name:"Risk-based test prioritisation",explain:"Security testing resources must be prioritised based on risk — critical assets and high-risk functions get more rigorous testing than low-risk components. Risk-based prioritisation ensures testing effort is focused where compromise would have the greatest impact.",insight:"Risk-based testing prioritisation is a resource management principle. The exam may present a scenario with limited testing budget — the correct approach is to prioritise testing of high-risk, high-impact components rather than testing everything equally."},
            {name:"Regression testing",explain:"Security regression testing verifies that previously fixed vulnerabilities have not been reintroduced. Vulnerabilities that have been fixed should have automated test cases that run on every build to prevent regression. Security debt from unfixed vulnerabilities must be tracked.",insight:"Security regression tests are automated tests for previously discovered vulnerabilities. The exam tests that fixing a vulnerability is not sufficient — a regression test must be created to prevent recurrence. Without regression tests, the same vulnerability can be reintroduced with every refactor."},
          ]},
          {label:"Test environment controls", chips:[
            {name:"Test data management",explain:"Test environments must not use real production data — particularly personal data, financial data, or health data. Synthetic data that reflects the structure and format of production data must be created. If production data is used, it must be anonymised or masked before use in testing.",insight:"Using real personal data in test environments is a GDPR violation and a security risk. The exam tests that test data management is a security requirement — production PII in development or test environments is an immediate compliance issue."},
            {name:"Environment parity",explain:"Security testing is only valid if the test environment accurately reflects the production environment — same operating system, same versions, same configuration. Differences between test and production environments mean that findings may not reflect production reality.",insight:"Environment parity ensures test findings are relevant to production. The exam tests that security testing in a significantly different environment provides limited assurance. Infrastructure-as-code helps maintain environment parity by using the same configuration for all environments."},
          ]},
        ]
      },
      {
        label:"Penetration testing", color:"#2a3818",
        groups:[
          {label:"Pen test types", chips:[
            {name:"Black box testing",explain:"Black box testing simulates an external attacker with no prior knowledge of the target. The tester conducts reconnaissance, identifies attack surfaces, and attempts exploitation using only publicly available information and discovered vulnerabilities. It most accurately simulates an external threat actor.",insight:"Black box testing is the most realistic simulation of an external attack. It tests what an uninformed attacker can discover and exploit. The exam tests that black box testing may miss internal vulnerabilities that require authenticated access or prior knowledge."},
            {name:"White box testing",explain:"White box testing provides the tester with full knowledge — source code, architecture documentation, credentials. It enables deeper, more thorough testing and finds more vulnerabilities per hour than black box. It is appropriate when the goal is maximum vulnerability discovery rather than realistic simulation.",insight:"White box testing is most efficient for finding vulnerabilities. Given equal time, white box testing finds more issues than black box. The exam may ask when each is appropriate — white box for comprehensive security review; black box for realistic external attacker simulation."},
            {name:"Grey box testing",explain:"Grey box testing provides partial knowledge — a user account, network diagrams, or application documentation. It simulates a post-compromise scenario — an attacker who has gained initial access — or an insider threat. It is the most common real-world approach, balancing realism with efficiency.",insight:"Grey box is the most common enterprise approach. It is more realistic than white box (not all knowledge is available to attackers) and more efficient than black box. The exam may present a scenario where a compromised employee account is the starting point — this is grey box territory."},
            {name:"Rules of engagement",explain:"Rules of engagement must be documented and signed before any penetration test begins. They specify scope (which systems), out-of-scope systems, permitted techniques, prohibited techniques, communication protocols, emergency contacts, and what to do if a critical vulnerability is found in production.",insight:"Rules of engagement are legally essential. Testing without written authorisation is potentially criminal. The exam tests that rules of engagement are a prerequisite, not a formality. The document protects both the tester (legal cover) and the organisation (defined scope and emergency procedures)."},
          ]},
          {label:"Application pen testing", chips:[
            {name:"Authentication testing",explain:"Authentication testing examines whether authentication controls can be bypassed, brute-forced, or circumvented. It includes testing for default credentials, brute force protection, MFA bypass, password reset flaws, and authentication bypass via parameter manipulation.",insight:"Authentication testing is a structured examination of all authentication mechanisms. The exam tests whether you understand the range of authentication attacks — not just password guessing, but also password reset abuse, session fixation, and account enumeration."},
            {name:"Authorisation testing",explain:"Authorisation testing verifies that users can only access the functions and data they are authorised for. It tests for IDOR vulnerabilities, privilege escalation paths, horizontal privilege escalation (accessing another user's data), and vertical privilege escalation (gaining admin access from a regular account).",insight:"Authorisation testing is distinct from authentication testing. Authentication tests if you can log in; authorisation tests what you can do after logging in. IDOR is the most common authorisation vulnerability — changing a record ID in a request to access another user's data."},
            {name:"Business logic testing",explain:"Business logic testing examines whether business processes can be abused — skipping required steps, repeating steps that should only occur once, applying discounts incorrectly, or manipulating workflow state. These vulnerabilities are application-specific and cannot be found by automated tools.",insight:"Business logic testing requires understanding the intended workflow and attempting to deviate from it. Automated tools cannot test business logic because they do not understand the intended behaviour. The exam tests that business logic testing requires manual testing by testers who understand the application."},
          ]},
        ]
      },
      {
        label:"Fuzzing and adversarial testing", color:"#4A5E2A",
        groups:[
          {label:"Fuzzing techniques", chips:[
            {name:"Mutation fuzzing",explain:"Mutation fuzzing takes valid inputs and randomly mutates them — flipping bits, adding characters, changing values. It is simple to implement and effective at finding parser vulnerabilities, input handling errors, and memory corruption issues. It requires a corpus of valid inputs to mutate.",insight:"Mutation fuzzing is most effective for testing file format parsers and protocol implementations. The exam tests that fuzzing finds vulnerabilities through volume and randomness — it is complementary to structured testing, not a replacement."},
            {name:"Generation fuzzing",explain:"Generation fuzzing creates inputs from a formal specification of the input format — a grammar or protocol specification. It generates valid-looking but edge-case inputs that exercise all paths through the parser. It is more targeted than mutation fuzzing and better at finding protocol-specific issues.",insight:"Generation fuzzing is more sophisticated than mutation fuzzing. It requires a model of the input format but generates more meaningful edge cases. The exam may distinguish generation and mutation fuzzing — generation is appropriate when a formal specification exists."},
            {name:"Coverage-guided fuzzing",explain:"Coverage-guided fuzzing uses instrumentation to track which code paths are executed by each input. It uses this feedback to generate new inputs that exercise previously untested paths. This approach dramatically increases the probability of finding deep vulnerabilities by maximising code coverage.",insight:"Coverage-guided fuzzing (AFL, libFuzzer) is the most effective modern fuzzing approach. It finds vulnerabilities that pure random mutation misses by systematically exploring code paths. The exam recognises coverage-guided fuzzing as the current state of the art."},
          ]},
          {label:"Red team activities", chips:[
            {name:"Red team vs pen test",explain:"Red team engagements simulate real threat actors using all available techniques — social engineering, physical access, technical exploitation — to achieve specific objectives (exfiltrate data, gain domain admin). They differ from pen tests in duration (weeks to months), realism, and focus on detection capability.",insight:"Red team exercises test the organisation's detection and response capability, not just the presence of vulnerabilities. The exam distinguishes red team (objective-based, full kill chain, tests detection) from pen test (vulnerability-focused, agreed scope, technical only)."},
            {name:"Adversary simulation",explain:"Adversary simulation uses threat intelligence to emulate specific threat actor techniques, tactics, and procedures (TTPs). MITRE ATT&CK provides a framework of adversary techniques that can be used to design simulation scenarios relevant to the organisation's specific threat landscape.",insight:"MITRE ATT&CK-based adversary simulation tests defences against specific, relevant threat actors. The exam may reference ATT&CK in the context of threat-intelligence-driven security testing — testing against the TTPs of adversaries who actually target your sector."},
          ]},
        ]
      },
      {
        label:"Vulnerability management and remediation", color:"#3a4a20",
        groups:[
          {label:"Finding management", chips:[
            {name:"CVSS in context",explain:"The Common Vulnerability Scoring System provides an inherent severity score (0-10) but does not reflect your specific risk. A critical CVSS score on an isolated, non-public system may be lower priority than a medium CVSS score on a public-facing authentication endpoint. Context determines true risk.",insight:"CVSS is a starting point, not a final risk assessment. The exam tests that you apply context to CVSS scores — asset criticality, exploitability in your environment, compensating controls, and exposure all affect priority. High CVSS on a low-value, isolated system is lower priority than medium CVSS on a high-value, exposed system."},
            {name:"False positive triage",explain:"SAST and DAST findings include false positives — reported vulnerabilities that are not actually exploitable in context. False positives must be triaged by security analysts before being assigned to development teams. Sending developers false positives creates alert fatigue and erodes trust in the security programme.",insight:"False positive triage is an analyst function. The exam tests that security teams are responsible for triaging tool findings before presenting them to development. Development teams that receive large numbers of false positives lose confidence in security testing and begin to ignore findings."},
            {name:"Remediation SLAs",explain:"Vulnerability remediation must have defined SLAs — critical vulnerabilities remediated within a specified timeframe (often 24-72 hours for externally exploitable critical), high within two weeks, medium within 30 days. SLAs create accountability and enable tracking.",insight:"Remediation SLAs are a governance control. The exam tests that finding vulnerabilities without a defined remediation timeline is insufficient. SLAs must be agreed between security and development leadership and tracked against actual remediation time."},
            {name:"Risk acceptance",explain:"Vulnerabilities that cannot be immediately remediated must be formally risk-accepted — documented with the risk description, reason for deferral, compensating controls, and sign-off from management at the appropriate level. Unaccepted vulnerabilities in backlog are not risk-managed — they are ignored.",insight:"Risk acceptance is a formal management decision. The exam tests that vulnerabilities not yet remediated must be formally accepted by management — not just left in a backlog. Formal acceptance with compensating controls and a remediation commitment is required."},
          ]},
          {label:"Retesting", chips:[
            {name:"Verification testing",explain:"After a vulnerability is remediated, verification testing confirms that the fix actually works — that the vulnerability cannot still be exploited, that the fix did not introduce a new vulnerability, and that related vulnerabilities were also addressed. Remediation without verification is insufficient.",insight:"Verification testing closes the remediation loop. The exam tests that finding and fixing a vulnerability is not sufficient — the fix must be verified. Verification should be performed by the original tester where possible, using the same techniques that found the original vulnerability."},
            {name:"Regression after fix",explain:"Security fixes must be tested for regression — ensuring that the fix did not break existing functionality and that related code was not inadvertently affected. Security regression tests should be added to the automated test suite to prevent the vulnerability from recurring.",insight:"Security regression tests are the long-term control that prevents reintroduction of fixed vulnerabilities. The exam tests that remediation should include creating an automated regression test, not just fixing the code. Without the test, the same vulnerability can return with any future refactor."},
          ]},
        ]
      },
    ],
    traps:["SAST cannot find runtime vulnerabilities — it only analyses code","RASP is a production runtime control — IAST is a testing tool — they are not interchangeable","DAST requires a running application — it cannot test code that is not deployed","Business logic vulnerabilities require manual testing — automated tools cannot find them","CVSS score is not your risk — context, exposure, and compensating controls all matter","Rules of engagement must be signed before any pen test begins — verbal authorisation is not sufficient"],
    connects:["Plan tests from requirements","Run SAST in pipeline","DAST on running app","Pen test before release","Triage findings","Verify fixes","Automate regression"]
