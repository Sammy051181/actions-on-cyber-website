        <p>{esc(brief.get("summary", ""))}</p>
        <a class="btn btn-secondary" href="{esc(relative_url)}">Read brief</a>
      </article>
""".rstrip()


# -----------------------------
# Index page update
# -----------------------------

def update_daily_brief_index(card_html: str) -> None:
    if not DAILY_BRIEF_INDEX.exists():
        raise FileNotFoundError(f"Could not find {DAILY_BRIEF_INDEX}")

    content = DAILY_BRIEF_INDEX.read_text(encoding="utf-8")

    if BRIEF_SECTION_START not in content or BRIEF_SECTION_END not in content:
        raise RuntimeError(
            f"Could not find markers in {DAILY_BRIEF_INDEX}. "
            f"Add {BRIEF_SECTION_START} and {BRIEF_SECTION_END} around the brief card area."
        )

    before, rest = content.split(BRIEF_SECTION_START, 1)
    existing_cards, after = rest.split(BRIEF_SECTION_END, 1)

    # Avoid duplicate card for the same title/date.
    title_match = re.search(r"<h3>(.*?)</h3>", card_html, flags=re.DOTALL)
    title = title_match.group(1) if title_match else ""

    if title and title in existing_cards:
        print("Brief card already exists on index page. Skipping duplicate insert.")
        return

    updated_cards = f"\n{card_html}\n{existing_cards.strip()}\n"

    updated = before + BRIEF_SECTION_START + updated_cards + BRIEF_SECTION_END + after

    DAILY_BRIEF_INDEX.write_text(updated, encoding="utf-8")


# -----------------------------
# Main
# -----------------------------

def main() -> None:
    today = datetime.datetime.now(datetime.timezone.utc).astimezone().date()

    BRIEF_OUTPUT_DIR.mkdir(parents=True, exist_ok=True)

    source_items = fetch_cisa_kev_items()
    source_context = build_source_context(source_items)

    brief = generate_brief(source_context, today)

    date_slug = today.strftime("%Y-%m-%d")
    title_slug = slugify(brief.get("title", f"daily-int-brief-{date_slug}"))
    filename = f"{date_slug}-{title_slug}.html"

    output_path = BRIEF_OUTPUT_DIR / filename

    page_html = render_brief_page(brief, today)
    output_path.write_text(page_html, encoding="utf-8")

    relative_url = f"daily-int-briefs/{filename}"
    card_html = render_brief_card(brief, today, relative_url)

    update_daily_brief_index(card_html)

    print(f"Generated Daily Int Brief: {output_path}")


if __name__ == "__main__":
    main()
