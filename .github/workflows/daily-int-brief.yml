SITE_NAME = "Actions On Cyber"
BRIEF_SECTION_START = "<!-- DAILY_INT_BRIEF_START -->"
BRIEF_SECTION_END = "<!-- DAILY_INT_BRIEF_END -->"

ROOT_DIR = Path(__file__).resolve().parents[1]

DAILY_BRIEF_INDEX = ROOT_DIR / "pages" / "daily-int-brief.html"
BRIEF_OUTPUT_DIR = ROOT_DIR / "pages" / "daily-int-briefs"

CISA_KEV_URL = "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"

MODEL = "gpt-4.1-mini"


# -----------------------------
# Safety and cleaning helpers
# -----------------------------

def clean_generated_text(text: str) -> str:
    """
    Remove URL-encoded junk, tracking fragments, API/query parameters and
    anything likely to break the page or look unprofessional.
    """
    if not text:
        return ""

    text = unquote(str(text))

    # Remove raw URLs.
    text = re.sub(r"https?://\S+", "", text, flags=re.IGNORECASE)

    # Remove URL query strings and API fragments.
    text = re.sub(r"[?&][a-zA-Z0-9_\-\[\]]+=[^\s,.;)]*", "", text)

    # Remove known junk patterns seen in generated output.
    junk_patterns = [
        r"\bvendor_project(?:\[[^\]]*\])?:[^\s,.;)]*",
        r"\bvendor_project(?:\[[^\]]*\])?=[^\s,.;)]*",
        r"\[[0-9]+\]=[^\s,.;)]*",
        r"%[0-9A-Fa-f]{2}",
        r"\bquery=[^\s,.;)]*",
        r"\bsource=[^\s,.;)]*",
        r"\bref=[^\s,.;)]*",
        r"\butm_[a-zA-Z0-9_]+=[^\s,.;)]*",
    ]

    for pattern in junk_patterns:
        text = re.sub(pattern, "", text, flags=re.IGNORECASE)

    # Remove remaining suspicious long machine strings.
    text = re.sub(r"\b[a-zA-Z0-9_\-]{45,}\b", "", text)

    # Normalise whitespace.
    text = re.sub(r"\s+", " ", text).strip()

    return text


def clean_brief_object(brief: dict) -> dict:
    cleaned = {}

    for key, value in brief.items():
        if isinstance(value, str):
            cleaned[key] = clean_generated_text(value)
        elif isinstance(value, list):
            cleaned[key] = [clean_generated_text(item) for item in value if clean_generated_text(item)]
        else:
            cleaned[key] = value

    return cleaned


def validate_brief(brief: dict) -> None:
    """
    Fail the workflow if the brief still contains machine junk.
    This protects the public website.
    """
    combined = json.dumps(brief, ensure_ascii=False)

    blocked_patterns = [
        "%5B",
        "%5D",
        "%3A",
        "vendor_project",
        "utm_",
        "query=",
        "source=",
        "ref=",
        "http://",
        "https://",
    ]

    found = [pattern for pattern in blocked_patterns if pattern.lower() in combined.lower()]

    if found:
        raise ValueError(f"Generated brief contains blocked fragments: {found}")


# -----------------------------
# Threat intelligence input
# -----------------------------

def fetch_cisa_kev_items(limit: int = 8) -> list[dict]:
    """
    Fetch a small number of recent CISA KEV items.
    If the feed fails, return an empty list and allow the AI to produce
    a general practical brief.
    """
    try:
        response = requests.get(CISA_KEV_URL, timeout=20)
        response.raise_for_status()
        data = response.json()

        vulnerabilities = data.get("vulnerabilities", [])

        # Sort by date added, newest first.
        vulnerabilities.sort(
            key=lambda item: item.get("dateAdded", ""),
            reverse=True
        )

        return vulnerabilities[:limit]

    except Exception as exc:
        print(f"Warning: could not fetch CISA KEV feed: {exc}")
        return []


def build_source_context(items: list[dict]) -> str:
    if not items:
        return (
            "No live CISA KEV items were available. Create a practical small-business "
            "cyber brief based on common current risks such as phishing, exposed admin "
            "portals, unpatched systems, ransomware preparation, supplier risk, cloud "
            "account security, MFA, backups and incident readiness."
        )

    lines = []

    for item in items:
        cve = item.get("cveID", "Unknown CVE")
        vendor = item.get("vendorProject", "Unknown vendor")
        product = item.get("product", "Unknown product")
        name = item.get("vulnerabilityName", "Known exploited vulnerability")
        date_added = item.get("dateAdded", "Unknown date")
        action = item.get("requiredAction", "Apply vendor guidance and reduce exposure.")

        lines.append(
            f"- {cve} | Vendor: {vendor} | Product: {product} | "
            f"Issue: {name} | Date added: {date_added} | Action: {action}"
        )

    return "\n".join(lines)


# -----------------------------
# OpenAI generation
# -----------------------------

def generate_brief(source_context: str, brief_date: datetime.date) -> dict:
    api_key = os.environ.get("OPENAI_API_KEY")

    if not api_key:
        raise RuntimeError("OPENAI_API_KEY is not set.")

    client = OpenAI(api_key=api_key)

    system_prompt = """
You are writing the Actions On Cyber Daily Int Brief for UK small businesses,
charities, community groups and non-technical leaders.

Write in clear British English.

The audience does not have a dedicated cyber security team.

Do not use hype.
Do not use fearmongering.
Do not use raw URLs.
Do not include URL query strings.
Do not include encoded characters.
Do not include API parameters.
Do not include tracking parameters.
Do not include fragments such as %5B, %5D, %3A, vendor_project, query=, source=, ref= or utm_.
Write only clean, plain English.

Return valid JSON only.
"""

    user_prompt = f"""
Create today's Daily Int Brief for {brief_date.strftime('%d %B %Y')}.

Use this source context as background only. Do not copy machine-readable field names.
Do not include raw feed text.

Source context:
{source_context}

Return this exact JSON structure:

{{
  "title": "Actions On Cyber Daily Int Brief — DD Month YYYY",
  "tag": "Act Now",
  "summary": "One short paragraph explaining the main issue today.",
  "threat_of_the_week": "The main thing to watch.",
  "why_it_matters": "The practical impact for a small organisation.",
  "who_should_care": "Who in the organisation should care.",
  "what_to_check": [
    "Check 1",
    "Check 2",
    "Check 3",
    "Check 4"
  ],
  "actions_on": [
    "Action 1",
    "Action 2",
    "Action 3",
    "Action 4"
  ],
  "question_for_it_provider": "One useful question to ask an IT provider.",
  "closing_note": "One short closing sentence."
}}

Before returning the JSON, check that there are no raw URLs, no URL encoded fragments,
no API parameters and no long machine strings.
"""

    response = client.chat.completions.create(
        model=MODEL,
        temperature=0.4,
        messages=[
            {"role": "system", "content": system_prompt.strip()},
            {"role": "user", "content": user_prompt.strip()},
        ],
    )

    content = response.choices[0].message.content.strip()

    try:
        brief = json.loads(content)
    except json.JSONDecodeError:
        print("Raw model response:")
        print(content)
        raise

    brief = clean_brief_object(brief)
    validate_brief(brief)

    return brief


