      </article>
""".rstrip()


def update_daily_brief_index(cards_html: list[str]) -> None:
    if not cards_html:
        return

    if not DAILY_BRIEF_INDEX.exists():
        raise FileNotFoundError(f"Could not find {DAILY_BRIEF_INDEX}")

    content = DAILY_BRIEF_INDEX.read_text(encoding="utf-8")

    if BRIEF_SECTION_START not in content or BRIEF_SECTION_END not in content:
        raise RuntimeError(
            f"Could not find markers in {DAILY_BRIEF_INDEX}. "
            f"Add {BRIEF_SECTION_START} and {BRIEF_SECTION_END} around the brief card area."
        )

    before, rest = content.split(BRIEF_SECTION_START, 1)
    existing_cards, after = rest.split(BRIEF_SECTION_END, 1)

    new_cards = []

    for card in cards_html:
        href_match = re.search(r'href="([^"]+)"', card)
        href = href_match.group(1) if href_match else ""

        if href and href in existing_cards:
            print(f"Card already exists for {href}. Skipping duplicate.")
            continue

        new_cards.append(card)

    if not new_cards:
        return

    updated_cards = "\n" + "\n".join(new_cards) + "\n" + existing_cards.strip() + "\n"
    updated = before + BRIEF_SECTION_START + updated_cards + BRIEF_SECTION_END + after

    DAILY_BRIEF_INDEX.write_text(updated, encoding="utf-8")


# -----------------------------
# Main
# -----------------------------

def main() -> None:
    today = now_london().date()

    BRIEF_OUTPUT_DIR.mkdir(parents=True, exist_ok=True)

    seen_items = load_seen_items()

    print("Fetching CISA KEV...")
    cisa_candidates = fetch_recent_cisa_kev()
    print(f"Found {len(cisa_candidates)} recent CISA KEV candidates.")

    print("Fetching trusted security news feeds...")
    rss_entries = fetch_rss_entries()
    print(f"Found {len(rss_entries)} recent RSS entries.")

    news_candidates = build_news_candidates(rss_entries)
    print(f"Built {len(news_candidates)} news candidates.")

    candidates = merge_candidates(cisa_candidates, news_candidates)
    print(f"Merged into {len(candidates)} candidates.")

    enriched_candidates = []

    for candidate in candidates:
        candidate = enrich_with_nvd(candidate)
        candidate = score_candidate(candidate)
        enriched_candidates.append(candidate)

    enriched_candidates.sort(key=lambda item: item.get("score", 0), reverse=True)

    publish_candidates = [
        candidate
        for candidate in enriched_candidates
        if should_publish(candidate, seen_items)
    ][:MAX_ARTICLES_PER_RUN]

    if not publish_candidates:
        print("No publishable vulnerability briefs today.")
        return

    generated_cards = []
    successfully_published_keys = []

    for candidate in publish_candidates:
        print(f"Generating article for {candidate.get('key')} with score {candidate.get('score')}...")

        article = generate_article(candidate, today)

        date_slug = today.strftime("%Y-%m-%d")
        title_slug = slugify(article.get("title", f"daily-int-brief-{date_slug}"))
        filename = f"{date_slug}-{title_slug}.html"

        output_path = BRIEF_OUTPUT_DIR / filename

        page_html = render_article_page(article, today)
        output_path.write_text(page_html, encoding="utf-8")

        relative_url = f"daily-int-briefs/{filename}"
        card_html = render_article_card(article, today, relative_url)
        generated_cards.append(card_html)

        successfully_published_keys.append(candidate.get("key", ""))

        print(f"Generated: {output_path}")

    update_daily_brief_index(generated_cards)

    for key in successfully_published_keys:
        if key:
            seen_items.add(key)

    save_seen_items(seen_items)

    print(f"Published {len(successfully_published_keys)} vulnerability brief(s).")


if __name__ == "__main__":
    main()
