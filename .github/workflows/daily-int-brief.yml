def fetch_json(url: str, timeout: int = 20) -> dict:
    headers = {
        "User-Agent": "ActionsOnCyberBot/1.0",
        "Accept": "application/json,text/plain,*/*",
    }

    response = requests.get(url, timeout=timeout, headers=headers)
    response.raise_for_status()
    return response.json()


def fetch_text(url: str, timeout: int = 20) -> str:
    headers = {
        "User-Agent": "ActionsOnCyberBot/1.0",
        "Accept": "application/rss+xml,application/atom+xml,text/xml,*/*",
    }

    response = requests.get(url, timeout=timeout, headers=headers)
    response.raise_for_status()
    return response.text


def fetch_recent_cisa_kev() -> list[dict]:
    try:
        data = fetch_json(CISA_KEV_URL)
    except Exception as exc:
        print(f"Warning: could not fetch CISA KEV feed: {exc}")
        return []

    cutoff = now_london().date() - datetime.timedelta(days=CISA_KEV_LOOKBACK_DAYS)

    items = []

    for item in data.get("vulnerabilities", []):
        date_added_raw = item.get("dateAdded", "")
        date_added = parse_date(date_added_raw)

        if date_added is None:
            continue

        if date_added.date() < cutoff:
            continue

        cve = item.get("cveID", "").strip().upper()

        if not cve:
            continue

        candidate = {
            "key": cve,
            "cve": cve,
            "headline": f"{cve} added to CISA Known Exploited Vulnerabilities",
            "source_names": ["CISA KEV"],
            "source_count": 1,
            "source_weight": 40,
            "source_headlines": [
                f"CISA KEV: {item.get('vulnerabilityName', 'Known exploited vulnerability')}"
            ],
            "vendor": item.get("vendorProject", ""),
            "product": item.get("product", ""),
            "known_exploited": True,
            "cisa_date_added": date_added_raw,
            "cisa_required_action": item.get("requiredAction", ""),
            "raw_text": " ".join([
                cve,
                item.get("vendorProject", ""),
                item.get("product", ""),
                item.get("vulnerabilityName", ""),
                item.get("requiredAction", ""),
                "known exploited vulnerability",
                "actively exploited",
            ]),
        }

        items.append(candidate)

    return items


def fetch_rss_entries() -> list[dict]:
    entries = []
    cutoff = now_london() - datetime.timedelta(hours=NEWS_LOOKBACK_HOURS)

    for feed in TRUSTED_NEWS_FEEDS:
        name = feed["name"]
        url = feed["url"]

        try:
            xml_text = fetch_text(url)
            root = ET.fromstring(xml_text)
        except Exception as exc:
            print(f"Warning: could not read feed {name}: {exc}")
            continue

        # RSS item parsing
        for item in root.findall(".//item"):
            title = item.findtext("title", default="").strip()
            link = item.findtext("link", default="").strip()
            description = item.findtext("description", default="").strip()
            pub_date_raw = item.findtext("pubDate", default="").strip()

            published = parse_date(pub_date_raw)

            if published and published.astimezone(TIMEZONE) < cutoff:
                continue

            entries.append({
                "source_name": name,
                "source_weight": feed.get("weight", 10),
                "title": clean_generated_text(strip_html(title)),
                "summary": clean_generated_text(strip_html(description)),
                "published": published.isoformat() if published else "",
                "link": link,
            })

        # Atom entry parsing
        ns = {"atom": "http://www.w3.org/2005/Atom"}

        for entry in root.findall(".//atom:entry", ns):
            title = entry.findtext("atom:title", default="", namespaces=ns).strip()
            summary = entry.findtext("atom:summary", default="", namespaces=ns).strip()
            updated_raw = entry.findtext("atom:updated", default="", namespaces=ns).strip()
            published_raw = entry.findtext("atom:published", default="", namespaces=ns).strip()

            published = parse_date(published_raw or updated_raw)

            if published and published.astimezone(TIMEZONE) < cutoff:
                continue

            link = ""

            for link_node in entry.findall("atom:link", ns):
                href = link_node.attrib.get("href")
                if href:
                    link = href
                    break

            entries.append({
                "source_name": name,
                "source_weight": feed.get("weight", 10),
                "title": clean_generated_text(strip_html(title)),
                "summary": clean_generated_text(strip_html(summary)),
                "published": published.isoformat() if published else "",
                "link": link,
            })

    return entries


def strip_html(value: str) -> str:
    if not value:
        return ""

    value = re.sub(r"<[^>]+>", " ", value)
    value = html.unescape(value)
    value = re.sub(r"\s+", " ", value).strip()

    return value


