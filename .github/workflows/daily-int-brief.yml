# -----------------------------
# Utility helpers
# -----------------------------

def now_london() -> datetime.datetime:
    return datetime.datetime.now(TIMEZONE)


def parse_date(value: str) -> datetime.datetime | None:
    if not value:
        return None

    value = value.strip()

    try:
        return email.utils.parsedate_to_datetime(value)
    except Exception:
        pass

    try:
        return datetime.datetime.fromisoformat(value.replace("Z", "+00:00"))
    except Exception:
        pass

    for fmt in ("%Y-%m-%d", "%d %b %Y", "%d %B %Y"):
        try:
            return datetime.datetime.strptime(value, fmt).replace(tzinfo=datetime.timezone.utc)
        except Exception:
            pass

    return None


def clean_generated_text(text: str) -> str:
    if not text:
        return ""

    text = unquote(str(text))

    text = re.sub(r"https?://\S+", "", text, flags=re.IGNORECASE)
    text = re.sub(r"[?&][a-zA-Z0-9_\-\[\]]+=[^\s,.;)]*", "", text)

    junk_patterns = [
        r"\bvendor_project(?:\[[^\]]*\])?:[^\s,.;)]*",
        r"\bvendor_project(?:\[[^\]]*\])?=[^\s,.;)]*",
        r"\[[0-9]+\]=[^\s,.;)]*",
        r"%[0-9A-Fa-f]{2}",
        r"\bquery=[^\s,.;)]*",
        r"\bsource=[^\s,.;)]*",
        r"\bref=[^\s,.;)]*",
        r"\butm_[a-zA-Z0-9_]+=[^\s,.;)]*",
    ]

    for pattern in junk_patterns:
        text = re.sub(pattern, "", text, flags=re.IGNORECASE)

    text = re.sub(r"\b[a-zA-Z0-9_\-]{60,}\b", "", text)
    text = re.sub(r"\s+", " ", text).strip()

    return text


def clean_object(value):
    if isinstance(value, dict):
        return {k: clean_object(v) for k, v in value.items()}
    if isinstance(value, list):
        return [clean_object(v) for v in value]
    if isinstance(value, str):
        return clean_generated_text(value)
    return value


def validate_brief(brief: dict) -> None:
    combined = json.dumps(brief, ensure_ascii=False).lower()

    blocked = [
        "%5b",
        "%5d",
        "%3a",
        "vendor_project",
        "utm_",
        "query=",
        "source=",
        "ref=",
        "http://",
        "https://",
    ]

    found = [item for item in blocked if item in combined]

    if found:
        raise ValueError(f"Generated brief contains blocked fragments: {found}")


def extract_cves(text: str) -> list[str]:
    if not text:
        return []

    matches = re.findall(r"CVE-\d{4}-\d{4,}", text.upper())
    return sorted(set(matches))


def esc(value: str) -> str:
    return html.escape(value or "", quote=True)


def render_list(items: list[str]) -> str:
    return "\n".join(f"<li>{esc(item)}</li>" for item in items)


# -----------------------------
# Seen items
# -----------------------------

def load_seen_items() -> set[str]:
    if not SEEN_ITEMS_FILE.exists():
        return set()

    try:
        data = json.loads(SEEN_ITEMS_FILE.read_text(encoding="utf-8"))
        return set(data.get("seen_items", []))
    except Exception:
        return set()


def save_seen_items(seen_items: set[str]) -> None:
    DATA_DIR.mkdir(parents=True, exist_ok=True)

    data = {
        "seen_items": sorted(seen_items),
        "last_updated": now_london().isoformat(),
    }

    SEEN_ITEMS_FILE.write_text(
        json.dumps(data, indent=2, ensure_ascii=False),
        encoding="utf-8",
    )


