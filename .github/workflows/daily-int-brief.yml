def is_vulnerability_story(text: str) -> bool:
    text_l = text.lower()

    if extract_cves(text):
        return True

    keywords = [
        "vulnerability",
        "zero-day",
        "0-day",
        "security flaw",
        "critical flaw",
        "rce",
        "remote code execution",
        "authentication bypass",
        "actively exploited",
        "exploited in the wild",
        "patch",
        "security update",
    ]

    return any(keyword in text_l for keyword in keywords)


def topic_key_from_entry(entry: dict) -> str:
    title = entry.get("title", "")

    words = re.findall(r"[A-Za-z0-9][A-Za-z0-9\-]{2,}", title.lower())

    stop_words = {
        "the",
        "and",
        "for",
        "with",
        "from",
        "this",
        "that",
        "new",
        "security",
        "vulnerability",
        "vulnerabilities",
        "flaw",
        "flaws",
        "critical",
        "zero",
        "day",
        "patch",
        "update",
        "exploited",
        "hackers",
        "attackers",
    }

    useful = [word for word in words if word not in stop_words]

    if not useful:
        useful = words[:6]

    return "topic:" + slugify("-".join(useful[:8]))


def build_news_candidates(entries: list[dict]) -> list[dict]:
    grouped = {}

    for entry in entries:
        text = f"{entry.get('title', '')} {entry.get('summary', '')}"

        if not is_vulnerability_story(text):
            continue

        cves = extract_cves(text)

        if cves:
            keys = cves
        else:
            keys = [topic_key_from_entry(entry)]

        for key in keys:
            if key not in grouped:
                grouped[key] = {
                    "key": key,
                    "cve": key if key.startswith("CVE-") else "",
                    "headline": entry.get("title", ""),
                    "source_names": [],
                    "source_count": 0,
                    "source_weight": 0,
                    "source_headlines": [],
                    "vendor": "",
                    "product": "",
                    "known_exploited": False,
                    "raw_text": "",
                }

            candidate = grouped[key]

            source_name = entry.get("source_name", "Unknown source")

            if source_name not in candidate["source_names"]:
                candidate["source_names"].append(source_name)
                candidate["source_weight"] += entry.get("source_weight", 10)

            candidate["source_headlines"].append(
                f"{source_name}: {entry.get('title', '')}"
            )

            candidate["raw_text"] += " " + text

    for candidate in grouped.values():
        candidate["source_count"] = len(candidate["source_names"])
        candidate["source_headlines"] = candidate["source_headlines"][:8]

    return list(grouped.values())


def merge_candidates(cisa_candidates: list[dict], news_candidates: list[dict]) -> list[dict]:
    merged = {}

    for candidate in cisa_candidates + news_candidates:
        key = candidate["key"]

        if key not in merged:
            merged[key] = candidate
            continue

        existing = merged[key]

        existing["headline"] = existing.get("headline") or candidate.get("headline", "")
        existing["cve"] = existing.get("cve") or candidate.get("cve", "")
        existing["vendor"] = existing.get("vendor") or candidate.get("vendor", "")
        existing["product"] = existing.get("product") or candidate.get("product", "")
        existing["known_exploited"] = existing.get("known_exploited") or candidate.get("known_exploited", False)
        existing["source_weight"] += candidate.get("source_weight", 0)
        existing["raw_text"] += " " + candidate.get("raw_text", "")

        for source in candidate.get("source_names", []):
            if source not in existing["source_names"]:
                existing["source_names"].append(source)

        existing["source_headlines"].extend(candidate.get("source_headlines", []))
        existing["source_headlines"] = existing["source_headlines"][:10]
        existing["source_count"] = len(existing["source_names"])

        if candidate.get("cisa_date_added"):
            existing["cisa_date_added"] = candidate.get("cisa_date_added")

        if candidate.get("cisa_required_action"):
            existing["cisa_required_action"] = candidate.get("cisa_required_action")

    return list(merged.values())


def enrich_with_nvd(candidate: dict) -> dict:
    cve = candidate.get("cve", "")

    if not cve:
        return candidate

    try:
        response = requests.get(
            NVD_CVE_API_URL,
            params={"cveId": cve},
            timeout=20,
            headers={"User-Agent": "ActionsOnCyberBot/1.0"},
        )
        response.raise_for_status()
        data = response.json()
    except Exception as exc:
        print(f"Warning: could not enrich {cve} from NVD: {exc}")
        return candidate

    vulnerabilities = data.get("vulnerabilities", [])

    if not vulnerabilities:
        return candidate

    cve_data = vulnerabilities[0].get("cve", {})

    descriptions = cve_data.get("descriptions", [])
    description = ""

    for desc in descriptions:
        if desc.get("lang") == "en":
            description = desc.get("value", "")
            break

    metrics = cve_data.get("metrics", {})
    severity = ""

    for metric_group in ("cvssMetricV31", "cvssMetricV30", "cvssMetricV2"):
        if metric_group in metrics and metrics[metric_group]:
            severity = metrics[metric_group][0].get("cvssData", {}).get("baseSeverity", "")
            break

    candidate["nvd_description"] = clean_generated_text(description)
    candidate["nvd_published"] = cve_data.get("published", "")
    candidate["severity"] = severity
    candidate["raw_text"] += " " + description + " " + severity

    if "NVD" not in candidate["source_names"]:
        candidate["source_names"].append("NVD")

    candidate["source_count"] = len(candidate["source_names"])

    return candidate


def score_candidate(candidate: dict) -> dict:
    score = 0
    reasons = []

    raw_text = candidate.get("raw_text", "").lower()
    headline = candidate.get("headline", "").lower()
    combined = f"{headline} {raw_text}"

    if candidate.get("known_exploited"):
        score += 80
        reasons.append("Added to CISA Known Exploited Vulnerabilities")

    source_count = candidate.get("source_count", 0)

    if source_count >= 3:
        score += 35
        reasons.append("Reported by three or more trusted sources")
    elif source_count == 2:
        score += 22
        reasons.append("Reported by two trusted sources")
    elif source_count == 1:
        score += 8
        reasons.append("Reported by one trusted source")

    score += min(candidate.get("source_weight", 0), 40)

    matched_signal_keywords = []

    for keyword in HIGH_SIGNAL_KEYWORDS:
        if keyword in combined:
            matched_signal_keywords.append(keyword)

    if matched_signal_keywords:
        score += min(35, 10 + len(matched_signal_keywords) * 5)
        reasons.append("High-signal terms: " + ", ".join(matched_signal_keywords[:5]))

    matched_sme_keywords = []

    for keyword in SMALL_BUSINESS_TECH_KEYWORDS:
        if keyword in combined:
            matched_sme_keywords.append(keyword)

    if matched_sme_keywords:
        score += min(30, 10 + len(matched_sme_keywords) * 4)
        reasons.append("Relevant to common small-business technology: " + ", ".join(matched_sme_keywords[:5]))

    severity = candidate.get("severity", "").upper()

    if severity == "CRITICAL":
        score += 18
        reasons.append("Critical severity")
    elif severity == "HIGH":
        score += 10
        reasons.append("High severity")

    if candidate.get("cve"):
        score += 5
        reasons.append(f"Tracked as {candidate.get('cve')}")

    action_words = ["patch", "update", "upgrade", "mitigation", "fix", "disable", "workaround"]

    if any(word in combined for word in action_words):
        score += 8
        reasons.append("Clear action appears to be available")

    candidate["score"] = score
    candidate["score_reasons"] = reasons

    return candidate


def should_publish(candidate: dict, seen_items: set[str]) -> bool:
    key = candidate.get("key", "")

    if not key:
        return False

    if key in seen_items:
        print(f"Skipping already seen item: {key}")
        return False

    score = candidate.get("score", 0)

    if score < PUBLISH_SCORE_THRESHOLD:
        print(f"Skipping low-score item: {key} score={score}")
        return False

    return True


